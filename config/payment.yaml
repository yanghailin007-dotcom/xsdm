# 易支付（YiiPay）配置
# 1:1 充值比例：1元 = 1点

# 支付开关
enabled: true

# 易支付接口配置
yipay:
  # 易支付接口地址（请替换为您的易支付平台地址）
  # 例如: https://pay.example.com
  api_url: "https://pay.example.com"
  
  # 商户ID
  merchant_id: "YOUR_MERCHANT_ID"
  
  # 商户密钥（重要：请妥善保管，不要泄露）
  merchant_key: "YOUR_MERCHANT_KEY"
  
  # 支付方式
  pay_type: "alipay"  # 可选: alipay, wxpay, qqpay
  
  # 异步回调URL（服务器内部回调）
  notify_url: "/api/payment/notify"
  
  # 同步回调URL（支付完成后跳转）
  return_url: "/payment/success"

# 充值比例配置
# 1元 = 1点
exchange_rate: 1

# 充值选项（用户可选择的面额）
# 规则：30起充，100开始送，多充多送
recharge_options:
  - amount: 30
    bonus: 0      # 起充门槛，不送
    label: "30点"
  - amount: 50
    bonus: 2      # 小额少送
    label: "50点"
  - amount: 100
    bonus: 10     # 100起送
    label: "100点"
  - amount: 200
    bonus: 30     # 充200送30
    label: "200点"
  - amount: 500
    bonus: 100    # 充500送100
    label: "500点"
  - amount: 1000
    bonus: 250    # 充1000送250
    label: "1000点"
  - amount: 3000
    bonus: 900    # 充3000送900
    label: "3000点"
  - amount: 5000
    bonus: 1800   # 充5000送1800（最划算）
    label: "5000点"

# 最低充值金额
min_amount: 30

# 最高充值金额
max_amount: 5000
