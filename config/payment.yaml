# 易支付（ZPay）配置
# 充值比例：1元 = 10创造点

# 支付开关
enabled: true

# 易支付接口配置
yipay:
  # 易支付接口地址
  api_url: "https://zpayz.cn"
  
  # 商户ID
  merchant_id: "2025082311011032"
  
  # 商户密钥（重要：请妥善保管，不要泄露）
  merchant_key: "H9TEykkzChooxOXMeKX8KRn9e1hnjmPu"
  
  # 支付方式
  pay_type: "alipay"  # 可选: alipay, wxpay, qqpay
  
  # 异步回调URL（服务器内部回调）
  notify_url: "/api/payment/notify"
  
  # 同步回调URL（支付完成后跳转）
  return_url: "/payment/success"

# 充值比例配置
# 1元 = 10创造点
exchange_rate: 10

# 充值选项（用户可选择的面额）
# 规则：30元起充，100元起送创造点，多充多送
# 计算公式：总金额 = 金额 × 10 + 赠送点数
recharge_options:
  - amount: 0.01
    bonus: 0        # 测试金额
    label: "测试0.1创造点"
  - amount: 30
    bonus: 0        # 起充门槛，不送
    label: "300创造点"
  - amount: 50
    bonus: 20       # 小额少送（300+20=320）
    label: "520创造点"
  - amount: 100
    bonus: 100      # 100起送（1000+100=1100）
    label: "1100创造点"
  - amount: 200
    bonus: 300      # 充200送300（2000+300=2300）
    label: "2300创造点"
  - amount: 500
    bonus: 1000     # 充500送1000（5000+1000=6000）
    label: "6000创造点"
  - amount: 1000
    bonus: 2500     # 充1000送2500（10000+2500=12500）
    label: "12500创造点"
  - amount: 3000
    bonus: 9000     # 充3000送9000（30000+9000=39000）
    label: "39000创造点"
  - amount: 5000
    bonus: 18000    # 充5000送18000（50000+18000=68000，最划算）
    label: "68000创造点"

# 最低充值金额（测试模式设为0.01，生产环境建议30）
min_amount: 0.01

# 最高充值金额
max_amount: 5000
