# 易支付（ZPay）配置
# 1:1 充值比例：1元 = 1点

# 支付开关
enabled: true

# 易支付接口配置
yipay:
  # 易支付接口地址
  api_url: "https://zpayz.cn"
  
  # 商户ID
  merchant_id: "2025082311011032"
  
  # 商户密钥（重要：请妥善保管，不要泄露）
  merchant_key: "H9TEykkzChooxOXMeKX8KRn9e1hnjmPu"
  
  # 支付方式
  pay_type: "alipay"  # 可选: alipay, wxpay, qqpay
  
  # 异步回调URL（服务器内部回调）
  notify_url: "/api/payment/notify"
  
  # 同步回调URL（支付完成后跳转）
  return_url: "/payment/success"

# 充值比例配置
# 1元 = 1点
exchange_rate: 1

# 充值选项（用户可选择的面额）
# 规则：30起充，100开始送，多充多送
recharge_options:
  - amount: 0.01
    bonus: 0      # 测试金额
    label: "测试0.01点"
  - amount: 30
    bonus: 0      # 起充门槛，不送
    label: "30点"
  - amount: 50
    bonus: 2      # 小额少送
    label: "50点"
  - amount: 100
    bonus: 10     # 100起送
    label: "100点"
  - amount: 200
    bonus: 30     # 充200送30
    label: "200点"
  - amount: 500
    bonus: 100    # 充500送100
    label: "500点"
  - amount: 1000
    bonus: 250    # 充1000送250
    label: "1000点"
  - amount: 3000
    bonus: 900    # 充3000送900
    label: "3000点"
  - amount: 5000
    bonus: 1800   # 充5000送1800（最划算）
    label: "5000点"

# 最低充值金额（测试模式设为0.01，生产环境建议30）
min_amount: 0.01

# 最高充值金额
max_amount: 5000
