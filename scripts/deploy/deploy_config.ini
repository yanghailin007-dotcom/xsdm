[server]
# 服务器配置
ip = 8.163.37.124
port = 22
user = root

# 密钥文件路径（Windows本地路径）
key_path = d:\work6.05\xsdm.pem

# 服务器端项目路径
remote_project_path = /home/novelapp/novel-system

# Web服务配置
web_port = 5000
gunicorn_workers = 2
gunicorn_timeout = 600

[paths]
# 本地项目根目录
local_root = d:\work6.05

# 需要同步的目录（逗号分隔）
sync_dirs = src,web,scripts,config

# 需要同步的文件（逗号分隔）
sync_files = requirements.txt,web/wsgi.py,scripts/start_app.py

# 排除的目录和文件
exclude_patterns = __pycache__,*.pyc,.git,logs/*,generated_images/*,temp_fanqie_upload/*,.env,test_*.py,*.db,小说项目/*,Chrome/*,knowledge_base/*,ai_enhanced_settings/*,fusion_settings/*

[logs]
# 日志文件路径
access_log = logs/access.log
error_log = logs/error.log
gunicorn_log = logs/gunicorn.log