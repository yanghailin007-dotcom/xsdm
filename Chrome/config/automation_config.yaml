# 自动化发布系统配置文件
# Automation Configuration for Novel Publishing System

# 基础配置
basic:
  debug_port: 9988
  scan_interval: 1800  # 扫描间隔（秒）
  max_retries: 3
  auto_continue_delay: 10

# 路径配置
paths:
  novel_path: "小说项目"  # 小说项目根目录
  published_path: "已经发布"  # 已发布小说目录
  progress_file: "发布进度.json"
  progress_detail_file: "发布进度细节.json"
  
# 发布配置
publishing:
  required_json_suffix: "项目信息.json"
  min_words_for_scheduled_publish: 60000  # 累计字数阈值
  chapters_per_time_slot: 1  # 每个时间点最多发布章节数
  publish_buffer_minutes: 35  # 发布时间缓冲（分钟）
  
  # 发布时间点配置 - 每天5个时间点，每个时间点1章，总共5章/天
  publish_times:
    - "05:25"
    - "09:25"
    - "13:25"
    - "17:25"
    - "21:25"

# 超时配置
timeouts:
  click: 15000
  fill: 12000
  wait_element: 5000
  page_load: 10000

# 浏览器配置
browser:
  headless: false
  viewport:
    width: 1920
    height: 1080
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# ==================== 签约管理配置 ====================
# 用于管理小说平台的签约流程和用户信息
contract:
  # 最大重试次数 - 当签约操作失败时，系统会自动重试的次数
  # 建议值：2-3次，过多可能导致账号被限制
  max_retry_count: 2
  
  # 是否自动签约 - 启用后系统会自动完成签约流程
  # true: 自动签约（推荐），false: 需要手动操作
  auto_sign: true
  
  # 当前使用的用户ID - 指定使用哪个用户进行签约操作
  # 必须是下方 users 中定义的 user_id（如：user1、user2、user3）
  # 用途：支持多账号轮换使用，避免单一账号频繁操作
  current_user: "user2"
  
  # ==================== 多用户签约信息配置 ====================
  # 可以配置多个签约用户账号，系统会根据 current_user 选择使用
  # 用途：
  #   1. 支持多账号管理（主账号+备用账号）
  #   2. 账号轮换使用，降低风险
  #   3. 不同小说使用不同账号签约
  users:
    # ==================== 用户1配置 ====================
    user1:
      # 用户显示名称 - 用于日志和界面显示
      name: "用户1"
      
      # 是否启用此用户 - true: 启用，false: 禁用
      # 用途：临时禁用某个账号而不删除配置
      enabled: true
      
      # 用户联系方式信息 - 用于签约时填写表单
      contact_info:
        # 手机号码 - 必须是有效手机号，用于接收验证码和通知
        phone: "13760125919"
        
        # 电子邮箱 - 用于接收平台通知和验证邮件
        email: "405625365@qq.com"
        
        # QQ号码 - 用于客服沟通和账号关联
        qq: "405625365"
        
        # 银行账号 - 用于接收稿费，必须是有效银行卡号
        bank_account: "6214857812704759"
        
        # 开户银行支行 - 银行账户的完整开户行信息
        # 格式：银行名称 + 支行名称
        bank_branch: "招商银行深圳愉康支行"
        
        # 用户地址信息 - 用于签约时填写身份信息
        address:
          # 省份 - 省级行政区划
          province: "广东省"
          
          # 城市 - 市级行政区划
          city: "深圳市"
          
          # 详细地址 - 区/县级及街道信息
          detail: "宝安区"
    
    # ==================== 用户2配置（当前启用） ====================
    user2:
      # 用户显示名称
      name: "北莽王庭的达延"
      
      # 是否启用此用户（当前启用的账号）
      enabled: true
      
      # 用户联系方式信息
      contact_info:
        # 手机号码
        phone: "15286302700"
        
        # 电子邮箱
        email: "1078943007@qq.com"
        
        # QQ号码
        qq: "1078943007"
        
        # 银行账号
        bank_account: "6217007150009196817"
        
        # 开户银行支行
        bank_branch: "中国建设银行股份有限公司凯里北京路支行"
        
        # 用户地址信息
        address:
          # 省份
          province: "贵州省"
          
          # 城市
          city: "黔东南"
          
          # 详细地址
          detail: "北京路"
    
    # ==================== 用户3配置（已禁用） ====================
    user3:
      # 用户显示名称
      name: "用户3"
      
      # 是否启用此用户（当前禁用，作为备用账号）
      # 用途：需要时可以将 enabled 改为 true 来启用
      enabled: false
      
      # 用户联系方式信息
      contact_info:
        # 手机号码（示例）
        phone: "13900139000"
        
        # 电子邮箱（示例）
        email: "user3@example.com"
        
        # QQ号码（示例）
        qq: "987654321"
        
        # 银行账号（示例）
        bank_account: "6228481234567890123"
        
        # 开户银行支行（示例）
        bank_branch: "农业银行上海分行"
        
        # 用户地址信息（示例）
        address:
          # 省份
          province: "上海市"
          
          # 城市
          city: "上海市"
          
          # 详细地址
          detail: "浦东新区"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/automation.log"
  max_size: "10MB"
  backup_count: 5

# 通知配置
notification:
  enabled: false
  email:
    smtp_server: ""
    smtp_port: 587
    username: ""
    password: ""
    recipients: []