<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>章节内容查看 - 小说生成系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chapter-view.css">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <button class="btn btn-secondary btn-small" onclick="goBack()" style="margin-right: 12px;">
                    ← 返回
                </button>
                📖 章节内容查看
            </div>
            <div class="navbar-actions">
                <span id="current-project-title" style="margin-right: 16px; color: #9ca3af;">-</span>
                <button class="btn btn-secondary btn-small" onclick="showRawFiles()">📁 原始文件</button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/phase-two-generation'">🔙 返回生成页</button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="chapter-view-container">
        <!-- 左侧章节列表 -->
        <aside class="chapter-sidebar">
            <div class="sidebar-header">
                <h3>📚 章节列表</h3>
                <div class="chapter-stats">
                    <span id="total-chapters-count">0</span> 章
                    <span id="total-words-count">0</span> 字
                </div>
            </div>
            <div id="chapter-list" class="chapter-list">
                <div class="loading-spinner"></div>
                <p style="text-align: center; color: #6b7280; margin-top: 12px;">加载章节列表...</p>
            </div>
        </aside>

        <!-- 中间阅读区域 -->
        <main class="reading-area">
            <div id="chapter-content" class="chapter-content">
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af;">
                    <div style="font-size: 64px; margin-bottom: 16px;">📖</div>
                    <p style="font-size: 18px;">请从左侧选择要阅读的章节</p>
                </div>
            </div>

            <!-- 章节导航 -->
            <div class="chapter-navigation" id="chapter-navigation" style="display: none;">
                <button class="nav-btn prev-btn" onclick="navigateChapter(-1)" id="prev-chapter-btn" disabled>
                    ← 上一章
                </button>
                <div class="nav-info">
                    <span id="nav-current-chapter">-</span>
                </div>
                <button class="nav-btn next-btn" onclick="navigateChapter(1)" id="next-chapter-btn" disabled>
                    下一章 →
                </button>
            </div>
        </main>

        <!-- 右侧文件信息 -->
        <aside class="files-sidebar">
            <div class="sidebar-header">
                <h3>📄 章节文件</h3>
            </div>
            <div id="file-categories" class="file-categories">
                <!-- 文件分类将在这里动态生成 -->
            </div>
        </aside>
    </div>

    <!-- 原始文件查看器模态框 -->
    <div id="raw-file-viewer-modal" class="modal" style="display: none;">
        <div class="modal-content raw-file-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="modal-icon">📁</span>
                    <div>
                        <h3 id="raw-file-title">原始文件查看</h3>
                        <p id="raw-file-path" style="font-size: 13px; color: #9ca3af; margin-top: 4px;"></p>
                    </div>
                </div>
                <button class="close-btn" onclick="closeRawFileViewer()">×</button>
            </div>
            <div class="modal-body">
                <div class="file-tabs" id="file-tabs">
                    <!-- 文件标签将在这里动态生成 -->
                </div>
                <div class="file-content-wrapper">
                    <pre id="file-content-display" class="file-content-display"></pre>
                </div>
            </div>
        </div>
    </div>

    <!-- 章节阅读模态框（用于快速查看） -->
    <div id="quick-chapter-modal" class="modal" style="display: none;">
        <div class="modal-content chapter-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <span class="modal-icon">📖</span>
                    <h3 id="quick-chapter-title">章节内容</h3>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary btn-small" onclick="copyChapterContent()">📋 复制</button>
                    <button class="close-btn" onclick="closeQuickChapterModal()">×</button>
                </div>
            </div>
            <div class="modal-body chapter-modal-body">
                <div id="quick-chapter-content" class="chapter-text-content"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/chapter-view.js"></script>
</body>
</html>
