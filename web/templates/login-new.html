<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 大文娱创作平台</title>
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <style>
        /* 登录页面专用样式 */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        /* 动态背景 */
        .login-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 登录容器 */
        .login-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease-out;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-3xl);
            padding: var(--space-10);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* 装饰性发光 */
        .login-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }

        .login-glow-1 {
            top: -100px;
            right: -100px;
            background: var(--primary-500);
        }

        .login-glow-2 {
            bottom: -100px;
            left: -100px;
            background: var(--accent-500);
        }

        /* Logo区域 */
        .login-header {
            text-align: center;
            margin-bottom: var(--space-8);
            position: relative;
            z-index: 1;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto var(--space-5);
            box-shadow: var(--shadow-glow);
            animation: float 3s ease-in-out infinite;
        }

        .login-title {
            font-size: var(--text-2xl);
            font-weight: 800;
            margin-bottom: var(--space-2);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        /* 表单样式 */
        .login-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: var(--space-5);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .form-input {
            padding-left: var(--space-12);
        }

        .form-input:focus + .input-icon {
            color: var(--primary-400);
        }

        /* 记住我和忘记密码 */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-500);
            cursor: pointer;
        }

        .checkbox-label {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        .forgot-link {
            font-size: var(--text-sm);
            color: var(--primary-400);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--primary-300);
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: var(--space-4);
            font-size: var(--text-base);
            margin-bottom: var(--space-6);
        }

        /* 分隔线 */
        .divider-text {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
            color: var(--text-muted);
            font-size: var(--text-xs);
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 演示账户 */
        .demo-accounts {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            margin-bottom: var(--space-6);
        }

        .demo-title {
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-tertiary);
            margin-bottom: var(--space-4);
            text-align: center;
        }

        .demo-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .demo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .demo-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .demo-info {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        .demo-info strong {
            color: var(--text-primary);
        }

        .demo-btn {
            padding: var(--space-1) var(--space-3);
            font-size: var(--text-xs);
        }

        /* 注册链接 */
        .register-prompt {
            text-align: center;
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }

        .register-link {
            color: var(--primary-400);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .register-link:hover {
            color: var(--primary-300);
        }

        /* 错误提示 */
        .alert {
            margin-bottom: var(--space-5);
            animation: shake 0.5s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 页脚 */
        .login-footer {
            text-align: center;
            margin-top: var(--space-8);
            font-size: var(--text-xs);
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-6);
            }

            .form-options {
                flex-direction: column;
                gap: var(--space-3);
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- 背景 -->
        <div class="login-bg"></div>

        <!-- 登录容器 -->
        <div class="login-container">
            <div class="login-card">
                <!-- 装饰发光 -->
                <div class="login-glow login-glow-1"></div>
                <div class="login-glow login-glow-2"></div>

                <!-- 头部 -->
                <div class="login-header">
                    <div class="login-logo">🎨</div>
                    <h1 class="login-title">大文娱创作平台</h1>
                    <p class="login-subtitle">AI驱动的全能娱乐创作系统</p>
                </div>

                <!-- 错误提示（默认隐藏） -->
                <div id="errorAlert" class="alert alert-error" style="display: none;">
                    <span>⚠️</span>
                    <span id="errorMessage">用户名或密码错误</span>
                </div>

                <!-- 登录表单 -->
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-label">记住我</span>
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn btn-primary login-btn" id="loginBtn">
                        <span>登 录</span>
                        <span id="loadingSpinner" class="loading-spinner loading-spinner-small" style="display: none;"></span>
                    </button>
                </form>

                <!-- 分隔线 -->
                <div class="divider-text">快速登录</div>

                <!-- 演示账户 -->
                <div class="demo-accounts">
                    <div class="demo-title">演示账户</div>
                    <div class="demo-list">
                        <div class="demo-item" onclick="fillDemo('test', 'test')">
                            <span class="demo-info"><strong>test</strong> / 任意密码</span>
                            <button class="btn btn-small btn-secondary demo-btn">使用</button>
                        </div>
                        <div class="demo-item" onclick="fillDemo('admin', 'admin')">
                            <span class="demo-info"><strong>admin</strong> / admin</span>
                            <button class="btn btn-small btn-secondary demo-btn">使用</button>
                        </div>
                    </div>
                </div>

                <!-- 注册 -->
                <div class="register-prompt">
                    还没有账户？<a href="/register" class="register-link">立即注册</a>
                </div>
            </div>

            <!-- 页脚 -->
            <div class="login-footer">
                <p>&copy; 2024 大文娱系统 | 版本 2.0</p>
            </div>
        </div>
    </div>

    <script>
        // 填充演示账户
        function fillDemo(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('username').focus();
        }

        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorAlert = document.getElementById('errorAlert');
            
            // 隐藏错误提示
            errorAlert.style.display = 'none';
            
            // 显示加载状态
            loginBtn.disabled = true;
            spinner.style.display = 'inline-block';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // 成功动画
                    loginBtn.innerHTML = '<span>✓ 登录成功</span>';
                    loginBtn.style.background = 'var(--gradient-success)';
                    
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 500);
                } else {
                    const data = await response.json();
                    throw new Error(data.error || '登录失败');
                }
            } catch (error) {
                // 显示错误
                document.getElementById('errorMessage').textContent = error.message;
                errorAlert.style.display = 'flex';
                
                // 重置按钮
                loginBtn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        // 输入时清除错误
        document.getElementById('username').addEventListener('input', () => {
            document.getElementById('errorAlert').style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            document.getElementById('errorAlert').style.display = 'none';
        });

        // 页面加载完成后的动画
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username').focus();
        });
    </script>
</body>
</html>
