<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目可视化 - 小说生成系统</title>
    <link rel="stylesheet" href="/static/css/worldview-viewer.css">
    <link rel="stylesheet" href="/static/css/character-editor.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">📊 项目可视化</div>
            <div class="navbar-actions">
                <button class="btn btn-secondary" onclick="goBack()">← 返回</button>
                <button class="btn btn-secondary" onclick="toggleEditMode()">✏️ 编辑模式</button>
                <button class="btn btn-success" onclick="saveWorldview()">💾 保存</button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="panel-section">
                <h3>视图切换</h3>
                <div class="view-buttons">
                    <button class="view-btn active" data-view="overview" onclick="switchView('overview')">
                        <span class="icon">🎬</span>
                        <span class="text">整体概览</span>
                    </button>
                    <button class="view-btn" data-view="characters" onclick="switchView('characters')">
                        <span class="icon">👥</span>
                        <span class="text">角色网络</span>
                    </button>
                    <button class="view-btn" data-view="factions" onclick="switchView('factions')">
                        <span class="icon">⚔️</span>
                        <span class="text">势力关系</span>
                    </button>
                    <button class="view-btn" data-view="timeline" onclick="switchView('timeline')">
                        <span class="icon">📜</span>
                        <span class="text">故事事件</span>
                    </button>
                    <button class="view-btn" data-view="map" onclick="switchView('map')">
                        <span class="icon">🗺️</span>
                        <span class="text">世界地图</span>
                    </button>
                    <button class="view-btn" data-view="systems" onclick="switchView('systems')">
                        <span class="icon">⚙️</span>
                        <span class="text">系统设定</span>
                    </button>
                </div>
            </div>

            <div class="panel-section">
                <h3>快速筛选</h3>
                <div class="filter-tags" id="faction-filters">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 主要内容区域 -->
        <div class="main-content">
            <!-- 整体概览视图 -->
            <div id="overview-view" class="view active">
                <div class="overview-container">
                    <div class="overview-stats">
                        <div class="stat-card">
                            <div class="stat-icon">📚</div>
                            <div class="stat-value" id="overview-chapters">200</div>
                            <div class="stat-label">总章节数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">👥</div>
                            <div class="stat-value" id="overview-characters">0</div>
                            <div class="stat-label">角色数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">⚔️</div>
                            <div class="stat-value" id="overview-factions">0</div>
                            <div class="stat-label">势力数量</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📖</div>
                            <div class="stat-value" id="overview-events">0</div>
                            <div class="stat-label">重大事件</div>
                        </div>
                    </div>
                    
                    <div class="overview-description">
                        <h2 id="novel-title-display">小说标题</h2>
                        <p id="novel-synopsis-display">小说简介</p>
                    </div>
                </div>
                
                <div class="overview-grid">
                    <div class="overview-card" onclick="switchView('characters')">
                        <div class="card-icon">👥</div>
                        <h3>角色设计</h3>
                        <p>查看角色关系网络</p>
                    </div>
                    <div class="overview-card" onclick="switchView('factions')">
                        <div class="card-icon">⚔️</div>
                        <h3>势力关系</h3>
                        <p>查看势力关系网络</p>
                    </div>
                    <div class="overview-card" onclick="switchView('timeline')">
                        <div class="card-icon">📜</div>
                        <h3>故事事件</h3>
                        <p>查看故事时间线</p>
                    </div>
                    <div class="overview-card" onclick="switchView('map')">
                        <div class="card-icon">🗺️</div>
                        <h3>世界地图</h3>
                        <p>查看地理布局</p>
                    </div>
                    <div class="overview-card" onclick="switchView('systems')">
                        <div class="card-icon">⚙️</div>
                        <h3>系统设定</h3>
                        <p>查看修炼体系</p>
                    </div>
                </div>
            </div>

            <!-- 角色网络视图 -->
            <div id="characters-view" class="view">
                <div class="network-container">
                    <canvas id="characters-graph"></canvas>
                </div>
                <div class="network-info">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                        <h3>角色关系网络</h3>
                        <button class="btn btn-primary" onclick="openCharacterEditor()">
                            ✏️ 编辑角色
                        </button>
                    </div>
                    <div id="character-details"></div>
                </div>
            </div>

            <!-- 势力关系视图 -->
            <div id="factions-view" class="view">
                <div class="relations-container">
                    <canvas id="factions-graph"></canvas>
                </div>
                <div class="relations-info">
                    <h3>势力关系网络</h3>
                    <div id="faction-details"></div>
                </div>
            </div>

            <!-- 世界地图视图 -->
            <div id="map-view" class="view">
                <div class="map-container">
                    <canvas id="world-map"></canvas>
                    <div id="map-markers"></div>
                    <div id="map-tooltip" class="tooltip"></div>
                </div>
                
                <!-- 侧边栏 -->
                <div class="sidebar">
                    <div class="sidebar-section">
                        <h3>世界概览</h3>
                        <div id="world-overview">
                            <p class="world-name">凡人修仙界</p>
                            <p class="world-description">一个修仙与凡人共存的世界，拥有数千年的历史...</p>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3>势力列表</h3>
                        <div id="faction-list">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <h3>重要地点</h3>
                        <div id="location-list">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 时间轴视图 -->
            <div id="timeline-view" class="view">
                <div class="timeline-container">
                    <div class="timeline-line"></div>
                    <div id="timeline-events">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 系统设定视图 -->
            <div id="systems-view" class="view">
                <div class="systems-container">
                    <div class="system-category" id="power-system">
                        <h3>🔥 修炼体系</h3>
                        <div class="system-content">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="system-category" id="magic-system">
                        <h3>✨ 法术系统</h3>
                        <div class="system-content">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="system-category" id="social-system">
                        <h3>👥 社会制度</h3>
                        <div class="system-content">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                    <div class="system-category" id="world-rules">
                        <h3>🌍 世界规则</h3>
                        <div class="system-content">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑世界观</h2>
                <button class="close-btn" onclick="closeEditModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="worldview-form">
                    <div class="form-group">
                        <label>世界名称</label>
                        <input type="text" id="world-name" placeholder="输入世界名称">
                    </div>
                    
                    <div class="form-group">
                        <label>世界描述</label>
                        <textarea id="world-description" rows="3" placeholder="描述这个世界的基本情况"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>势力管理</label>
                        <div id="factions-editor">
                            <!-- 动态生成 -->
                        </div>
                        <button type="button" class="btn btn-secondary" onclick="addFaction()">+ 添加势力</button>
                    </div>
                    
                    <div class="form-group">
                        <label>重要地点</label>
                        <div id="locations-editor">
                            <!-- 动态生成 -->
                        </div>
                        <button type="button" class="btn btn-secondary" onclick="addLocation()">+ 添加地点</button>
                    </div>
                    
                    <div class="form-group">
                        <label>修炼体系</label>
                        <textarea id="power-system-text" rows="5" placeholder="描述修炼体系、等级划分等"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>法术系统</label>
                        <textarea id="magic-system-text" rows="5" placeholder="描述法术类型、使用规则等"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>社会制度</label>
                        <textarea id="social-system-text" rows="5" placeholder="描述社会等级、经济体系等"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>世界规则</label>
                        <textarea id="world-rules-text" rows="5" placeholder="描述世界的基本规则和限制"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveWorldview()">保存</button>
            </div>
        </div>
    </div>

    <!-- 角色编辑器模态框 -->
    <div id="character-editor-modal"></div>

    <script>
        console.log('🔴 HTML内联脚本执行');
        console.log('当前页面URL:', window.location.href);
        console.log('标题参数:', new URLSearchParams(window.location.search).get('title'));
    </script>
    <script src="/static/js/project-viewer.js"></script>
    <script src="/static/js/character-editor.js"></script>
</body>
</html>
