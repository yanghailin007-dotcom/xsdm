<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2 Test</title>
    <link rel="stylesheet" href="/static/css/v2/design-system.css">
    <link rel="stylesheet" href="/static/css/v2/components.css">
    <link rel="stylesheet" href="/static/css/v2/layouts.css">
    <style>
        .test-box { 
            padding: 40px; 
            text-align: center;
            background: var(--v2-bg-secondary);
            border-radius: var(--v2-radius-xl);
            margin: 40px auto;
            max-width: 600px;
        }
        .test-title {
            font-size: 32px;
            background: linear-gradient(135deg, #fafafa 0%, #a78bfa 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .test-text {
            color: var(--v2-text-secondary);
            margin-bottom: 30px;
        }
    </style>
</head>
<body class="v2-body">
    <div class="test-box">
        <h1 class="test-title">V2 UI Test</h1>
        <p class="test-text">如果看到渐变文字和深色背景，说明CSS加载正常</p>
        <button class="v2-btn v2-btn--primary">测试按钮</button>
        <button class="v2-btn v2-btn--secondary" style="margin-left: 10px;">次要按钮</button>
    </div>
    
    <div style="text-align: center; margin-top: 40px;">
        <a href="/landing?ui=v1" style="color: var(--v2-text-muted);">返回 V1</a>
    </div>
</body>
</html>
