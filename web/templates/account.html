<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户管理 - 大文娱创作平台</title>
    <!-- 注意：此页面使用内联样式，不引入外部CSS以避免冲突 -->
    <style>
        /* ==================== 页面变量 ==================== */
        :root {
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --accent-500: #06b6d4;
            --purple-500: #a855f7;
            
            --gray-900: #0f172a;
            --gray-800: #1e293b;
            --gray-700: #334155;
            --gray-600: #475569;
            
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--gray-900);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ==================== 顶部导航 ==================== */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-primary);
        }

        .nav-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-back {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.5;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* ==================== 用户头像下拉菜单 ==================== */
        .user-menu {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .user-avatar:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-avatar .avatar-text {
            font-size: 16px;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 180px;
            background: rgba(30, 41, 59, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .dropdown-header span {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 14px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(148, 163, 184, 0.1);
            margin: 4px 0;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s ease;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: rgba(99, 102, 241, 0.1);
            color: #f1f5f9;
        }

        /* ==================== 主内容区 ==================== */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem 3rem;
            position: relative;
            z-index: 10;
        }

        .page-header {
            text-align: center;
            margin-bottom: var(--space-10);
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-4);
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ==================== 账户卡片 ==================== */
        .account-section {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .section-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .section-title-text {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        /* ==================== 用户信息展示 ==================== */
        .user-info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .info-label {
            color: var(--text-tertiary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9375rem;
        }

        /* ==================== 表单样式 ==================== */
        .account-section form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 0;
            width: 100%;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            align-self: flex-start;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            padding: 12px 24px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-1px);
        }

        /* ==================== 消息提示 ==================== */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: var(--space-4);
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        /* ==================== 安全提示 ==================== */
        .security-tips {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }

        .security-tips h3 {
            color: #06b6d4;
            font-size: 0.9375rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .security-tips ul {
            list-style: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 0;
            padding: 0;
        }

        .security-tips li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .security-tips li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #06b6d4;
        }
    </style>

    <style>
        /* 为导航栏留出空间 */
        body {
            padding-top: 64px !important;
        }
    </style>
</head>
<body>
    {% include 'components/v2/navbar.html' %}
    <!-- 导航栏 -->
    <!-- 主内容 -->
    <main class="main-container">
        <div class="page-header">
            <h1>👤 账户管理</h1>
            <p>管理您的账户信息和安全设置</p>
        </div>

        <!-- 用户信息 -->
        <div class="account-section">
            <div class="section-header">
                <span class="section-icon">👤</span>
                <h2 class="section-title-text">基本信息</h2>
            </div>
            <div class="user-info-grid">
                <div class="info-item">
                    <span class="info-label">用户名</span>
                    <span class="info-value" id="currentUsername">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">用户ID</span>
                    <span class="info-value" id="currentUserId">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">账户状态</span>
                    <span class="info-value" style="color: #22c55e;">✓ 正常</span>
                </div>
            </div>
        </div>

        <!-- 修改密码 -->
        <div class="account-section">
            <div class="section-header">
                <span class="section-icon">🔐</span>
                <h2 class="section-title-text">修改密码</h2>
            </div>
            <div id="passwordMessage" class="message"></div>
            <form id="changePasswordForm">
                <div class="form-group">
                    <label class="form-label">当前密码</label>
                    <input type="password" class="form-input" id="currentPassword" required 
                           placeholder="请输入当前密码">
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input type="password" class="form-input" id="newPassword" required 
                           placeholder="请输入新密码（至少6位）" minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <input type="password" class="form-input" id="confirmPassword" required 
                           placeholder="请再次输入新密码">
                </div>
                <button type="submit" class="btn-primary" id="submitBtn">
                    💾 保存修改
                </button>
            </form>
        </div>

        <!-- 安全提示 -->
        <div class="security-tips">
            <h3>🔒 安全提示</h3>
            <ul>
                <li>定期更换密码可以提高账户安全性</li>
                <li>密码应包含字母、数字和特殊字符</li>
                <li>避免使用与其他网站相同的密码</li>
                <li>不要在公共设备上保存密码</li>
            </ul>
        </div>

        <!-- 退出登录 -->
        <div class="account-section" style="border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05);">
            <div class="section-header">
                <span class="section-icon" style="background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));">🚪</span>
                <h2 class="section-title-text" style="color: #ef4444;">退出登录</h2>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <p style="color: var(--text-secondary); margin: 0;">退出当前账户，返回登录页面</p>
                <button class="btn-danger" onclick="logout()">
                    退出登录
                </button>
            </div>
        </div>
    </main>

    <script src="/static/js/user-info.js"></script>
    <script>
        // 加载当前用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/current-user');
                const data = await response.json();
                if (data.success) {
                    document.getElementById('currentUsername').textContent = data.username || '{{ session.username }}' || '未知';
                    document.getElementById('currentUserId').textContent = data.user_id || '{{ session.user_id }}' || '-';
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
                document.getElementById('currentUsername').textContent = '{{ session.username }}' || '未知';
            }
        }

        // 页面加载时获取用户信息
        document.addEventListener('DOMContentLoaded', loadUserInfo);

        // 修改密码表单提交
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('passwordMessage');
            const submitBtn = document.getElementById('submitBtn');

            // 验证
            if (newPassword !== confirmPassword) {
                messageEl.textContent = '❌ 两次输入的新密码不一致';
                messageEl.className = 'message error';
                return;
            }

            if (newPassword.length < 6) {
                messageEl.textContent = '❌ 新密码至少需要6位';
                messageEl.className = 'message error';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '💾 保存中...';

            try {
                const response = await fetch('/api/account/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    messageEl.textContent = '✅ ' + result.message;
                    messageEl.className = 'message success';
                    // 清空表单
                    document.getElementById('changePasswordForm').reset();
                } else {
                    messageEl.textContent = '❌ ' + (result.error || '修改失败');
                    messageEl.className = 'message error';
                }
            } catch (error) {
                messageEl.textContent = '❌ 网络错误，请稍后重试';
                messageEl.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 保存修改';
            }
        });

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/logout';
            }
        }
    </script>
    <script src="{{ url_for('static', filename='js/account-manager.js') }}?v=2"></script>
</body>
</html>
