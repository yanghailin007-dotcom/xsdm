<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像素材库</title>
    <link rel="stylesheet" href="/static/css/still-image-library.css">
    <link rel="stylesheet" href="/static/css/confirm-dialog.css">
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <button class="btn-back" onclick="window.location.href='/landing'">🏠 返回首页</button>
                <h1 class="nav-title">📸 剧照图片素材库</h1>
                <div class="nav-links">
                    <a href="/novels" class="nav-link">📚 小说项目</a>
                    <a href="/portrait-studio" class="nav-link">🎨 剧照工作台</a>
                    <a href="/video-generation" class="nav-link">🎬 视频生成</a>
                    <span class="nav-user" style="margin-right: 12px; color: var(--text-secondary);">👤 <span id="usernameText">加载中...</span></span>
                    <button class="btn-logout" onclick="logout()">🚪 退出</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- 页面头部 -->
            <header class="page-header">
                <h2>剧照图片素材库</h2>
                <p class="page-subtitle">管理和查看您生成的所有剧照图片</p>
            </header>

            <!-- 统计信息 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-icon">📊</span>
                    <span class="stat-label">总数量:</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">👤</span>
                    <span class="stat-label">角色剧照:</span>
                    <span class="stat-value" id="characterCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎬</span>
                    <span class="stat-label">场景剧照:</span>
                    <span class="stat-value" id="sceneCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🎨</span>
                    <span class="stat-label">自定义剧照:</span>
                    <span class="stat-value" id="customCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💾</span>
                    <span class="stat-label">总大小:</span>
                    <span class="stat-value" id="totalSize">0 MB</span>
                </div>
            </div>

            <!-- 过滤器 -->
            <div class="filters">
                <div class="filter-group">
                    <label>类型:</label>
                    <select id="typeFilter">
                        <option value="">全部</option>
                        <option value="character">角色剧照</option>
                        <option value="scene">场景剧照</option>
                        <option value="custom">自定义剧照</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>小说:</label>
                    <select id="novelFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>状态:</label>
                    <select id="statusFilter">
                        <option value="">全部</option>
                        <option value="completed">已完成</option>
                        <option value="pending">生成中</option>
                        <option value="failed">失败</option>
                    </select>
                </div>
                <div class="filter-group">
                    <button id="refreshBtn" class="btn btn-secondary">🔄 刷新</button>
                    <button id="exportBtn" class="btn btn-secondary">📤 导出元数据</button>
                </div>
            </div>

            <!-- 图像网格 -->
            <div id="imageGrid" class="image-grid">
                <!-- 图像卡片将在这里动态加载 -->
            </div>

            <!-- 空状态 -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📷</div>
                <p>暂无图像素材</p>
                <p class="empty-hint">前往角色或场景生成页面创建您的第一张图像</p>
                <div class="empty-actions">
                    <a href="/character-portrait" class="btn btn-primary">生成角色剧照</a>
                    <a href="/video-studio" class="btn btn-secondary">生成场景剧照</a>
                </div>
            </div>

            <!-- 加载状态 -->
            <div id="loadingState" class="loading-state" style="display: none;">
                <div class="spinner"></div>
                <p>正在加载剧照图片...</p>
            </div>
        </div>
    </div>

    <!-- 图片详情模态框 -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="剧照图片" class="modal-image">
                <div class="modal-info">
                    <h3 id="modalTitle">剧照详情</h3>
                    <div class="info-row">
                        <span class="info-label">类型:</span>
                        <span class="info-value" id="modalType">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">小说:</span>
                        <span class="info-value" id="modalNovel">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">角色/事件:</span>
                        <span class="info-value" id="modalCharacter">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">生成时间:</span>
                        <span class="info-value" id="modalDate">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">文件大小:</span>
                        <span class="info-value" id="modalSize">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">提示词:</span>
                        <span class="info-value" id="modalPrompt">-</span>
                    </div>
                    <div class="modal-actions">
                        <button id="downloadBtn" class="btn btn-primary">💾 下载</button>
                        <button id="deleteBtn" class="btn btn-danger">🗑️ 删除</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/still-image-library.js"></script>
    <script src="/static/js/confirm-dialog.js"></script>
    <script>
        function logout() {
            confirmLogout().then(confirmed => {
                if (confirmed) {
                    window.location.href = '/logout';
                }
            });
        }
    </script>
    <script src="/static/js/user-info.js"></script>
</body>
</html>
