<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大文娱系统 - 未来已至</title>
    <style>
        /* ==================== 基础变量 ==================== */
        :root {
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --accent-500: #06b6d4;
            --purple-500: #a855f7;
            
            --gray-900: #0f172a;
            --gray-800: #1e293b;
            
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: var(--gray-900);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        /* ==================== 宇宙背景 ==================== */
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
        }

        /* 星星层 */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.7), transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 8s infinite linear;
            opacity: 0.8;
        }

        .stars:nth-child(2) {
            background-size: 300px 300px;
            animation: twinkle 12s infinite linear reverse;
            opacity: 0.5;
        }

        .stars:nth-child(3) {
            background-size: 400px 400px;
            animation: twinkle 15s infinite linear;
            opacity: 0.3;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        /* 流星效果 */
        .meteor {
            position: absolute;
            width: 300px;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(255,255,255,0) 0%, 
                rgba(99, 102, 241, 0.8) 50%, 
                rgba(255,255,255,0) 100%);
            transform: rotate(-45deg);
            animation: meteor 4s infinite;
            opacity: 0;
        }

        .meteor:nth-child(4) { top: 10%; left: 80%; animation-delay: 0s; }
        .meteor:nth-child(5) { top: 30%; left: 60%; animation-delay: 1.5s; }
        .meteor:nth-child(6) { top: 50%; left: 90%; animation-delay: 3s; }
        .meteor:nth-child(7) { top: 70%; left: 70%; animation-delay: 4.5s; }

        @keyframes meteor {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateX(-800px) translateY(800px) rotate(-45deg); opacity: 0; }
        }

        /* 光晕效果 */
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: pulse 6s infinite ease-in-out;
        }

        .glow-1 {
            top: -10%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, transparent 70%);
        }

        .glow-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.4) 0%, transparent 70%);
            animation-delay: 3s;
        }

        .glow-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
            animation-delay: 1.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        /* 粒子效果 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0; }
        }

        /* 数据流 */
        .data-stream {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(99, 102, 241, 0.5), transparent);
            animation: dataFlow 4s infinite linear;
            opacity: 0.3;
        }

        @keyframes dataFlow {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* ==================== 主内容 ==================== */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            display: flex;
            justify-content: flex-end;
            z-index: 100;
            animation: fadeInDown 0.6s ease-out;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
            color: #818cf8;
            transform: translateY(-2px);
        }

        /* Logo区域 */
        .hero-section {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 1s ease-out;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .logo {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            border-radius: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            box-shadow: 
                0 20px 60px rgba(99, 102, 241, 0.4),
                0 0 100px rgba(99, 102, 241, 0.2);
            animation: logoFloat 4s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: ringPulse 3s ease-in-out infinite;
        }

        .logo-ring:nth-child(2) {
            width: 220px;
            height: 220px;
            border-color: rgba(6, 182, 212, 0.2);
            animation-delay: 0.5s;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        .main-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            letter-spacing: 8px;
            text-shadow: 0 0 80px rgba(99, 102, 241, 0.3);
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--text-secondary);
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 1.125rem;
            color: var(--text-tertiary);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            letter-spacing: 2px;
        }

        /* 入口卡片区域 */
        .entry-section {
            width: 100%;
            max-width: 1000px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .entry-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .entry-card {
            position: relative;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            text-align: center;
        }

        .entry-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .entry-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .entry-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .entry-card:hover::before {
            opacity: 1;
        }

        .entry-card:hover::after {
            opacity: 0.3;
        }

        .card-icon-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 150px;
            opacity: 0.03;
            pointer-events: none;
            transition: all 0.4s;
        }

        .entry-card:hover .card-icon-bg {
            opacity: 0.08;
            transform: translate(-50%, -50%) scale(1.2) rotate(10deg);
        }

        .card-emoji {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            transition: all 0.4s;
            position: relative;
            z-index: 1;
        }

        .entry-card:hover .card-emoji {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 15px 50px rgba(99, 102, 241, 0.5);
        }

        .card-title {
            font-size: 1.875rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 1rem;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
        }

        .card-description {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .card-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 9999px;
            color: #818cf8;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            text-decoration: none;
        }

        .entry-card:hover .card-btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        /* 视频卡片特殊样式 */
        .video-card .card-emoji {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            box-shadow: 0 10px 40px rgba(236, 72, 153, 0.4);
        }

        .video-card:hover .card-emoji {
            box-shadow: 0 15px 50px rgba(236, 72, 153, 0.5);
        }

        .video-card::before {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        }

        .video-card::after {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        }

        .video-card .card-btn {
            background: rgba(236, 72, 153, 0.2);
            border-color: rgba(236, 72, 153, 0.4);
            color: #f472b6;
        }

        .video-card:hover .card-btn {
            background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
        }

        /* 底部 */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.875rem;
            letter-spacing: 2px;
        }

        .footer-link {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.3s;
            margin-left: 1rem;
        }

        .footer-link:hover {
            color: #a5b4fc;
        }

        /* 扫描线 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 3px
            );
            pointer-events: none;
            z-index: 1000;
            opacity: 0.5;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-content {
                padding: 2rem 1rem;
            }

            .entry-cards {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .entry-card {
                padding: 2rem 1.5rem;
            }

            .logo {
                width: 100px;
                height: 100px;
                font-size: 48px;
            }

            .logo-ring {
                width: 130px;
                height: 130px;
            }

            .logo-ring:nth-child(2) {
                width: 160px;
                height: 160px;
            }

            .main-title {
                letter-spacing: 4px;
            }

            .subtitle {
                letter-spacing: 6px;
            }

            .footer {
                position: relative;
                margin-top: 3rem;
                padding-bottom: 1.5rem;
            }

            .top-nav {
                justify-content: center;
                padding: 1rem;
            }
        }
    </style>
</head>

                    ⚡ 创造点
                </div>
            </div>
            
            <!-- 说明文字 -->
            <p style="
                color: #64748b;
                font-size: 0.875rem;
                margin-bottom: 1.5rem;
                position: relative;
                z-index: 1;
                line-height: 1.6;
            ">
                创造点可用于小说生成、封面制作等功能<br>
                每日签到还可额外获得奖励哦～
            </p>
            
            <!-- 按钮 -->
            <button onclick="closeFirstLoginModal()" style="
                width: 100%;
                padding: 1rem 1.5rem;
                background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
                border: none;
                border-radius: 0.75rem;
                color: #0f172a;
                font-size: 1rem;
                font-weight: 700;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
                transition: all 0.2s;
                position: relative;
                z-index: 1;
            " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(251, 191, 36, 0.5)'" 
            onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(251, 191, 36, 0.4)'">
                🚀 开始创作之旅
            </button>
        </div>
    </div>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
    </style>

    <script>
        // 显示首次登录奖励弹窗
        async function showFirstLoginBonus() {
            try {
                // 获取当前用户信息
                const response = await fetch('/api/current-user');
                const data = await response.json();
                
                if (!data.success) return;
                
                const userId = data.user_id || data.username;
                const username = data.username;
                
                // 按用户隔离的localStorage key
                const storageKey = `register_bonus_shown_${userId}`;
                
                // 检查是否已经显示过（本地缓存）
                if (localStorage.getItem(storageKey)) {
                    return;
                }
                
                // 获取用户余额信息
                const balanceResponse = await fetch('/api/points/balance');
                const balanceData = await balanceResponse.json();
                
                if (!balanceData.success) return;
                
                const balance = balanceData.data.balance || 0;
                const totalEarned = balanceData.data.total_earned || 0;
                
                // 如果用户有余额且是首次获得奖励（总赚取包含注册奖励）
                // 或者用户余额>=88（注册奖励金额）
                if (balance >= 88 && totalEarned >= 88) {
                    // 显示弹窗
                    const modal = document.getElementById('firstLoginModal');
                    if (modal) {
                        modal.style.display = 'flex';
                        
                        // 标记为已显示（按用户隔离）
                        localStorage.setItem(storageKey, 'true');
                        
                        // 添加礼花效果
                        createConfetti();
                    }
                }
            } catch (error) {
                console.error('显示首次登录奖励失败:', error);
            }
        }
        
        // 关闭弹窗
        function closeFirstLoginModal() {
            const modal = document.getElementById('firstLoginModal');
            modal.style.opacity = '0';
            setTimeout(() => {
                modal.style.display = 'none';
                modal.style.opacity = '1';
            }, 300);
        }
        
        // 礼花效果
        function createConfetti() {
            const colors = ['#fbbf24', '#f59e0b', '#fcd34d', '#fbbf24', '#fff'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.cssText = `
                        position: fixed;
                        width: 10px;
                        height: 10px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: ${Math.random() * 100}vw;
                        top: -10px;
                        border-radius: 50%;
                        z-index: 999999;
                        animation: confettiFall ${2 + Math.random() * 2}s linear forwards;
                    `;
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }
        
        // 添加礼花动画
        const confettiStyle = document.createElement('style');
        confettiStyle.textContent = `
            @keyframes confettiFall {
                to {
                    transform: translateY(100vh) rotate(720deg);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(confettiStyle);

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = [
                'rgba(99, 102, 241, 0.6)', 
                'rgba(6, 182, 212, 0.6)', 
                'rgba(168, 85, 247, 0.6)',
                'rgba(255, 255, 255, 0.4)'
            ];

            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.width = (2 + Math.random() * 4) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
            checkLoginStatus();
            // 检查并显示首次登录奖励
            setTimeout(showFirstLoginBonus, 500);
        });

        // 检查登录状态并更新链接
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/current-user');
                const data = await response.json();
                const link = document.getElementById('manageAccountLink');
                
                if (data.success) {
                    // 已登录，跳转到账户管理页
                    link.href = '/account';
                    link.textContent = '账户管理';
                } else {
                    // 未登录，保持登录页
                    link.href = '/login';
                    link.textContent = '管理登录';
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
            }
        }

        // 🔥 智能跳转：根据登录状态决定跳转目标
        async function enterNovel() {
            document.body.style.transition = 'opacity 0.5s';
            document.body.style.opacity = '0';
            
            try {
                const response = await fetch('/api/check-session');
                const data = await response.json();
                
                setTimeout(() => {
                    if (data.success && data.logged_in) {
                        // 已登录：跳转到工作台
                        window.location.href = '/v2/project-management';
                    } else {
                        // 未登录：跳转到登录页
                        window.location.href = '/login';
                    }
                }, 500);
            } catch (error) {
                console.error('检查登录状态失败:', error);
                setTimeout(() => {
                    window.location.href = '/login';
                }, 500);
            }
        }

        function enterVideo() {
            document.body.style.transition = 'opacity 0.5s';
            document.body.style.opacity = '0';
            setTimeout(() => window.location.href = '/video-generation', 500);
        }

        document.addEventListener('mousemove', function(e) {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            const cards = document.querySelectorAll('.entry-card');
            cards.forEach((card, index) => {
                const factor = (index + 1) * 0.5;
                card.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
</body>
</html>
