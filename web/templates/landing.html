<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大文娱系统 - 未来已至</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            background: #0a0e27;
            min-height: 100vh;
        }

        /* 动态星空背景 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1321 100%);
            overflow: hidden;
            z-index: 0;
        }

        /* 星星层 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 8s infinite linear;
            opacity: 0.6;
        }

        .stars:nth-child(2) {
            background-image: 
                radial-gradient(2px 2px at 100px 150px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 200px 50px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 300px 100px, #ffffff, rgba(0,0,0,0));
            background-size: 400px 200px;
            animation: twinkle 12s infinite linear reverse;
            opacity: 0.4;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.3; }
        }

        /* 流星效果 */
        .meteor {
            position: absolute;
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(100,200,255,0.8), rgba(255,255,255,0));
            transform: rotate(-45deg);
            animation: meteor 3s infinite;
            opacity: 0;
        }

        .meteor:nth-child(3) {
            top: 20%;
            left: 80%;
            animation-delay: 0.5s;
        }

        .meteor:nth-child(4) {
            top: 50%;
            left: 70%;
            animation-delay: 2s;
        }

        .meteor:nth-child(5) {
            top: 70%;
            left: 90%;
            animation-delay: 3.5s;
        }

        @keyframes meteor {
            0% {
                transform: translateX(0) translateY(0) rotate(-45deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateX(-1000px) translateY(1000px) rotate(-45deg);
                opacity: 0;
            }
        }

        /* 网格地面 */
        .grid-floor {
            position: absolute;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 60%;
            background: 
                linear-gradient(transparent 0%, rgba(100, 200, 255, 0.03) 2%, transparent 3%),
                linear-gradient(90deg, transparent 0%, rgba(100, 200, 255, 0.03) 2%, transparent 3%);
            background-size: 100px 100px;
            transform: perspective(500px) rotateX(60deg);
            animation: gridMove 20s infinite linear;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(100px); }
        }

        /* 光晕效果 */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: pulse 4s infinite ease-in-out;
        }

        .glow-1 {
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, #4a9eff 0%, transparent 70%);
        }

        .glow-2 {
            bottom: -200px;
            right: -200px;
            background: radial-gradient(circle, #a855f7 0%, transparent 70%);
            animation-delay: 2s;
        }

        .glow-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            opacity: 0.2;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.4; }
        }

        /* 粒子效果 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* 主内容区 */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Logo和标题 */
        .logo-section {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 1s ease-out;
        }

        .logo {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoFloat 4s infinite ease-in-out;
        }
        
        .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(100, 200, 255, 0.6));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 800;
            background: linear-gradient(135deg, #4a9eff 0%, #a855f7 50%, #06b6d4 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 60px rgba(100, 200, 255, 0.3);
        }

        .subtitle {
            font-size: clamp(16px, 2.5vw, 24px);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .tagline {
            font-size: clamp(14px, 2vw, 18px);
            color: rgba(100, 200, 255, 0.7);
            letter-spacing: 2px;
            max-width: 600px;
            line-height: 1.8;
        }

        /* 入口卡片区域 */
        .entry-cards {
            display: flex;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .entry-card {
            position: relative;
            width: 320px;
            height: 420px;
            background: linear-gradient(135deg, rgba(20, 30, 60, 0.8) 0%, rgba(30, 40, 80, 0.6) 100%);
            border-radius: 24px;
            border: 1px solid rgba(100, 200, 255, 0.2);
            backdrop-filter: blur(20px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .entry-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(100, 200, 255, 0.3) 25%, 
                transparent 50%, 
                rgba(168, 85, 247, 0.3) 75%, 
                transparent 100%);
            border-radius: 24px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .entry-card:hover {
            transform: translateY(-20px) scale(1.05);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 60px rgba(100, 200, 255, 0.3);
        }

        .entry-card:hover::before {
            opacity: 1;
            animation: borderGlow 2s infinite linear;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* 卡片图标 */
        .card-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            opacity: 0.15;
            transition: all 0.4s;
        }

        .entry-card:hover .card-icon {
            opacity: 0.25;
            transform: translate(-50%, -50%) scale(1.2) rotate(10deg);
        }

        /* 卡片内容 */
        .card-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .card-emoji {
            font-size: 80px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
            transition: all 0.4s;
        }

        .entry-card:hover .card-emoji {
            transform: scale(1.2) rotate(-5deg);
            filter: drop-shadow(0 15px 40px rgba(100, 200, 255, 0.4));
        }

        .card-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 16px;
            letter-spacing: 2px;
        }

        .card-description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .card-button {
            padding: 14px 40px;
            background: linear-gradient(135deg, #4a9eff 0%, #a855f7 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(100, 200, 255, 0.3);
        }

        .card-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(100, 200, 255, 0.5);
        }

        /* 特殊样式 - 动漫卡片 */
        .anime-card .card-emoji {
            filter: drop-shadow(0 10px 30px rgba(255, 100, 150, 0.3));
        }

        .anime-card .card-button {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff4757 100%);
            box-shadow: 0 4px 20px rgba(255, 107, 157, 0.3);
        }

        .anime-card:hover .card-emoji {
            filter: drop-shadow(0 15px 40px rgba(255, 100, 150, 0.4));
        }

        .anime-card:hover .card-button {
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.5);
        }

        /* 底部信息 */
        .footer {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .footer-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .footer-link {
            color: rgba(100, 200, 255, 0.6);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-link:hover {
            color: rgba(100, 200, 255, 1);
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 3px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* 动画关键帧 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .entry-cards {
                flex-direction: column;
                align-items: center;
                gap: 30px;
            }

            .entry-card {
                width: 100%;
                max-width: 320px;
                height: 380px;
            }

            .logo {
                font-size: 60px;
            }

            .title {
                letter-spacing: 2px;
            }

            .subtitle {
                letter-spacing: 4px;
            }
        }

        /* 数据流动画 */
        .data-stream {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(100, 200, 255, 0.8), transparent);
            animation: dataFlow 3s infinite linear;
            opacity: 0.3;
        }

        @keyframes dataFlow {
            0% {
                transform: translateY(-100px);
                opacity: 0;
            }
            50% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* 全息效果 */
        .hologram {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(100, 200, 255, 0.2);
            border-radius: 50%;
            animation: hologramRotate 10s infinite linear;
            opacity: 0.1;
        }

        @keyframes hologramRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
    </style>
</head>
<body>
    <!-- 背景层 -->
    <div class="background">
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="grid-floor"></div>
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
        
        <!-- 粒子容器 -->
        <div class="particles" id="particles"></div>
        
        <!-- 数据流 -->
        <div class="data-stream" style="left: 10%; animation-delay: 0s;"></div>
        <div class="data-stream" style="left: 30%; animation-delay: 1s;"></div>
        <div class="data-stream" style="left: 50%; animation-delay: 2s;"></div>
        <div class="data-stream" style="left: 70%; animation-delay: 1.5s;"></div>
        <div class="data-stream" style="left: 90%; animation-delay: 0.5s;"></div>
        
        <!-- 全息效果 -->
        <div class="hologram" style="top: 10%; left: 5%;"></div>
        <div class="hologram" style="bottom: 10%; right: 5%; animation-delay: 5s;"></div>
    </div>

    <!-- 扫描线效果 -->
    <div class="scanline"></div>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- Logo区域 -->
        <div class="logo-section">
            <div class="logo">🤖</div>
            <h1 class="title">大文娱系统</h1>
            <p class="subtitle">ENTERTAINMENT UNIVERSE</p>
            <p class="tagline">
                AI驱动的全能娱乐创作平台<br>
                小说·动漫·游戏·影视，一站式创作体验
            </p>
        </div>

        <!-- 入口卡片 -->
        <div class="entry-cards">
            <!-- 小说入口 -->
            <div class="entry-card novel-card" onclick="enterNovel()">
                <div class="card-icon">📚</div>
                <div class="card-content">
                    <div class="card-emoji">📖</div>
                    <h2 class="card-title">小说创作</h2>
                    <p class="card-description">
                        AI驱动的智能小说生成系统<br>
                        从创意到成品，一站式创作体验
                    </p>
                    <button class="card-button">
                        进入 →
                    </button>
                </div>
            </div>

            <!-- 动漫入口 -->
            <div class="entry-card anime-card" onclick="enterAnime()">
                <div class="card-icon">🎬</div>
                <div class="card-content">
                    <div class="card-emoji">🎨</div>
                    <h2 class="card-title">动漫创作</h2>
                    <p class="card-description">
                        即将上线<br>
                        AI辅助的动漫制作平台
                    </p>
                    <button class="card-button">
                        敬请期待 →
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部信息 -->
    <div class="footer">
        <p class="footer-text">
            © 2024 大文娱系统 | <a href="/login" class="footer-link">登录</a>
        </p>
    </div>

    <script>
        // 生成随机粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                
                // 随机颜色
                const colors = ['rgba(100, 200, 255, 0.6)', 'rgba(168, 85, 247, 0.6)', 'rgba(6, 182, 212, 0.6)'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                container.appendChild(particle);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
        });

        // 进入小说创作
        function enterNovel() {
            // 添加过渡效果
            document.body.style.transition = 'opacity 0.5s';
            document.body.style.opacity = '0';
            
            setTimeout(function() {
                window.location.href = '/home';
            }, 500);
        }

        // 进入动漫创作（暂未开发）
        function enterAnime() {
            alert('动漫创作功能正在开发中，敬请期待！\n\n您可以先体验小说创作功能。');
        }

        // 鼠标移动视差效果
        document.addEventListener('mousemove', function(e) {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            
            const cards = document.querySelectorAll('.entry-card');
            cards.forEach(card => {
                card.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
