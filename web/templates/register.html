<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 大文娱创作平台</title>
    <style>
        /* ==================== 完整设计系统内联版 ==================== */
        :root {
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-200: #c7d2fe;
            --primary-300: #a5b4fc;
            --primary-400: #818cf8;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --primary-800: #3730a3;
            --primary-900: #312e81;

            --accent-500: #06b6d4;
            --accent-600: #0891b2;

            --success-500: #22c55e;
            --error-500: #ef4444;
            --error-600: #dc2626;

            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;

            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);

            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;

            --text-xs: 0.75rem;
            --text-sm: 0.875rem;
            --text-base: 1rem;
            --text-lg: 1.125rem;
            --text-xl: 1.25rem;
            --text-2xl: 1.5rem;
            --text-3xl: 1.875rem;

            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;

            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-3xl: 2rem;
            --radius-full: 9999px;

            --transition-fast: 150ms ease;
            --transition-normal: 250ms ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            font-size: 16px;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ==================== 注册页面样式 ==================== */
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            background: 
                radial-gradient(ellipse at top, #1b2735 0%, #090a0f 100%);
        }

        /* 动态背景 */
        .register-page::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(6, 182, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        /* 星星背景 */
        .register-page::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.3), transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 8s infinite linear;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.3; }
        }

        /* 注册容器 */
        .register-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .register-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* 装饰发光 */
        .register-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
        }

        .register-glow-1 {
            top: -100px;
            right: -100px;
            background: var(--primary-500);
        }

        .register-glow-2 {
            bottom: -100px;
            left: -100px;
            background: var(--accent-500);
        }

        /* 头部 */
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        .register-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .register-title {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-subtitle {
            font-size: 0.875rem;
            color: var(--text-tertiary);
        }

        /* 表单样式 */
        .register-form {
            position: relative;
            z-index: 1;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.15s;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: all 0.15s;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-input:focus + .input-icon {
            color: var(--primary-400);
        }

        /* 密码强度 */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .password-strength-text {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            color: var(--text-muted);
        }

        /* 用户名状态 */
        .username-status {
            font-size: 0.75rem;
            margin-top: 0.25rem;
            min-height: 1rem;
        }

        .username-status.available {
            color: var(--success-500);
        }

        .username-status.unavailable {
            color: var(--error-500);
        }

        .username-status.checking {
            color: var(--text-muted);
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 分隔线 */
        .divider-text {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 登录链接 */
        .login-prompt {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .login-link {
            color: var(--primary-400);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }

        .login-link:hover {
            color: var(--primary-300);
        }

        /* 消息提示 */
        .message {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            animation: shake 0.5s ease-out;
        }

        .message.show {
            display: flex;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .message.info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 加载动画 */
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 页脚 */
        .register-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-page">
        <!-- 注册容器 -->
        <div class="register-container">
            <div class="register-card">
                <!-- 装饰发光 -->
                <div class="register-glow register-glow-1"></div>
                <div class="register-glow register-glow-2"></div>

                <!-- 头部 -->
                <div class="register-header">
                    <div class="register-logo">🚀</div>
                    <h1 class="register-title">创建账户</h1>
                    <p class="register-subtitle">加入大文娱创作平台，开启AI创作之旅</p>
                </div>

                <!-- 消息提示 -->
                <div id="messageBox" class="message">
                    <span id="messageIcon">⚠️</span>
                    <span id="messageText">消息内容</span>
                </div>

                <!-- 注册表单 -->
                <form class="register-form" id="registerForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username-input" 
                                class="form-input" 
                                placeholder="请输入用户名（3-20个字符）"
                                required
                                autocomplete="username"
                                maxlength="20"
                            >
                            <span class="input-icon">👤</span>
                        </div>
                        <div class="username-status" id="usernameStatus"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password-input" 
                                class="form-input" 
                                placeholder="请输入密码（至少6个字符）"
                                required
                                autocomplete="new-password"
                            >
                            <span class="input-icon">🔒</span>
                        </div>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="passwordStrengthText"></div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password-confirm-input" 
                                class="form-input" 
                                placeholder="请再次输入密码"
                                required
                                autocomplete="new-password"
                            >
                            <span class="input-icon">🔐</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱（可选）</label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                id="email-input" 
                                class="form-input" 
                                placeholder="请输入邮箱"
                                autocomplete="email"
                            >
                            <span class="input-icon">📧</span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="registerBtn">
                        <span>注 册</span>
                        <div id="loadingSpinner" class="loading-spinner" style="display: none;"></div>
                    </button>
                </form>

                <!-- 分隔线 -->
                <div class="divider-text">已有账户</div>

                <!-- 登录链接 -->
                <div class="login-prompt">
                    已有账户？<a href="/login" class="login-link">立即登录</a>
                </div>
            </div>

            <!-- 页脚 -->
            <div class="register-footer">
                <p>&copy; 2024 大文娱系统 | 版本 2.0</p>
            </div>
        </div>
    </div>

    <script>
        // 获取元素
        const usernameInput = document.getElementById('username-input');
        const passwordInput = document.getElementById('password-input');
        const passwordConfirmInput = document.getElementById('password-confirm-input');
        const emailInput = document.getElementById('email-input');
        const registerBtn = document.getElementById('registerBtn');
        const form = document.getElementById('registerForm');
        const messageBox = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        const messageIcon = document.getElementById('messageIcon');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const usernameStatus = document.getElementById('usernameStatus');
        const passwordStrengthBar = document.getElementById('passwordStrengthBar');
        const passwordStrengthText = document.getElementById('passwordStrengthText');

        let usernameCheckTimeout = null;

        // 显示消息
        function showMessage(message, type = 'info') {
            messageText.textContent = message;
            messageBox.className = 'message show ' + type;
            
            // 设置图标
            const icons = {
                'error': '❌',
                'success': '✅',
                'info': 'ℹ️'
            };
            messageIcon.textContent = icons[type] || 'ℹ️';
            
            // 自动隐藏成功消息
            if (type === 'success') {
                setTimeout(() => {
                    messageBox.classList.remove('show');
                }, 3000);
            }
        }

        // 隐藏消息
        function hideMessage() {
            messageBox.classList.remove('show');
        }

        // 检查用户名可用性
        function checkUsername(username) {
            if (username.length < 3 || username.length > 20) {
                usernameStatus.textContent = '';
                usernameStatus.className = 'username-status';
                return;
            }

            usernameStatus.textContent = '检查中...';
            usernameStatus.className = 'username-status checking';

            clearTimeout(usernameCheckTimeout);
            usernameCheckTimeout = setTimeout(() => {
                fetch('/api/register/check-username', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.available) {
                        usernameStatus.textContent = '✓ 用户名可用';
                        usernameStatus.className = 'username-status available';
                    } else {
                        usernameStatus.textContent = '✗ 用户名已存在';
                        usernameStatus.className = 'username-status unavailable';
                    }
                })
                .catch(() => {
                    usernameStatus.textContent = '';
                    usernameStatus.className = 'username-status';
                });
            }, 500);
        }

        // 密码强度检查
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const width = Math.min(strength * 20, 100);
            const colors = ['#ef4444', '#ef4444', '#f59e0b', '#22c55e', '#22c55e'];
            const texts = ['太弱', '弱', '一般', '强', '很强'];

            passwordStrengthBar.style.width = width + '%';
            passwordStrengthBar.style.background = colors[strength - 1] || 'transparent';
            passwordStrengthText.textContent = password ? (texts[strength - 1] || '') : '';
            passwordStrengthText.style.color = colors[strength - 1] || 'var(--text-muted)';
        }

        // 用户名输入检查
        usernameInput.addEventListener('input', () => {
            hideMessage();
            checkUsername(usernameInput.value.trim());
        });

        // 密码强度检查
        passwordInput.addEventListener('input', () => {
            hideMessage();
            checkPasswordStrength(passwordInput.value);
        });

        // 确认密码输入
        passwordConfirmInput.addEventListener('input', () => {
            hideMessage();
        });

        // 邮箱输入
        emailInput.addEventListener('input', () => {
            hideMessage();
        });

        // 提交注册
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;
            const email = emailInput.value.trim();

            // 验证
            if (username.length < 3 || username.length > 20) {
                showMessage('用户名长度必须在3-20个字符之间', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码长度至少6个字符', 'error');
                return;
            }

            if (password !== passwordConfirm) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            // 验证邮箱格式（如果提供了）
            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('邮箱格式不正确', 'error');
                return;
            }

            hideMessage();
            registerBtn.disabled = true;
            loadingSpinner.style.display = 'block';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        email: email || null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('注册成功！正在跳转到登录页面...', 'success');
                    registerBtn.innerHTML = '<span>✓ 注册成功</span>';
                    registerBtn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(data.error || '注册失败', 'error');
                    registerBtn.disabled = false;
                    loadingSpinner.style.display = 'none';
                }
            } catch (error) {
                console.error('注册错误:', error);
                showMessage('注册失败，请稍后重试', 'error');
                registerBtn.disabled = false;
                loadingSpinner.style.display = 'none';
            }
        });

        // 页面加载完成后焦点到用户名
        document.addEventListener('DOMContentLoaded', () => {
            usernameInput.focus();
        });
    </script>
</body>
</html>
