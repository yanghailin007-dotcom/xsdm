<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说生成系统 - 我的作品</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/confirm-dialog.css">
    <style>
        /* 作品页面样式 */
        .novels-hero {
            background: var(--gradient-primary);
            color: white;
            padding: 60px 20px 40px;
            text-align: center;
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
            margin-bottom: 60px;
        }

        .novels-hero h1 {
            font-size: clamp(2rem, 4vw, 2.5rem);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .novels-hero p {
            font-size: 1.125rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 筛选和搜索区域 */
        .filters-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 32px;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .filters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filters-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        .view-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .view-btn {
            padding: 8px 16px;
            border: 1px solid var(--gray-300);
            background: white;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--text-sm);
        }

        .view-btn.active {
            background: var(--gradient-primary);
            color: white;
            border-color: var(--primary-500);
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            transition: border-color var(--transition-fast);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary-500);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        .filter-tags {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 16px;
            background: var(--gray-100);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .filter-tag.active {
            background: var(--primary-100);
            color: var(--primary-700);
            border-color: var(--primary-300);
        }

        /* 统计信息 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-600);
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--gray-600);
            font-size: var(--text-sm);
            font-weight: 600;
        }

        /* 小说网格布局 */
        .novels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
            margin-bottom: 60px;
        }

        .novel-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: all var(--transition-normal);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .novel-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .novel-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .novel-card:hover::before {
            opacity: 0.05;
        }

        .novel-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--gray-100);
            position: relative;
            z-index: 1;
        }

        .novel-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .novel-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: var(--text-sm);
            color: var(--gray-500);
        }

        .novel-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .novel-body {
            padding: 20px 24px;
            position: relative;
            z-index: 1;
        }

        .novel-description {
            color: var(--gray-600);
            font-size: var(--text-sm);
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .novel-progress {
            margin-bottom: 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: var(--text-sm);
        }

        .progress-label {
            color: var(--gray-600);
            font-weight: 600;
        }

        .progress-value {
            color: var(--primary-600);
            font-weight: 700;
        }

        .progress-bar {
            height: 8px;
            background: var(--gray-100);
            border-radius: var(--radius-full);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-success);
            border-radius: var(--radius-full);
            transition: width var(--transition-normal);
            position: relative;
        }

        .progress-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .novel-actions {
            display: flex;
            gap: 12px;
        }

        .novel-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            text-align: center;
        }

        .novel-btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .novel-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .novel-btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .novel-btn-secondary:hover {
            background: var(--gray-200);
        }

        .novel-status {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-completed {
            background: var(--success-100);
            color: var(--success-700);
        }

        .status-generating {
            background: var(--warning-100);
            color: var(--warning-700);
        }

        .status-paused {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--gray-500);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-700);
            margin-bottom: 12px;
        }

        .empty-description {
            font-size: 1rem;
            margin-bottom: 32px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .novels-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .filters-header {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: none;
            }

            .view-controls {
                justify-content: center;
            }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .novel-actions {
                flex-direction: column;
            }
        }

        /* 加载动画 */
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <button class="btn btn-secondary btn-small" onclick="location.href='/landing'" style="margin-right: 12px;">
                    🏠 返回首页
                </button>
                📚 我的作品
            </div>
            <div class="navbar-actions">
                <button class="btn btn-primary btn-small" onclick="location.href='/'">
                    ➕ 新建创作
                </button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/cover-maker'">
                    🎨 封面制作
                </button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/dashboard'">
                    📊 仪表板
                </button>
                <button class="btn btn-danger btn-small" onclick="logout()">
                    退出登录
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 英雄区 -->
        <div class="novels-hero">
            <h1>📚 我的创作作品</h1>
            <p>管理和浏览您所有的AI小说创作项目</p>
        </div>

        <!-- 统计信息 -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="total-novels">-</div>
                <div class="stat-label">创作项目</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-chapters">-</div>
                <div class="stat-label">总章节数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-words">-</div>
                <div class="stat-label">总字数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-novels">-</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>

        <!-- 筛选和搜索 -->
        <div class="filters-section">
            <div class="filters-header">
                <div class="filters-title">筛选和搜索</div>
                <div class="view-controls">
                    <button class="view-btn active" onclick="setViewMode('grid')">📱 网格</button>
                    <button class="view-btn" onclick="setViewMode('list')">📋 列表</button>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" placeholder="搜索小说标题、简介或设定..." id="search-input" oninput="filterNovels()">
            </div>
            
            <div class="filter-tags">
                <div class="filter-tag active" data-filter="all" onclick="setFilter('all')">全部</div>
                <div class="filter-tag" data-filter="completed" onclick="setFilter('completed')">已完成</div>
                <div class="filter-tag" data-filter="generating" onclick="setFilter('generating')">生成中</div>
                <div class="filter-tag" data-filter="paused" onclick="setFilter('paused')">已暂停</div>
            </div>
        </div>

        <!-- 小说列表 -->
        <div class="novels-grid" id="novels-grid">
            <!-- 加载状态 -->
            <div class="loading-skeleton novel-card" style="height: 400px;"></div>
            <div class="loading-skeleton novel-card" style="height: 400px;"></div>
            <div class="loading-skeleton novel-card" style="height: 400px;"></div>
        </div>

        <!-- 空状态（默认隐藏） -->
        <div class="empty-state" id="empty-state" style="display: none;">
            <div class="empty-icon">📝</div>
            <div class="empty-title">还没有创作作品</div>
            <div class="empty-description">
                开始您的第一个AI小说创作之旅吧！点击上方"新建创作"按钮开始。
            </div>
            <button class="btn btn-primary" onclick="location.href='/'">
                🚀 开始创作
            </button>
        </div>
    </div>

    <script>
        let novels = [];
        let currentFilter = 'all';
        let currentViewMode = 'grid';
        let searchTerm = '';

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            loadNovels();
            loadStats();
        });

        // 加载小说列表
        async function loadNovels() {
            try {
                const response = await fetch('/api/projects');
                if (!response.ok) throw new Error('加载小说项目失败');

                novels = await response.json();
                renderNovels();
            } catch (error) {
                console.error('加载小说失败:', error);
                showError('加载失败: ' + error.message);
            }
        }

        // 加载统计信息
        async function loadStats() {
            try {
                const response = await fetch('/api/dashboard-stats');
                if (response.ok) {
                    const stats = await response.json();
                    document.getElementById('total-novels').textContent = stats.total_projects || 0;
                    document.getElementById('total-chapters').textContent = stats.total_chapters || 0;
                    document.getElementById('total-words').textContent = (stats.total_words || 0).toLocaleString();
                    document.getElementById('completed-novels').textContent = stats.completed_projects || 0;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 渲染小说列表
        function renderNovels() {
            const grid = document.getElementById('novels-grid');
            const emptyState = document.getElementById('empty-state');

            // 应用筛选
            let filteredNovels = novels.filter(novel => {
                const matchesFilter = currentFilter === 'all' || novel.status === currentFilter;
                const matchesSearch = searchTerm === '' || 
                    novel.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (novel.synopsis && novel.synopsis.toLowerCase().includes(searchTerm.toLowerCase())) ||
                    (novel.core_setting && novel.core_setting.toLowerCase().includes(searchTerm.toLowerCase()));
                return matchesFilter && matchesSearch;
            });

            if (filteredNovels.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                
                if (searchTerm || currentFilter !== 'all') {
                    emptyState.querySelector('.empty-title').textContent = '没有找到匹配的作品';
                    emptyState.querySelector('.empty-description').textContent = '尝试调整搜索关键词或筛选条件。';
                } else {
                    emptyState.querySelector('.empty-title').textContent = '还没有创作作品';
                    emptyState.querySelector('.empty-description').textContent = '开始您的第一个AI小说创作之旅吧！点击上方"新建创作"按钮开始。';
                }
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = filteredNovels.map(novel => createNovelCard(novel)).join('');
        }

        // 创建小说卡片
        function createNovelCard(novel) {
            const progress = novel.total_chapters > 0 ? 
                Math.round((novel.completed_chapters / novel.total_chapters) * 100) : 0;
            
            const createdDate = novel.created_at ? 
                new Date(novel.created_at).toLocaleDateString('zh-CN') : '未知';
            
            const statusClass = getStatusClass(novel.status);
            const statusText = getStatusText(novel.status);

            return `
                <div class="novel-card">
                    <div class="novel-status ${statusClass}">${statusText}</div>
                    
                    <div class="novel-header">
                        <h3 class="novel-title">${escapeHtml(novel.title)}</h3>
                        <div class="novel-meta">
                            <div class="novel-meta-item">
                                <span>📅</span>
                                <span>${createdDate}</span>
                            </div>
                            <div class="novel-meta-item">
                                <span>📖</span>
                                <span>${novel.completed_chapters}/${novel.total_chapters}章</span>
                            </div>
                            <div class="novel-meta-item">
                                <span>⭐</span>
                                <span>${novel.average_score || '-'}/10</span>
                            </div>
                            <div class="novel-meta-item">
                                <span>📝</span>
                                <span>${(novel.word_count || 0).toLocaleString()}字</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="novel-body">
                        <p class="novel-description">
                            ${escapeHtml(novel.synopsis || novel.core_setting || '暂无简介')}
                        </p>
                        
                        <div class="novel-progress">
                            <div class="progress-info">
                                <span class="progress-label">完成进度</span>
                                <span class="progress-value">${progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        
                        <div class="novel-actions">
                            <button class="novel-btn novel-btn-primary" onclick="viewNovel('${escapeHtml(novel.title)}')">
                                📖 阅读
                            </button>
                            <button class="novel-btn novel-btn-secondary" onclick="continueNovel('${escapeHtml(novel.title)}')">
                                ➕ 续写
                            </button>
                            <button class="novel-btn novel-btn-secondary" onclick="exportNovel('${escapeHtml(novel.title)}')">
                                📥 导出
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const statusMap = {
                'completed': 'status-completed',
                'generating': 'status-generating',
                'paused': 'status-paused'
            };
            return statusMap[status] || 'status-paused';
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'completed': '已完成',
                'generating': '生成中',
                'paused': '已暂停'
            };
            return statusMap[status] || '未知';
        }

        // 设置筛选条件
        function setFilter(filter) {
            currentFilter = filter;
            
            // 更新筛选按钮状态
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
                if (tag.dataset.filter === filter) {
                    tag.classList.add('active');
                }
            });
            
            renderNovels();
        }

        // 设置视图模式
        function setViewMode(mode) {
            currentViewMode = mode;
            
            // 更新视图按钮状态
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const grid = document.getElementById('novels-grid');
            if (mode === 'list') {
                grid.style.gridTemplateColumns = '1fr';
            } else {
                grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(350px, 1fr))';
            }
        }

        // 搜索筛选
        function filterNovels() {
            searchTerm = document.getElementById('search-input').value;
            renderNovels();
        }

        // 查看小说
        function viewNovel(title) {
            window.open(`/novel?title=${encodeURIComponent(title)}`, '_blank');
        }

        // 续写小说
        function continueNovel(title) {
            showContinueDialog(title);
        }

        // 显示续写对话框
        function showContinueDialog(title) {
            // 创建续写对话框
            const dialogHtml = `
                <div id="continue-dialog" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 99999; display: flex; justify-content: center; align-items: center;">
                    <div style="background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; border: 2px solid rgba(255,255,255,0.3);">
                        <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px 12px 0 0;">
                            <h3 style="margin: 0; font-size: 18px; font-weight: 600;">📝 续写小说</h3>
                            <p style="margin: 8px 0 0 0; opacity: 0.9;">继续生成小说《${escapeHtml(title)}》</p>
                        </div>
                        
                        <div style="padding: 24px;">
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">小说标题</label>
                                <input type="text" id="continue-title" value="${escapeHtml(title)}" readonly style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; background: #f9fafb; color: #666;">
                            </div>
                            
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">从第几章开始续写</label>
                                <input type="number" id="continue-from-chapter" value="1" min="1" style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;">
                                <div style="font-size: 12px; color: #666; margin-top: 4px;">可以从任何章节开始，包括重新生成已有章节</div>
                            </div>
                            
                            <div style="margin-bottom: 20px;">
                                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">续写章节数</label>
                                <select id="continue-chapters-count" style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px;">
                                    <option value="5">5章</option>
                                    <option value="10" selected>10章</option>
                                    <option value="20">20章</option>
                                    <option value="50">50章</option>
                                </select>
                            </div>
                            
                            <div style="display: flex; gap: 12px;">
                                <button onclick="closeContinueDialog()" style="flex: 1; padding: 12px; border: 2px solid #e5e7eb; background: white; color: #666; border-radius: 8px; cursor: pointer; font-weight: 600;">
                                    取消
                                </button>
                                <button onclick="startContinueGeneration()" style="flex: 2; padding: 12px; border: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; cursor: pointer; font-weight: 600;">
                                    🚀 开始续写
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // 添加对话框到页面
            const dialogContainer = document.createElement('div');
            dialogContainer.innerHTML = dialogHtml;
            document.body.appendChild(dialogContainer);
            
            // 存储当前小说标题
            window.currentContinueTitle = title;
            
            // 加载小说信息以确定起始章节
            loadNovelInfoForContinue(title);
        }

        // 加载小说信息用于续写
        async function loadNovelInfoForContinue(title) {
            try {
                console.log('🔍 开始加载小说信息用于续写:', title);
                const response = await fetch(`/api/project/${encodeURIComponent(title)}`);
                console.log('📡 API响应状态:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('❌ API响应错误:', response.status, errorText);
                    throw new Error(`加载失败 (${response.status}): ${errorText}`);
                }
                
                const novelData = await response.json();
                console.log('✅ 小说数据加载成功:', novelData);
                
                const generatedChapters = novelData.generated_chapters || {};
                const chapterNumbers = Object.keys(generatedChapters).map(num => parseInt(num)).sort((a, b) => a - b);
                
                console.log('📚 章节数据:', {
                    totalChapters: Object.keys(generatedChapters).length,
                    chapterNumbers: chapterNumbers,
                    generatedChapters: Object.keys(generatedChapters)
                });
                
                if (chapterNumbers.length > 0) {
                    const lastChapter = chapterNumbers[chapterNumbers.length - 1];
                    const nextChapter = lastChapter + 1;
                    
                    console.log('🎯 计算续写起始点:', {
                        lastChapter: lastChapter,
                        nextChapter: nextChapter
                    });
                    
                    const fromChapterInput = document.getElementById('continue-from-chapter');
                    if (fromChapterInput) {
                        fromChapterInput.value = nextChapter;
                        // 不再限制最小章节号，允许重新生成已有章节
                    }
                    
                    // 显示当前进度信息
                    const totalChapters = novelData.current_progress?.total_chapters || novelData.total_chapters || 200;
                    const progressInfo = document.createElement('div');
                    progressInfo.style.cssText = 'background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #1e40af;';
                    progressInfo.innerHTML = `
                        <div style="font-weight: 600; margin-bottom: 4px;">📊 当前进度</div>
                        <div>已生成: ${chapterNumbers.length} 章</div>
                        <div>建议从第 ${nextChapter} 章开始续写（可修改）</div>
                        <div>总计划: ${totalChapters} 章</div>
                        <div style="margin-top: 8px; color: #059669; font-weight: 600;">💡 提示：可以从任何章节开始，包括重新生成已有章节</div>
                    `;
                    
                    const fromChapterContainer = document.getElementById('continue-from-chapter').parentElement;
                    fromChapterContainer.parentNode.insertBefore(progressInfo, fromChapterContainer);
                } else {
                    console.log('⚠️ 该小说没有生成的章节');
                    
                    // 如果没有章节，提示用户
                    const fromChapterInput = document.getElementById('continue-from-chapter');
                    if (fromChapterInput) {
                        fromChapterInput.value = 1;
                        fromChapterInput.min = 1;
                    }
                    
                    const infoInfo = document.createElement('div');
                    infoInfo.style.cssText = 'background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 13px; color: #1e40af;';
                    infoInfo.innerHTML = `
                        <div style="font-weight: 600; margin-bottom: 4px;">💡 提示</div>
                        <div>该小说还没有生成任何章节，可以从第1章开始生成。</div>
                        <div>建议总章节数：200章（可根据需要调整）</div>
                    `;
                    
                    const fromChapterContainer = document.getElementById('continue-from-chapter').parentElement;
                    fromChapterContainer.parentNode.insertBefore(infoInfo, fromChapterContainer);
                }
                
                // 启用续写按钮
                const startBtn = document.querySelector('button[onclick="startContinueGeneration()"]');
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.textContent = '🚀 开始续写';
                    startBtn.style.opacity = '1';
                }
                
            } catch (error) {
                console.error('❌ 加载小说信息失败:', error);
                alert('加载小说信息失败: ' + error.message);
                closeContinueDialog();
            }
        }

        // 关闭续写对话框
        function closeContinueDialog() {
            const dialog = document.getElementById('continue-dialog');
            if (dialog) {
                dialog.remove();
            }
            window.currentContinueTitle = null;
        }

        // 开始续写生成
        async function startContinueGeneration() {
            const title = window.currentContinueTitle;
            if (!title) return;
            
            const fromChapter = parseInt(document.getElementById('continue-from-chapter').value);
            const additionalChapters = parseInt(document.getElementById('continue-chapters-count').value);
            
            if (isNaN(fromChapter) || fromChapter < 1) {
                alert('请输入有效的起始章节数');
                return;
            }
            
            if (isNaN(additionalChapters) || additionalChapters < 1) {
                alert('请输入有效的续写章节数');
                return;
            }
            
            try {
                // 显示加载界面
                showLoadingOverlay(`正在启动续写任务...`);
                
                // 调用续写API
                const response = await fetch(`/api/project/${encodeURIComponent(title)}/resume-generation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        from_chapter: fromChapter,
                        additional_chapters: additionalChapters
                    })
                });
                
                // 检查是否需要登录
                if (response.status === 401) {
                    hideLoadingOverlay();
                    alert('请先登录后再试');
                    window.location.href = '/login';
                    return;
                }
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                
                if (result.success) {
                    // 关闭续写对话框
                    closeContinueDialog();
                    
                    // 显示成功消息并跳转到首页监控进度
                    hideLoadingOverlay();
                    showSuccessMessage(`续写任务已启动！任务ID: ${result.task_id}`);
                    
                    // 延迟跳转到首页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    throw new Error(result.error || '启动续写任务失败');
                }
                
            } catch (error) {
                hideLoadingOverlay();
                alert(`续写失败: ${error.message}`);
                console.error('续写失败:', error);
            }
        }

        // 显示加载覆盖层
        function showLoadingOverlay(message) {
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay-temp';
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.7); z-index: 100000;
                display: flex; justify-content: center; align-items: center;
            `;
            
            overlay.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px;">
                    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                    <h3>${message}</h3>
                </div>
            `;
            
            document.body.appendChild(overlay);
        }

        // 隐藏加载覆盖层
        function hideLoadingOverlay() {
            const overlay = document.getElementById('loading-overlay-temp');
            if (overlay) {
                overlay.remove();
            }
        }

        // 显示成功消息
        function showSuccessMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.style.cssText = `
                position: fixed; top: 20px; right: 20px; z-index: 100001;
                background: linear-gradient(135deg, #10b981, #059669); color: white;
                padding: 16px 24px; border-radius: 8px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
                font-weight: 600; animation: slideInRight 0.3s ease-out;
            `;
            messageDiv.textContent = message;
            
            document.body.appendChild(messageDiv);
            
            // 自动移除
            setTimeout(() => {
                if (messageDiv.parentNode) {
                    messageDiv.style.animation = 'slideOutRight 0.3s ease-out';
                    setTimeout(() => {
                        if (messageDiv.parentNode) {
                            messageDiv.parentNode.removeChild(messageDiv);
                        }
                    }, 300);
                }
            }, 3000);
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
            @keyframes slideOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100px); } }
        `;
        document.head.appendChild(style);

        // 导出小说
        async function exportNovel(title) {
            try {
                const response = await fetch(`/api/project/${encodeURIComponent(title)}/export`);
                if (!response.ok) throw new Error('导出失败');

                const result = await response.json();

                if (result.content) {
                    const blob = new Blob([result.content], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${title}.txt`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } else {
                    throw new Error('导出内容为空');
                }
            } catch (error) {
                alert(`导出失败: ${error.message}`);
            }
        }

        // 显示错误信息
        function showError(message) {
            const grid = document.getElementById('novels-grid');
            grid.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--error-600);">
                    <div style="font-size: 48px; margin-bottom: 16px;">❌</div>
                    <h3 style="margin-bottom: 12px;">加载失败</h3>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="loadNovels()" style="margin-top: 20px;">
                        重试
                    </button>
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // 退出登录 - 使用美观的确认对话框
        function logout() {
            confirmLogout().then(confirmed => {
                if (confirmed) {
                    window.location.href = '/logout';
                }
            });
        }
    </script>
    <script src="/static/js/confirm-dialog.js"></script>
</body>
</html>
