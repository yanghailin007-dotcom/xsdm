{% extends "layouts/base-v2.html" %}

{% block title %}我的作品{% endblock %}

{% block content %}
<div class="page-content">
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">📚 我的创作作品</h1>
        <p class="page-subtitle">管理和浏览您所有的AI小说创作项目</p>
    </div>

    <!-- 统计信息 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            </div>
            <div class="stat-value" id="total-novels">-</div>
            <div class="stat-label">创作项目</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14,2 14,8 20,8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10,9 9,9 8,9"></polyline>
                </svg>
            </div>
            <div class="stat-value" id="total-chapters">-</div>
            <div class="stat-label">总章节数</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #10b981 0%, #22c55e 100%);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 7 4 4 20 4 20 7"></polyline>
                    <line x1="9" y1="20" x2="15" y2="20"></line>
                    <line x1="12" y1="4" x2="12" y2="20"></line>
                </svg>
            </div>
            <div class="stat-value" id="total-words">-</div>
            <div class="stat-label">总字�?/div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22,4 12,14.01 9,11.01"></polyline>
                </svg>
            </div>
            <div class="stat-value" id="completed-novels">-</div>
            <div class="stat-label">已完�?/div>
        </div>
    </div>

    <!-- 筛选区�?-->
    <div class="filter-section">
        <div class="filter-header">
            <div class="filter-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
                筛选和搜索
            </div>
            <div class="view-controls">
                <button class="view-btn active" onclick="setViewMode('grid')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    网格
                </button>
                <button class="view-btn" onclick="setViewMode('list')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"></line>
                        <line x1="8" y1="12" x2="21" y2="12"></line>
                        <line x1="8" y1="18" x2="21" y2="18"></line>
                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                    </svg>
                    列表
                </button>
            </div>
        </div>
        
        <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" placeholder="搜索小说标题、简介或设定..." id="search-input" oninput="filterNovels()">
        </div>
        
        <div class="filter-tags">
            <button class="filter-tag active" data-filter="all" onclick="setFilter('all')">全部</button>
            <button class="filter-tag" data-filter="completed" onclick="setFilter('completed')">已完�?/button>
            <button class="filter-tag" data-filter="generating" onclick="setFilter('generating')">生成�?/button>
            <button class="filter-tag" data-filter="paused" onclick="setFilter('paused')">已暂�?/button>
        </div>
    </div>

    <!-- 小说列表 -->
    <div class="novels-grid" id="novels-grid">
        <!-- 加载骨架 -->
        <div class="loading-skeleton" style="height: 320px;"></div>
        <div class="loading-skeleton" style="height: 320px;"></div>
        <div class="loading-skeleton" style="height: 320px;"></div>
    </div>

    <!-- 空状�?-->
    <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">📝</div>
        <div class="empty-title">还没有创作作�?/div>
        <div class="empty-description">
            开始您的第一个AI小说创作之旅吧！点击上方"新建创作"按钮开始�?
        </div>
        <a href="/" class="btn btn-primary">🚀 开始创�?/a>
    </div>
</div>

<style>
/* 页面内容区域 */
.page-content {
    padding: var(--v2-space-8) 0;
    max-width: 1400px;
    margin: 0 auto;
}

.page-header {
    text-align: center;
    margin-bottom: var(--v2-space-8);
}

.page-title {
    font-size: var(--v2-text-3xl);
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1 0%, #06b6d4 50%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--v2-space-3);
}

.page-subtitle {
    font-size: var(--v2-text-lg);
    color: var(--v2-text-secondary);
}

/* 统计卡片 */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--v2-space-6);
    margin-bottom: var(--v2-space-8);
}

.stat-card {
    background: var(--v2-bg-secondary);
    border: 1px solid var(--v2-border-default);
    border-radius: var(--v2-radius-xl);
    padding: var(--v2-space-6);
    text-align: center;
    transition: all 0.3s ease;
}

.stat-card:hover {
    border-color: var(--v2-primary-500);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
}

.stat-icon {
    width: 48px;
    height: 48px;
    border-radius: var(--v2-radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--v2-space-4);
    color: white;
}

.stat-value {
    font-size: var(--v2-text-3xl);
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--v2-space-2);
}

.stat-label {
    font-size: var(--v2-text-sm);
    color: var(--v2-text-secondary);
    font-weight: 500;
}

/* 筛选区�?*/
.filter-section {
    background: var(--v2-bg-secondary);
    border: 1px solid var(--v2-border-default);
    border-radius: var(--v2-radius-xl);
    padding: var(--v2-space-6);
    margin-bottom: var(--v2-space-8);
}

.filter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--v2-space-5);
    flex-wrap: wrap;
    gap: var(--v2-space-4);
}

.filter-title {
    font-size: var(--v2-text-lg);
    font-weight: 600;
    color: var(--v2-text-primary);
    display: flex;
    align-items: center;
    gap: var(--v2-space-2);
}

.filter-title svg {
    color: var(--v2-primary-400);
}

.view-controls {
    display: flex;
    gap: var(--v2-space-2);
}

.view-btn {
    display: flex;
    align-items: center;
    gap: var(--v2-space-2);
    padding: var(--v2-space-2) var(--v2-space-4);
    background: var(--v2-border-default);
    border: 1px solid var(--v2-border-hover);
    border-radius: var(--v2-radius-lg);
    color: var(--v2-text-secondary);
    font-size: var(--v2-text-sm);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}

.view-btn:hover {
    border-color: var(--v2-primary-500);
    color: var(--v2-text-primary);
}

.view-btn.active {
    background: var(--v2-primary-600);
    border-color: var(--v2-primary-500);
    color: white;
}

/* 搜索�?*/
.search-box {
    position: relative;
    margin-bottom: var(--v2-space-4);
}

.search-box input {
    width: 100%;
    padding: var(--v2-space-3) var(--v2-space-4) var(--v2-space-3) var(--v2-space-12);
    background: var(--v2-border-default);
    border: 1px solid var(--v2-border-hover);
    border-radius: var(--v2-radius-lg);
    color: var(--v2-text-primary);
    font-size: var(--v2-text-base);
    transition: all 0.2s ease;
}

.search-box input::placeholder {
    color: var(--v2-text-tertiary);
}

.search-box input:focus {
    outline: none;
    border-color: var(--v2-primary-500);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.search-icon {
    position: absolute;
    left: var(--v2-space-4);
    top: 50%;
    transform: translateY(-50%);
    color: var(--v2-text-tertiary);
    pointer-events: none;
}

/* 筛选标�?*/
.filter-tags {
    display: flex;
    gap: var(--v2-space-3);
    flex-wrap: wrap;
}

.filter-tag {
    padding: var(--v2-space-2) var(--v2-space-4);
    background: var(--v2-border-default);
    border: 1px solid var(--v2-border-hover);
    border-radius: 9999px;
    font-size: var(--v2-text-sm);
    color: var(--v2-text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
}

.filter-tag:hover {
    border-color: var(--v2-primary-500);
    color: var(--v2-text-primary);
}

.filter-tag.active {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border-color: transparent;
    color: white;
}

/* 小说网格 */
.novels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: var(--v2-space-6);
}

.novels-grid.list-view {
    grid-template-columns: 1fr;
}

/* 小说卡片 */
.novel-card {
    background: var(--v2-bg-secondary);
    border: 1px solid var(--v2-border-default);
    border-radius: var(--v2-radius-xl);
    overflow: hidden;
    transition: all 0.3s ease;
    position: relative;
}

.novel-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #06b6d4, #8b5cf6);
    opacity: 0;
    transition: opacity 0.3s;
}

.novel-card:hover {
    border-color: var(--v2-primary-500);
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
}

.novel-card:hover::before {
    opacity: 1;
}

.novel-header {
    padding: var(--v2-space-6);
    border-bottom: 1px solid var(--v2-border-default);
    position: relative;
}

.novel-status {
    position: absolute;
    top: var(--v2-space-5);
    right: var(--v2-space-5);
    padding: var(--v2-space-1) var(--v2-space-3);
    border-radius: 9999px;
    font-size: var(--v2-text-xs);
    font-weight: 600;
}

.status-completed {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
}

.status-generating {
    background: rgba(245, 158, 11, 0.15);
    color: #fbbf24;
}

.status-paused {
    background: rgba(148, 163, 184, 0.15);
    color: var(--v2-text-secondary);
}

.novel-title {
    font-size: var(--v2-text-lg);
    font-weight: 700;
    color: var(--v2-text-primary);
    margin-bottom: var(--v2-space-3);
    line-height: 1.4;
    padding-right: 6rem;
}

.novel-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--v2-space-4);
    font-size: var(--v2-text-sm);
    color: var(--v2-text-tertiary);
}

.novel-meta-item {
    display: flex;
    align-items: center;
    gap: var(--v2-space-1);
}

.novel-body {
    padding: var(--v2-space-5) var(--v2-space-6);
}

.novel-description {
    color: var(--v2-text-secondary);
    font-size: var(--v2-text-sm);
    line-height: 1.6;
    margin-bottom: var(--v2-space-5);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.novel-progress {
    margin-bottom: var(--v2-space-5);
}

.progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--v2-space-2);
    font-size: var(--v2-text-sm);
}

.progress-label {
    color: var(--v2-text-tertiary);
}

.progress-value {
    color: var(--v2-primary-400);
    font-weight: 600;
}

.progress-bar {
    height: 6px;
    background: var(--v2-border-default);
    border-radius: 9999px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #06b6d4);
    border-radius: 9999px;
    transition: width 0.5s ease;
    position: relative;
}

.progress-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2s infinite;
}

@keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.novel-actions {
    display: flex;
    gap: var(--v2-space-3);
}

.novel-btn {
    flex: 1;
    padding: var(--v2-space-3) var(--v2-space-4);
    border: none;
    border-radius: var(--v2-radius-lg);
    font-size: var(--v2-text-sm);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
}

.novel-btn-primary {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
}

.novel-btn-primary:hover {
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    transform: translateY(-2px);
}

.novel-btn-secondary {
    background: var(--v2-border-default);
    color: var(--v2-text-secondary);
    border: 1px solid var(--v2-border-hover);
}

.novel-btn-secondary:hover {
    background: var(--v2-border-hover);
    color: var(--v2-text-primary);
    border-color: var(--v2-border-hover);
}

/* 加载骨架 */
.loading-skeleton {
    background: linear-gradient(90deg, var(--v2-border-default) 25%, var(--v2-border-hover) 50%, var(--v2-border-default) 75%);
    background-size: 200% 100%;
    animation: loading 1.5s infinite;
    border-radius: var(--v2-radius-xl);
}

@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* 空状�?*/
.empty-state {
    text-align: center;
    padding: var(--v2-space-16) var(--v2-space-8);
    background: var(--v2-bg-secondary);
    border: 1px dashed var(--v2-border-default);
    border-radius: var(--v2-radius-xl);
}

.empty-icon {
    font-size: 4rem;
    margin-bottom: var(--v2-space-6);
    opacity: 0.5;
}

.empty-title {
    font-size: var(--v2-text-xl);
    font-weight: 700;
    color: var(--v2-text-primary);
    margin-bottom: var(--v2-space-3);
}

.empty-description {
    font-size: var(--v2-text-base);
    color: var(--v2-text-tertiary);
    margin-bottom: var(--v2-space-6);
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
}

/* 对话框样�?*/
.dialog-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 10000;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.dialog-content {
    background: var(--v2-bg-secondary);
    border-radius: var(--v2-radius-xl);
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    border: 1px solid var(--v2-border-default);
}

.dialog-header {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    padding: var(--v2-space-5);
    border-radius: var(--v2-radius-xl) var(--v2-radius-xl) 0 0;
}

.dialog-header h3 {
    margin: 0;
    font-size: var(--v2-text-lg);
}

.dialog-header p {
    margin: var(--v2-space-2) 0 0;
    opacity: 0.9;
    font-size: var(--v2-text-sm);
}

.dialog-body {
    padding: var(--v2-space-6);
}

.form-group {
    margin-bottom: var(--v2-space-5);
}

.form-group label {
    display: block;
    margin-bottom: var(--v2-space-2);
    font-weight: 600;
    color: var(--v2-text-primary);
}

.form-group input,
.form-group select {
    width: 100%;
    padding: var(--v2-space-3) var(--v2-space-4);
    background: var(--v2-border-default);
    border: 1px solid var(--v2-border-hover);
    border-radius: var(--v2-radius-lg);
    color: var(--v2-text-primary);
    font-size: var(--v2-text-base);
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--v2-primary-500);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.form-hint {
    font-size: var(--v2-text-xs);
    color: var(--v2-text-tertiary);
    margin-top: var(--v2-space-1);
}

.dialog-actions {
    display: flex;
    gap: var(--v2-space-3);
    padding: 0 var(--v2-space-6) var(--v2-space-6);
}

.dialog-btn {
    flex: 1;
    padding: var(--v2-space-3);
    border: none;
    border-radius: var(--v2-radius-lg);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.dialog-btn.primary {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
}

.dialog-btn.secondary {
    background: var(--v2-border-default);
    color: var(--v2-text-secondary);
    border: 1px solid var(--v2-border-hover);
}

.dialog-btn:hover {
    transform: translateY(-2px);
}

/* 加载覆盖�?*/
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 10001;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(10px);
}

.loading-content {
    background: var(--v2-bg-secondary);
    padding: var(--v2-space-8);
    border-radius: var(--v2-radius-xl);
    text-align: center;
    border: 1px solid var(--v2-border-default);
}

.loading-spinner {
    width: 50px;
    height: 50px;
    border: 4px solid var(--v2-border-default);
    border-top-color: var(--v2-primary-500);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto var(--v2-space-4);
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 提示消息 */
.toast {
    position: fixed;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    padding: var(--v2-space-4) var(--v2-space-8);
    background: var(--v2-bg-secondary);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: var(--v2-radius-lg);
    color: #4ade80;
    font-weight: 600;
    z-index: 10002;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}

/* 响应�?*/
@media (max-width: 1200px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    .page-content {
        padding: var(--v2-space-4) var(--v2-space-4);
    }
    
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--v2-space-4);
    }
    
    .stat-card {
        padding: var(--v2-space-4);
    }
    
    .novels-grid {
        grid-template-columns: 1fr;
    }
    
    .novel-actions {
        flex-direction: column;
    }
    
    .filter-header {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>

<script>
let novels = [];
let currentFilter = 'all';
let currentViewMode = 'grid';
let searchTerm = '';

document.addEventListener('DOMContentLoaded', function() {
    loadNovels();
    loadStats();
});

async function loadNovels() {
    try {
        const response = await fetch('/api/projects');
        if (!response.ok) throw new Error('加载小说项目失败');

        novels = await response.json();
        renderNovels();
    } catch (error) {
        console.error('加载小说失败:', error);
        showError('加载失败: ' + error.message);
    }
}

async function loadStats() {
    try {
        const response = await fetch('/api/dashboard-stats');
        if (response.ok) {
            const stats = await response.json();
            document.getElementById('total-novels').textContent = stats.total_projects || 0;
            document.getElementById('total-chapters').textContent = stats.total_chapters || 0;
            document.getElementById('total-words').textContent = formatNumber(stats.total_words || 0);
            document.getElementById('completed-novels').textContent = stats.completed_projects || 0;
        }
    } catch (error) {
        console.error('加载统计失败:', error);
    }
}

function formatNumber(num) {
    if (num >= 10000) {
        return (num / 10000).toFixed(1) + '�?;
    }
    return num.toLocaleString();
}

function renderNovels() {
    const grid = document.getElementById('novels-grid');
    const emptyState = document.getElementById('empty-state');

    let filteredNovels = novels.filter(novel => {
        const matchesFilter = currentFilter === 'all' || novel.status === currentFilter;
        const matchesSearch = searchTerm === '' || 
            novel.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (novel.synopsis && novel.synopsis.toLowerCase().includes(searchTerm.toLowerCase())) ||
            (novel.core_setting && novel.core_setting.toLowerCase().includes(searchTerm.toLowerCase()));
        return matchesFilter && matchesSearch;
    });

    if (filteredNovels.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        
        if (searchTerm || currentFilter !== 'all') {
            emptyState.querySelector('.empty-title').textContent = '没有找到匹配的作�?;
            emptyState.querySelector('.empty-description').textContent = '尝试调整搜索关键词或筛选条件�?;
        } else {
            emptyState.querySelector('.empty-title').textContent = '还没有创作作�?;
            emptyState.querySelector('.empty-description').textContent = '开始您的第一个AI小说创作之旅吧！点击上方"新建创作"按钮开始�?;
        }
        return;
    }

    grid.style.display = 'grid';
    emptyState.style.display = 'none';

    grid.innerHTML = filteredNovels.map(novel => createNovelCard(novel)).join('');
}

function createNovelCard(novel) {
    const progress = novel.total_chapters > 0 ? 
        Math.round((novel.completed_chapters / novel.total_chapters) * 100) : 0;
    
    const createdDate = novel.created_at ? 
        new Date(novel.created_at).toLocaleDateString('zh-CN') : '未知';
    
    const statusClass = getStatusClass(novel.status);
    const statusText = getStatusText(novel.status);

    return `
        <div class="novel-card">
            <div class="novel-status ${statusClass}">${statusText}</div>
            
            <div class="novel-header">
                <h3 class="novel-title">${escapeHtml(novel.title)}</h3>
                <div class="novel-meta">
                    <div class="novel-meta-item">
                        <span>📅</span>
                        <span>${createdDate}</span>
                    </div>
                    <div class="novel-meta-item">
                        <span>📖</span>
                        <span>${novel.completed_chapters}/${novel.total_chapters}�?/span>
                    </div>
                    <div class="novel-meta-item">
                        <span>�?/span>
                        <span>${novel.average_score || '-'}/10</span>
                    </div>
                    <div class="novel-meta-item">
                        <span>📝</span>
                        <span>${formatNumber(novel.word_count || 0)}�?/span>
                    </div>
                </div>
            </div>
            
            <div class="novel-body">
                <p class="novel-description">
                    ${escapeHtml(novel.synopsis || novel.core_setting || '暂无简�?)}
                </p>
                
                <div class="novel-progress">
                    <div class="progress-info">
                        <span class="progress-label">完成进度</span>
                        <span class="progress-value">${progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                </div>
                
                <div class="novel-actions">
                    <button class="novel-btn novel-btn-primary" onclick="viewNovel('${escapeHtml(novel.title)}')">
                        📖 阅读
                    </button>
                    <button class="novel-btn novel-btn-secondary" onclick="continueNovel('${escapeHtml(novel.title)}')">
                        �?续写
                    </button>
                    <button class="novel-btn novel-btn-secondary" onclick="exportNovel('${escapeHtml(novel.title)}')">
                        📥 导出
                    </button>
                </div>
            </div>
        </div>
    `;
}

function getStatusClass(status) {
    const statusMap = {
        'completed': 'status-completed',
        'generating': 'status-generating',
        'paused': 'status-paused'
    };
    return statusMap[status] || 'status-paused';
}

function getStatusText(status) {
    const statusMap = {
        'completed': '已完�?,
        'generating': '生成�?,
        'paused': '已暂�?
    };
    return statusMap[status] || '未知';
}

function setFilter(filter) {
    currentFilter = filter;
    
    document.querySelectorAll('.filter-tag').forEach(tag => {
        tag.classList.remove('active');
        if (tag.dataset.filter === filter) {
            tag.classList.add('active');
        }
    });
    
    renderNovels();
}

function setViewMode(mode) {
    currentViewMode = mode;
    
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.closest('.view-btn').classList.add('active');
    
    const grid = document.getElementById('novels-grid');
    if (mode === 'list') {
        grid.classList.add('list-view');
    } else {
        grid.classList.remove('list-view');
    }
}

function filterNovels() {
    searchTerm = document.getElementById('search-input').value;
    renderNovels();
}

function viewNovel(title) {
    window.open(`/novel?title=${encodeURIComponent(title)}`, '_blank');
}

function continueNovel(title) {
    showContinueDialog(title);
}

function showContinueDialog(title) {
    const dialogHtml = `
        <div id="continue-dialog" class="dialog-overlay" onclick="if(event.target === this) closeContinueDialog()">
            <div class="dialog-content">
                <div class="dialog-header">
                    <h3>📝 续写小说</h3>
                    <p>继续生成小说�?{escapeHtml(title)}�?/p>
                </div>
                
                <div class="dialog-body">
                    <div class="form-group">
                        <label>小说标题</label>
                        <input type="text" id="continue-title" value="${escapeHtml(title)}" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label>从第几章开始续�?/label>
                        <input type="number" id="continue-from-chapter" value="1" min="1">
                        <div class="form-hint">可以从任何章节开始，包括重新生成已有章节</div>
                    </div>
                    
                    <div class="form-group">
                        <label>续写章节�?/label>
                        <select id="continue-chapters-count">
                            <option value="5">5�?/option>
                            <option value="10" selected>10�?/option>
                            <option value="20">20�?/option>
                            <option value="50">50�?/option>
                        </select>
                    </div>
                </div>
                
                <div class="dialog-actions">
                    <button class="dialog-btn secondary" onclick="closeContinueDialog()">取消</button>
                    <button class="dialog-btn primary" onclick="startContinueGeneration()">🚀 开始续�?/button>
                </div>
            </div>
        </div>
    `;
    
    const dialogContainer = document.createElement('div');
    dialogContainer.innerHTML = dialogHtml;
    document.body.appendChild(dialogContainer);
    
    window.currentContinueTitle = title;
    loadNovelInfoForContinue(title);
}

async function loadNovelInfoForContinue(title) {
    try {
        const response = await fetch(`/api/project/${encodeURIComponent(title)}`);
        
        if (!response.ok) {
            throw new Error(`加载失败 (${response.status})`);
        }
        
        const novelData = await response.json();
        const generatedChapters = novelData.generated_chapters || {};
        const chapterNumbers = Object.keys(generatedChapters).map(num => parseInt(num)).sort((a, b) => a - b);
        
        if (chapterNumbers.length > 0) {
            const lastChapter = chapterNumbers[chapterNumbers.length - 1];
            const nextChapter = lastChapter + 1;
            
            const fromChapterInput = document.getElementById('continue-from-chapter');
            if (fromChapterInput) {
                fromChapterInput.value = nextChapter;
            }
            
            const progressInfo = document.createElement('div');
            progressInfo.style.cssText = 'background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: var(--v2-radius-lg); padding: var(--v2-space-3); margin-bottom: var(--v2-space-4); font-size: var(--v2-text-sm); color: var(--v2-primary-400);';
            progressInfo.innerHTML = `
                <div style="font-weight: 600; margin-bottom: var(--v2-space-1);">📊 当前进度</div>
                <div>已生�? ${chapterNumbers.length} �?| 建议从第 ${nextChapter} 章开始续�?/div>
                <div style="margin-top: var(--v2-space-1); color: var(--v2-accent-cyan);">💡 提示：可以从任何章节开始，包括重新生成已有章节</div>
            `;
            
            const fromChapterContainer = document.getElementById('continue-from-chapter').parentElement;
            fromChapterContainer.parentNode.insertBefore(progressInfo, fromChapterContainer);
        }
    } catch (error) {
        console.error('加载小说信息失败:', error);
    }
}

function closeContinueDialog() {
    const dialog = document.getElementById('continue-dialog');
    if (dialog) {
        dialog.remove();
    }
    window.currentContinueTitle = null;
}

async function startContinueGeneration() {
    const title = window.currentContinueTitle;
    if (!title) return;
    
    const fromChapter = parseInt(document.getElementById('continue-from-chapter').value);
    const additionalChapters = parseInt(document.getElementById('continue-chapters-count').value);
    
    if (isNaN(fromChapter) || fromChapter < 1) {
        alert('请输入有效的起始章节�?);
        return;
    }
    
    if (isNaN(additionalChapters) || additionalChapters < 1) {
        alert('请输入有效的续写章节�?);
        return;
    }
    
    try {
        showLoadingOverlay('正在启动续写任务...');
        
        const response = await fetch(`/api/project/${encodeURIComponent(title)}/resume-generation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                from_chapter: fromChapter,
                additional_chapters: additionalChapters
            })
        });
        
        if (response.status === 401) {
            hideLoadingOverlay();
            alert('请先登录后再�?);
            window.location.href = '/login';
            return;
        }
        
        if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || `HTTP ${response.status}`);
        }
        
        const result = await response.json();
        
        if (result.success) {
            closeContinueDialog();
            hideLoadingOverlay();
            showSuccessMessage(`续写任务已启动！任务ID: ${result.task_id}`);
            
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            throw new Error(result.error || '启动续写任务失败');
        }
        
    } catch (error) {
        hideLoadingOverlay();
        alert(`续写失败: ${error.message}`);
        console.error('续写失败:', error);
    }
}

function showLoadingOverlay(message) {
    const overlay = document.createElement('div');
    overlay.id = 'loading-overlay-temp';
    overlay.className = 'loading-overlay';
    
    overlay.innerHTML = `
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h3 style="color: var(--v2-text-primary); margin: 0;">${message}</h3>
        </div>
    `;
    
    document.body.appendChild(overlay);
}

function hideLoadingOverlay() {
    const overlay = document.getElementById('loading-overlay-temp');
    if (overlay) {
        overlay.remove();
    }
}

function showSuccessMessage(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}

function showError(message) {
    alert(message);
}

function exportNovel(title) {
    window.open(`/api/export-novel?title=${encodeURIComponent(title)}&format=txt`, '_blank');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function logout() {
    confirmLogout().then(confirmed => {
        if (confirmed) {
            window.location.href = '/logout';
        }
    });
}
</script>
{% endblock %}
