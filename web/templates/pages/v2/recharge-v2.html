{% extends "layouts/base-v2.html" %}

{% block title %}充值点数{% endblock %}

{% block extra_css %}
<style>
.recharge-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 24px;
}

.recharge-header {
    text-align: center;
    margin-bottom: 48px;
}

.recharge-title {
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
}

.recharge-subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
}

.balance-card {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
    text-align: center;
}

.balance-label {
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 8px;
}

.balance-value {
    font-size: 48px;
    font-weight: 700;
    color: #fff;
}

.recharge-section {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
}

.recharge-section h2 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 24px;
}

.recharge-options {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
}

.recharge-option {
    position: relative;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
}

.recharge-option:hover {
    border-color: rgba(99, 102, 241, 0.5);
    background: rgba(255,255,255,0.08);
}

.recharge-option.active {
    border-color: #6366f1;
    background: rgba(99, 102, 241, 0.1);
}

.recharge-option .amount {
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
}

.recharge-option .unit {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
}

.recharge-option .bonus {
    position: absolute;
    top: -8px;
    right: -8px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 20px;
}

.custom-amount {
    margin-top: 24px;
}

.custom-amount label {
    display: block;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px;
}

.custom-amount input {
    width: 100%;
    max-width: 200px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 16px;
}

.custom-amount input:focus {
    outline: none;
    border-color: #6366f1;
}

.custom-amount input::placeholder {
    color: rgba(255,255,255,0.3);
}

.recharge-summary {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 20px;
    margin-top: 24px;
}

.summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 14px;
}

.summary-row:last-child {
    margin-bottom: 0;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-weight: 600;
}

.summary-row .label {
    color: rgba(255,255,255,0.6);
}

.summary-row .value {
    color: #fff;
}

.summary-row .value.total {
    color: #6366f1;
    font-size: 18px;
}

.btn-recharge {
    display: block;
    width: 100%;
    padding: 16px 24px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 24px;
}

.btn-recharge:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
}

.btn-recharge:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.recharge-records {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 32px;
}

.recharge-records h2 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 24px;
}

.record-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.record-item:last-child {
    border-bottom: none;
}

.record-info h4 {
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 4px;
}

.record-info p {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
}

.record-amount {
    text-align: right;
}

.record-amount .points {
    font-size: 16px;
    font-weight: 600;
    color: #22c55e;
}

.record-amount .money {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
}

.status-completed {
    color: #22c55e;
}

.status-pending {
    color: #f59e0b;
}

.status-failed {
    color: #ef4444;
}

.payment-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.payment-modal.active {
    display: flex;
}

.payment-modal-content {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
}

.payment-modal-content h3 {
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 16px;
}

.payment-modal-content p {
    color: rgba(255,255,255,0.6);
    margin-bottom: 24px;
}

.loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    background: rgba(34, 197, 94, 0.9);
    color: #fff;
    border-radius: 8px;
    font-weight: 500;
    z-index: 1001;
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}
</style>
{% endblock %}

{% block content %}
<div class="recharge-container">
    <div class="recharge-header">
        <h1 class="recharge-title">充值点数</h1>
        <p class="recharge-subtitle">1元 = 1点，充值越多赠送越多</p>
    </div>

    <div class="balance-card">
        <div class="balance-label">当前余额</div>
        <div class="balance-value" id="current-balance">-</div>
    </div>

    <div class="recharge-section">
        <h2>选择充值金额</h2>
        <div class="recharge-options" id="recharge-options">
            <!-- 动态生成 -->
        </div>
        
        <div class="custom-amount">
            <label>自定义金额</label>
            <input type="number" id="custom-amount" placeholder="请输入金额（元）" min="1">
        </div>

        <div class="recharge-summary" id="recharge-summary" style="display: none;">
            <div class="summary-row">
                <span class="label">充值金额</span>
                <span class="value" id="summary-amount">0元</span>
            </div>
            <div class="summary-row" id="summary-bonus-row">
                <span class="label">赠送点数</span>
                <span class="value" id="summary-bonus">+0点</span>
            </div>
            <div class="summary-row">
                <span class="label">总计获得</span>
                <span class="value total" id="summary-total">0点</span>
            </div>
        </div>

        <button class="btn-recharge" id="btn-recharge" onclick="startRecharge()" disabled>
            立即充值
        </button>
    </div>

    <div class="recharge-records">
        <h2>充值记录</h2>
        <div id="recharge-records">
            <!-- 动态生成 -->
        </div>
    </div>
</div>

<div class="payment-modal" id="payment-modal">
    <div class="payment-modal-content">
        <div class="loading-spinner"></div>
        <h3>正在跳转到支付页面...</h3>
        <p>请在新打开的页面完成支付</p>
        <button class="btn-recharge" onclick="closePaymentModal()" style="margin-top: 16px;">
            取消
        </button>
    </div>
</div>

<script>
let rechargeConfig = null;
let selectedAmount = 0;
let selectedBonus = 0;

// 初始化
document.addEventListener('DOMContentLoaded', async function() {
    await loadConfig();
    await loadBalance();
    await loadRecords();
    
    // 自定义金额输入监听
    document.getElementById('custom-amount').addEventListener('input', function() {
        const value = parseInt(this.value) || 0;
        if (value > 0) {
            // 清除选中状态
            document.querySelectorAll('.recharge-option').forEach(opt => opt.classList.remove('active'));
            selectAmount(value, 0);
        }
    });
});

// 加载配置
async function loadConfig() {
    try {
        const response = await fetch('/api/payment/config');
        const result = await response.json();
        
        if (result.success) {
            rechargeConfig = result.data;
            renderOptions();
        } else {
            showToast(result.error || '加载配置失败');
        }
    } catch (error) {
        console.error('加载配置失败:', error);
        showToast('加载配置失败');
    }
}

// 渲染充值选项
function renderOptions() {
    const container = document.getElementById('recharge-options');
    container.innerHTML = '';
    
    rechargeConfig.recharge_options.forEach(option => {
        const div = document.createElement('div');
        div.className = 'recharge-option';
        div.innerHTML = `
            <div class="amount">${option.amount}</div>
            <div class="unit">元</div>
            ${option.bonus > 0 ? `<div class="bonus">送${option.bonus}</div>` : ''}
        `;
        div.onclick = function() {
            // 清除其他选中状态
            document.querySelectorAll('.recharge-option').forEach(opt => opt.classList.remove('active'));
            // 清除自定义金额
            document.getElementById('custom-amount').value = '';
            // 添加选中状态
            this.classList.add('active');
            selectAmount(option.amount, option.bonus);
        };
        container.appendChild(div);
    });
}

// 选择金额
function selectAmount(amount, bonus) {
    selectedAmount = amount;
    selectedBonus = bonus;
    
    // 更新汇总
    document.getElementById('recharge-summary').style.display = 'block';
    document.getElementById('summary-amount').textContent = amount + '元';
    document.getElementById('summary-bonus').textContent = '+' + bonus + '点';
    document.getElementById('summary-total').textContent = (amount + bonus) + '点';
    
    // 启用充值按钮
    document.getElementById('btn-recharge').disabled = false;
}

// 加载余额
async function loadBalance() {
    try {
        const response = await fetch('/api/points/balance');
        const result = await response.json();
        
        if (result.success) {
            document.getElementById('current-balance').textContent = result.data.balance.toLocaleString();
        }
    } catch (error) {
        console.error('加载余额失败:', error);
    }
}

// 加载充值记录
async function loadRecords() {
    try {
        const response = await fetch('/api/payment/orders');
        const result = await response.json();
        
        const container = document.getElementById('recharge-records');
        
        if (result.success && result.data.orders.length > 0) {
            container.innerHTML = result.data.orders.map(order => `
                <div class="record-item">
                    <div class="record-info">
                        <h4>充值 ${order.amount}点 ${order.bonus > 0 ? `(送${order.bonus}点)` : ''}</h4>
                        <p>${new Date(order.created_at * 1000).toLocaleString()}</p>
                    </div>
                    <div class="record-amount">
                        <div class="points">+${order.total_points}点</div>
                        <div class="money">¥${order.amount}</div>
                        <div class="status-${order.status}">${getStatusText(order.status)}</div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p style="text-align: center; color: rgba(255,255,255,0.4);">暂无充值记录</p>';
        }
    } catch (error) {
        console.error('加载记录失败:', error);
    }
}

function getStatusText(status) {
    const statusMap = {
        'pending': '待支付',
        'completed': '已完成',
        'failed': '失败'
    };
    return statusMap[status] || status;
}

// 开始充值
async function startRecharge() {
    if (selectedAmount <= 0) {
        showToast('请选择充值金额');
        return;
    }
    
    try {
        const response = await fetch('/api/payment/create_order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: selectedAmount })
        });
        
        const result = await response.json();
        
        if (result.success) {
            // 显示支付中弹窗
            document.getElementById('payment-modal').classList.add('active');
            
            // 获取支付表单
            const payResponse = await fetch(`/api/payment/pay?order_id=${result.data.order_id}`);
            const payResult = await payResponse.json();
            
            if (payResult.success) {
                // 创建表单并提交
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = payResult.data.pay_url;
                form.target = '_blank';
                
                for (const [key, value] of Object.entries(payResult.data.pay_params)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = value;
                    form.appendChild(input);
                }
                
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);
                
                // 开始轮询订单状态
                startPolling(result.data.order_id);
            } else {
                closePaymentModal();
                showToast(payResult.error || '支付请求失败');
            }
        } else {
            showToast(result.error || '创建订单失败');
        }
    } catch (error) {
        console.error('充值失败:', error);
        showToast('充值失败，请稍后重试');
    }
}

// 轮询订单状态
function startPolling(orderId) {
    let pollCount = 0;
    const maxPolls = 60; // 最多轮询60次（5分钟）
    
    const pollInterval = setInterval(async () => {
        pollCount++;
        
        if (pollCount > maxPolls) {
            clearInterval(pollInterval);
            closePaymentModal();
            showToast('支付超时，请稍后查询订单状态');
            return;
        }
        
        try {
            const response = await fetch(`/api/payment/query?order_id=${orderId}`);
            const result = await response.json();
            
            if (result.success && result.data.status === 'completed') {
                clearInterval(pollInterval);
                closePaymentModal();
                showToast('充值成功！');
                await loadBalance();
                await loadRecords();
            }
        } catch (error) {
            console.error('轮询失败:', error);
        }
    }, 5000); // 每5秒查询一次
}

function closePaymentModal() {
    document.getElementById('payment-modal').classList.remove('active');
}

function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.remove();
    }, 3000);
}
</script>
{% endblock %}
