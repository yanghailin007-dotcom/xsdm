<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两阶段小说生成 - 第二阶段章节生成</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 第二阶段页面专用样式 */
        .phase-two-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .phase-header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
        }

        .phase-header h1 {
            margin: 0 0 16px 0;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .phase-header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .phase-progress {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            gap: 20px;
        }

        .phase-step {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .phase-step.active {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .phase-step.completed {
            background: #667eea;
            color: white;
        }

        .phase-step.pending {
            background: #f3f4f6;
            color: #6b7280;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .main-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .right-sidebar {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1f2937;
        }

        .section-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .project-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(255, 255, 255, 0.95) 100%);
            border: 2px solid rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        .project-card.selected {
            border-color: #10b981;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(255, 255, 255, 0.95) 100%);
        }

        .project-title {
            font-weight: 700;
            color: #065f46;
            margin-bottom: 8px;
        }

        .project-info {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .project-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-ready {
            background: #d1fae5;
            color: #065f46;
        }

        .status-generating {
            background: #fef3c7;
            color: #92400e;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            color: #1f2937;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .progress-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .progress-section.active {
            display: block;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 6px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .chapter-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .chapter-card:hover {
            border-color: #10b981;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
        }

        .chapter-card.completed {
            background: #d1fae5;
            border-color: #10b981;
        }

        .chapter-card.generating {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .chapter-card.failed {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .chapter-number {
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .chapter-title {
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .chapter-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .chapter-status.completed {
            background: #10b981;
            color: white;
        }

        .chapter-status.generating {
            background: #f59e0b;
            color: white;
        }

        .chapter-status.pending {
            background: #6b7280;
            color: white;
        }

        .chapter-status.failed {
            background: #ef4444;
            color: white;
        }

        .chapter-word-count {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .status-message {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-weight: 600;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
            display: block;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
            display: block;
        }

        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
            display: block;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #f9fafb;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #10b981;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }

        .log-container {
            background: #1f2937;
            color: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        .log-entry.success {
            color: #34d399;
        }

        .log-entry.error {
            color: #f87171;
        }

        .log-entry.warning {
            color: #fbbf24;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .phase-header h1 {
                font-size: 2rem;
            }
            
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .config-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <button class="btn btn-secondary btn-small" onclick="location.href='/'" style="margin-right: 12px;">
                    🏠 返回首页
                </button>
                📝 第二阶段：章节生成
            </div>
            <div class="navbar-actions">
                <button class="btn btn-secondary btn-small" onclick="location.href='/phase-one-setup'">🎨 第一阶段</button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/project-management'">📂 项目管理</button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/novels'">📚 查看生成</button>
                <button class="btn btn-danger btn-small" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="phase-two-container">
        <!-- 页面头部 -->
        <div class="phase-header">
            <h1>📝 第二阶段：章节生成</h1>
            <p>基于第一阶段的设计设定，批量生成高质量的小说章节内容</p>
        </div>

        <!-- 进度指示器 -->
        <div class="phase-progress">
            <div class="phase-step completed" id="step-setup">
                <span>✅</span>
                <span>设计完成</span>
            </div>
            <div class="phase-step active" id="step-generation">
                <span>⚙️</span>
                <span>章节生成</span>
            </div>
            <div class="phase-step pending" id="step-review">
                <span>👁️</span>
                <span>内容审核</span>
            </div>
            <div class="phase-step pending" id="step-complete">
                <span>🎉</span>
                <span>生成完成</span>
            </div>
        </div>

        <!-- 主要布局 -->
        <div class="main-layout">
            <!-- 左侧边栏：项目选择和预览 -->
            <div class="sidebar">
                <div class="section-title">
                    <div class="section-icon">📚</div>
                    <span>选择项目</span>
                </div>

                <div id="projects-list">
                    <div class="loading-spinner"></div>
                    <p style="text-align: center; color: #6b7280; margin-top: 12px;">加载项目中...</p>
                </div>

                <div style="margin-top: 24px;">
                    <button class="btn btn-secondary" style="width: 100%;" onclick="location.href='/phase-one-setup'">
                        ➕ 创建新项目
                    </button>
                </div>
            </div>

            <!-- 中间主内容：生成控制和进度 -->
            <div class="main-content">
                <div class="section-title">
                    <div class="section-icon">🚀</div>
                    <span>章节生成配置</span>
                </div>

                <!-- 项目信息显示 -->
                <div id="selected-project-info" style="display: none;">
                    <div class="result-item">
                        <h4>📚 当前项目</h4>
                        <p><strong>标题:</strong> <span id="current-project-title">-</span></p>
                        <p><strong>总章节:</strong> <span id="current-project-total-chapters">-</span></p>
                        <p><strong>已完成:</strong> <span id="current-project-completed-chapters">-</span></p>
                        <p><strong>状态:</strong> <span id="current-project-status">-</span></p>
                    </div>
                </div>

                <!-- 生成配置表单 -->
                <form id="phase-two-form" onsubmit="startPhaseTwoGeneration(event)" style="display: none;">
                    <div class="config-grid">
                        <div class="form-group">
                            <label for="from-chapter">起始章节</label>
                            <input type="number" id="from-chapter" name="from_chapter" 
                                   value="1" min="1" required>
                        </div>

                        <div class="form-group">
                            <label for="chapters-to-generate">生成章节数</label>
                            <input type="number" id="chapters-to-generate" name="chapters_to_generate" 
                                   value="10" min="1" max="50" required>
                        </div>
                    </div>

                    <div class="config-grid">
                        <div class="form-group">
                            <label for="chapters-per-batch">每批生成章节数</label>
                            <select id="chapters-per-batch" name="chapters_per_batch">
                                <option value="1">1章/批（最稳定）</option>
                                <option value="3" selected>3章/批（推荐）</option>
                                <option value="5">5章/批（较快）</option>
                                <option value="10">10章/批（最快）</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="quality-level">内容质量要求</label>
                            <select id="quality-level" name="quality_level">
                                <option value="standard">标准质量</option>
                                <option value="high" selected>高质量</option>
                                <option value="premium">顶级质量</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="generation-notes">生成说明（可选）</label>
                        <textarea id="generation-notes" name="generation_notes" rows="3"
                                  placeholder="可以添加特殊的生成要求或注意事项..."></textarea>
                    </div>

                    <div class="action-buttons">
                        <button type="button" class="btn btn-secondary" onclick="pauseGeneration()" id="pause-btn" style="display: none;">
                            ⏸️ 暂停生成
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="resumeGeneration()" id="resume-btn" style="display: none;">
                            ▶️ 继续生成
                        </button>
                        <button type="submit" class="btn btn-primary" id="start-btn">
                            🚀 开始生成章节
                        </button>
                    </div>
                </form>

                <!-- 进度显示区域 -->
                <div class="progress-section" id="progress-section">
                    <div class="progress-header">
                        <h3>🔄 正在生成章节...</h3>
                        <div class="progress-percentage" id="progress-percentage">0%</div>
                    </div>
                    
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                    
                    <div id="current-chapter-info" style="margin: 20px 0; padding: 16px; background: #f9fafb; border-radius: 8px; display: none;">
                        <h4>正在生成: <span id="current-chapter-title">-</span></h4>
                        <p>第 <span id="current-chapter-number">-</span> / <span id="total-chapters">-</span> 章</p>
                    </div>
                    
                    <div class="chapter-grid" id="chapter-progress-grid">
                        <!-- 章节进度卡片将在这里动态生成 -->
                    </div>
                    
                    <div style="margin-top: 20px; text-align: center;">
                        <button type="button" class="btn btn-danger" onclick="stopGeneration()" id="stop-btn">
                            ⏹️ 停止生成
                        </button>
                    </div>
                </div>

                <!-- 生成结果区域 -->
                <div id="generation-results" style="display: none;">
                    <div class="section-title">
                        <div class="section-icon">✅</div>
                        <span>生成结果</span>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="total-generated">0</div>
                            <div class="stat-label">生成章节</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="total-words">0</div>
                            <div class="stat-label">总字数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="average-score">0</div>
                            <div class="stat-label">平均质量分</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="generation-time">0分钟</div>
                            <div class="stat-label">生成用时</div>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-secondary" onclick="viewChapters()">
                            📖 查看章节
                        </button>
                        <button class="btn btn-secondary" onclick="continueMoreChapters()">
                            ➕ 继续生成更多
                        </button>
                        <button class="btn btn-primary" onclick="goToReading()">
                            🎉 开始阅读
                        </button>
                    </div>
                </div>

                <!-- 状态消息 -->
                <div class="status-message" id="status-message"></div>
            </div>

            <!-- 右侧边栏：详细信息和日志 -->
            <div class="right-sidebar">
                <div class="section-title">
                    <div class="section-icon">📊</div>
                    <span>项目详情</span>
                </div>

                <div id="project-details">
                    <div class="loading-spinner"></div>
                    <p style="text-align: center; color: #6b7280; margin-top: 12px;">请选择项目</p>
                </div>

                <div class="section-title" style="margin-top: 24px;">
                    <div class="section-icon">📝</div>
                    <span>生成日志</span>
                </div>

                <div class="log-container" id="generation-log">
                    <div class="log-entry info">等待开始生成...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentProject = null;
        let currentTaskId = null;
        let progressInterval = null;
        let generationStartTime = null;

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadAvailableProjects();
        });

        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/health');
                if (!response.ok) {
                    showStatusMessage('⚠️ 请先登录后再使用生成功能', 'error');
                }
            } catch (error) {
                showStatusMessage('⚠️ 请先登录后再使用生成功能', 'error');
            }
        }

        // ==================== 项目管理功能 ====================
        async function loadAvailableProjects() {
            try {
                const response = await fetch('/api/projects/with-phase-status');
                
                if (response.status === 401) {
                    showStatusMessage('请先登录才能加载项目', 'error');
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                displayProjectsList(result.projects || []);
                addLogEntry('info', `成功加载 ${result.projects?.length || 0} 个项目`);
            } catch (error) {
                console.error('加载项目列表失败:', error);
                showStatusMessage(`❌ 加载项目失败: ${error.message}`, 'error');
                addLogEntry('error', `加载项目失败: ${error.message}`);
            }
        }

        function displayProjectsList(projects) {
            const projectsList = document.getElementById('projects-list');
            
            if (projects.length === 0) {
                projectsList.innerHTML = `
                    <div style="text-align: center; color: #6b7280; padding: 20px;">
                        <p>暂无可用的项目</p>
                        <button class="btn btn-primary" style="margin-top: 12px;" onclick="location.href='/phase-one-setup'">
                            🎨 创建第一个项目
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            projects.forEach(project => {
                const isPhaseOneCompleted = project.phase_one && project.phase_one.status === 'completed';
                const canGenerate = isPhaseOneCompleted && (!project.phase_two || project.phase_two.status !== 'completed');
                
                html += `
                    <div class="project-card ${canGenerate ? '' : 'disabled'}" 
                         onclick="${canGenerate ? `selectProject('${project.title}')` : ''}"
                         style="${!canGenerate ? 'opacity: 0.6; cursor: not-allowed;' : ''}">
                        <div class="project-title">${project.title}</div>
                        <div class="project-info">总章节: ${project.total_chapters || 0}</div>
                        <div class="project-info">已完成: ${project.completed_chapters || 0} 章</div>
                        <div class="project-status ${canGenerate ? 'status-ready' : project.phase_one ? 'status-completed' : 'status-generating'}">
                            ${getProjectStatusText(project)}
                        </div>
                    </div>
                `;
            });
            
            projectsList.innerHTML = html;
        }

        function getProjectStatusText(project) {
            if (project.phase_one && project.phase_one.status === 'completed') {
                if (project.phase_two && project.phase_two.status === 'completed') {
                    return '已完成';
                } else if (project.phase_two && project.phase_two.status === 'generating') {
                    return '生成中';
                } else {
                    return '可生成';
                }
            } else if (project.phase_one && project.phase_one.status === 'generating') {
                return '设计中';
            } else {
                return '未完成';
            }
        }

        async function selectProject(projectTitle) {
            try {
                // 取消之前选中的项目
                document.querySelectorAll('.project-card').forEach(card => {
                    card.classList.remove('selected');
                });

                // 选中当前项目
                event.currentTarget.classList.add('selected');

                // 加载项目详情
                const response = await fetch(`/api/project/${encodeURIComponent(projectTitle)}/with-phase-info`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const projectData = await response.json();
                currentProject = projectData;
                
                displayProjectInfo(projectData);
                displayProjectDetails(projectData);
                showGenerationForm();
                
                addLogEntry('info', `选择项目: ${projectTitle}`);
                showStatusMessage(`✅ 已选择项目: ${projectTitle}`, 'success');
            } catch (error) {
                console.error('选择项目失败:', error);
                showStatusMessage(`❌ 选择项目失败: ${error.message}`, 'error');
                addLogEntry('error', `选择项目失败: ${error.message}`);
            }
        }

        function displayProjectInfo(projectData) {
            const infoDiv = document.getElementById('selected-project-info');
            const totalChapters = projectData.total_chapters || projectData.current_progress?.total_chapters || 0;
            const completedChapters = Object.keys(projectData.generated_chapters || {}).length;
            
            infoDiv.style.display = 'block';
            document.getElementById('current-project-title').textContent = projectData.novel_title || '未命名';
            document.getElementById('current-project-total-chapters').textContent = totalChapters;
            document.getElementById('current-project-completed-chapters').textContent = completedChapters;
            document.getElementById('current-project-status').textContent = '准备就绪';
            
            // 更新表单默认值
            const fromChapter = document.getElementById('from-chapter');
            const chaptersToGenerate = document.getElementById('chapters-to-generate');
            
            if (fromChapter) {
                fromChapter.value = completedChapters + 1;
                fromChapter.min = completedChapters + 1;
            }
            
            if (chaptersToGenerate) {
                const remainingChapters = totalChapters - completedChapters;
                chaptersToGenerate.max = Math.min(remainingChapters, 50);
                chaptersToGenerate.value = Math.min(10, remainingChapters);
            }
        }

        function displayProjectDetails(projectData) {
            const detailsDiv = document.getElementById('project-details');
            
            let html = `
                <div class="result-item">
                    <h4>📋 项目信息</h4>
                    <p><strong>标题:</strong> ${projectData.novel_title || '未命名'}</p>
                    <p><strong>简介:</strong> ${projectData.story_synopsis || '暂无简介'}</p>
                    <p><strong>核心设定:</strong> ${projectData.core_setting || '暂无设定'}</p>
                </div>
            `;
            
            if (projectData.phase_one) {
                html += `
                    <div class="result-item">
                        <h4>✅ 第一阶段状态</h4>
                        <p><strong>状态:</strong> <span style="color: #10b981;">已完成</span></p>
                        <p><strong>完成时间:</strong> ${new Date(projectData.phase_one.completed_at || Date.now()).toLocaleString()}</p>
                    </div>
                `;
            }
            
            if (projectData.generated_chapters && Object.keys(projectData.generated_chapters).length > 0) {
                const generatedCount = Object.keys(projectData.generated_chapters).length;
                html += `
                    <div class="result-item">
                        <h4>📚 已生成章节</h4>
                        <p><strong>章节数:</strong> ${generatedCount}</p>
                        <p><strong>总字数:</strong> ${calculateTotalWords(projectData.generated_chapters)}</p>
                    </div>
                `;
            }
            
            detailsDiv.innerHTML = html;
        }

        function calculateTotalWords(chapters) {
            let totalWords = 0;
            for (const chapterData of Object.values(chapters)) {
                if (chapterData.word_count) {
                    totalWords += chapterData.word_count;
                } else if (chapterData.content) {
                    totalWords += chapterData.content.length;
                }
            }
            return totalWords.toLocaleString();
        }

        function showGenerationForm() {
            document.getElementById('phase-two-form').style.display = 'block';
        }

        // ==================== 第二阶段生成功能 ====================
        async function startPhaseTwoGeneration(event) {
            event.preventDefault();

            if (!currentProject) {
                showStatusMessage('❌ 请先选择一个项目', 'error');
                return;
            }

            const formData = {
                from_chapter: parseInt(document.getElementById('from-chapter').value),
                chapters_to_generate: parseInt(document.getElementById('chapters-to-generate').value),
                chapters_per_batch: parseInt(document.getElementById('chapters-per-batch').value),
                quality_level: document.getElementById('quality-level').value,
                generation_notes: document.getElementById('generation-notes').value
            };

            try {
                // 显示进度区域
                showProgressSection();
                hideGenerationForm();
                updateProgress(5, '正在启动第二阶段生成...');
                generationStartTime = Date.now();
                
                addLogEntry('info', `开始生成章节: 第${formData.from_chapter}章开始，生成${formData.chapters_to_generate}章`);

                // 调用第二阶段生成API
                const response = await fetch('/api/phase-two/start-generation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        novel_title: currentProject.novel_title,
                        ...formData
                    })
                });

                if (response.status === 401) {
                    showStatusMessage('❌ 请先登录后再试', 'error');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                    return;
                }

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();

                if (result.success) {
                    currentTaskId = result.task_id;
                    updateStepStatus('generation', true);
                    startProgressMonitoring();
                    showControlButtons('generating');
                    addLogEntry('success', `生成任务已启动: ${result.task_id}`);
                } else {
                    throw new Error(result.error || '启动生成失败');
                }
            } catch (error) {
                hideProgressSection();
                showGenerationForm();
                showStatusMessage(`❌ 错误: ${error.message}`, 'error');
                addLogEntry('error', `启动生成失败: ${error.message}`);
                console.error('第二阶段生成失败:', error);
            }
        }

        function startProgressMonitoring() {
            if (!currentTaskId) return;
            
            // 初始化章节进度卡片
            initializeChapterProgress();
            
            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/phase-two/task/${currentTaskId}/status`);
                    if (!response.ok) return;

                    const taskStatus = await response.json();
                    updateProgress(taskStatus.progress || 0, taskStatus.status_message || '生成中...');
                    updateChapterProgress(taskStatus);
                    updateCurrentChapterInfo(taskStatus);

                    // 检查是否完成
                    if (taskStatus.status === 'completed') {
                        clearInterval(progressInterval);
                        handleGenerationComplete(taskStatus);
                    } else if (taskStatus.status === 'failed' || taskStatus.status === 'paused') {
                        clearInterval(progressInterval);
                        handleGenerationStopped(taskStatus);
                    }
                } catch (error) {
                    console.error('获取进度状态失败:', error);
                    addLogEntry('error', `获取进度失败: ${error.message}`);
                }
            }, 2000); // 每2秒检查一次
        }

        function initializeChapterProgress() {
            const fromChapter = parseInt(document.getElementById('from-chapter').value);
            const chaptersToGenerate = parseInt(document.getElementById('chapters-to-generate').value);
            const grid = document.getElementById('chapter-progress-grid');
            
            let html = '';
            for (let i = 0; i < chaptersToGenerate; i++) {
                const chapterNumber = fromChapter + i;
                html += `
                    <div class="chapter-card" id="chapter-${chapterNumber}">
                        <div class="chapter-number">第${chapterNumber}章</div>
                        <div class="chapter-title">等待生成...</div>
                        <div class="chapter-status pending">等待中</div>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        function updateChapterProgress(taskStatus) {
            if (!taskStatus.chapter_progress) return;
            
            taskStatus.chapter_progress.forEach(chapter => {
                const chapterCard = document.getElementById(`chapter-${chapter.chapter_number}`);
                if (chapterCard) {
                    // 更新状态
                    chapterCard.className = `chapter-card ${chapter.status}`;
                    
                    // 更新标题
                    const titleElement = chapterCard.querySelector('.chapter-title');
                    if (titleElement) {
                        titleElement.textContent = chapter.chapter_title || `第${chapter.chapter_number}章`;
                    }
                    
                    // 更新状态显示
                    const statusElement = chapterCard.querySelector('.chapter-status');
                    if (statusElement) {
                        statusElement.className = `chapter-status ${chapter.status}`;
                        statusElement.textContent = getStatusText(chapter.status);
                    }
                    
                    // 更新字数
                    let wordCountElement = chapterCard.querySelector('.chapter-word-count');
                    if (!wordCountElement && chapter.word_count) {
                        wordCountElement = document.createElement('div');
                        wordCountElement.className = 'chapter-word-count';
                        titleElement.parentNode.insertBefore(wordCountElement, statusElement);
                    }
                    if (wordCountElement) {
                        wordCountElement.textContent = `${chapter.word_count || 0} 字`;
                    }
                    
                    // 更新日志
                    if (chapter.status === 'completed') {
                        addLogEntry('success', `第${chapter.chapter_number}章生成完成: ${chapter.chapter_title}`);
                    } else if (chapter.status === 'failed') {
                        addLogEntry('error', `第${chapter.chapter_number}章生成失败: ${chapter.error || '未知错误'}`);
                    }
                }
            });
        }

        function updateCurrentChapterInfo(taskStatus) {
            const infoDiv = document.getElementById('current-chapter-info');
            const currentChapter = taskStatus.current_chapter;
            
            if (currentChapter) {
                infoDiv.style.display = 'block';
                document.getElementById('current-chapter-title').textContent = currentChapter.title || `第${currentChapter.number}章`;
                document.getElementById('current-chapter-number').textContent = currentChapter.number;
                document.getElementById('total-chapters').textContent = taskStatus.total_chapters || 0;
            }
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': '等待中',
                'generating': '生成中',
                'completed': '已完成',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }

        function handleGenerationComplete(taskStatus) {
            hideProgressSection();
            updateStepStatus('review', true);
            showGenerationResults(taskStatus);
            addLogEntry('success', '章节生成任务完成！');
            showStatusMessage('🎉 章节生成完成！', 'success');
        }

        function handleGenerationStopped(taskStatus) {
            showControlButtons('stopped');
            addLogEntry('warning', `生成已${taskStatus.status === 'paused' ? '暂停' : '停止'}`);
            showStatusMessage(`⚠️ 生成已${taskStatus.status === 'paused' ? '暂停' : '停止'}`, 'info');
        }

        function showGenerationResults(taskStatus) {
            const resultsDiv = document.getElementById('generation-results');
            resultsDiv.style.display = 'block';
            
            // 更新统计信息
            const generatedChapters = taskStatus.generated_chapters || [];
            const totalWords = generatedChapters.reduce((sum, chapter) => sum + (chapter.word_count || 0), 0);
            const avgScore = generatedChapters.reduce((sum, chapter) => sum + (chapter.quality_score || 0), 0) / generatedChapters.length;
            const generationTime = generationStartTime ? Math.round((Date.now() - generationStartTime) / 60000) : 0;
            
            document.getElementById('total-generated').textContent = generatedChapters.length;
            document.getElementById('total-words').textContent = totalWords.toLocaleString();
            document.getElementById('average-score').textContent = avgScore.toFixed(1);
            document.getElementById('generation-time').textContent = `${generationTime}分钟`;
        }

        // ==================== 控制功能 ====================
        function pauseGeneration() {
            // 暂停功能需要后端支持
            showStatusMessage('⏸️ 暂停功能开发中...', 'info');
        }

        function resumeGeneration() {
            // 恢复功能需要后端支持
            showStatusMessage('▶️ 恢复功能开发中...', 'info');
        }

        function stopGeneration() {
            if (!currentTaskId) return;
            
            if (confirm('确定要停止当前生成任务吗？已生成的章节将被保留。')) {
                // 停止功能需要后端支持
                showStatusMessage('⏹️ 停止功能开发中...', 'info');
            }
        }

        function viewChapters() {
            if (!currentProject) return;
            window.location.href = `/novel?title=${encodeURIComponent(currentProject.novel_title)}`;
        }

        function continueMoreChapters() {
            hideGenerationResults();
            showGenerationForm();
            showStatusMessage('📝 继续生成更多章节', 'info');
        }

        function goToReading() {
            if (!currentProject) return;
            window.location.href = `/novel?title=${encodeURIComponent(currentProject.novel_title)}`;
        }

        // ==================== 工具函数 ====================
        function showProgressSection() {
            document.getElementById('progress-section').classList.add('active');
            document.getElementById('generation-results').classList.remove('active');
        }

        function hideProgressSection() {
            document.getElementById('progress-section').classList.remove('active');
        }

        function showGenerationForm() {
            document.getElementById('phase-two-form').style.display = 'block';
        }

        function hideGenerationForm() {
            document.getElementById('phase-two-form').style.display = 'none';
        }

        function showGenerationResults() {
            hideProgressSection();
            document.getElementById('generation-results').classList.add('active');
            updateStepStatus('complete', true);
        }

        function hideGenerationResults() {
            document.getElementById('generation-results').classList.remove('active');
        }

        function updateProgress(percentage, message) {
            const progressBar = document.getElementById('progress-bar-fill');
            const percentageText = document.getElementById('progress-percentage');
            
            if (progressBar) {
                progressBar.style.width = `${percentage}%`;
            }
            if (percentageText) {
                percentageText.textContent = `${percentage}%`;
            }
            
            addLogEntry('info', `进度: ${percentage}% - ${message}`);
        }

        function updateStepStatus(stepName, isActive) {
            const steps = ['setup', 'generation', 'review', 'complete'];
            const currentIndex = steps.indexOf(stepName);
            
            steps.forEach((step, index) => {
                const stepElement = document.getElementById(`step-${step}`);
                if (stepElement) {
                    stepElement.classList.remove('active', 'completed');
                    if (index < currentIndex) {
                        stepElement.classList.add('completed');
                    } else if (index === currentIndex && isActive) {
                        stepElement.classList.add('active');
                    } else {
                        stepElement.classList.add('pending');
                    }
                }
            });
        }

        function showControlButtons(state) {
            const startBtn = document.getElementById('start-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const resumeBtn = document.getElementById('resume-btn');
            const stopBtn = document.getElementById('stop-btn');
            
            // 隐藏所有按钮
            [startBtn, pauseBtn, resumeBtn, stopBtn].forEach(btn => {
                if (btn) btn.style.display = 'none';
            });
            
            // 根据状态显示相应按钮
            if (state === 'generating') {
                if (pauseBtn) pauseBtn.style.display = 'inline-flex';
                if (stopBtn) stopBtn.style.display = 'inline-flex';
            } else if (state === 'stopped' || state === 'paused') {
                if (resumeBtn) resumeBtn.style.display = 'inline-flex';
                if (stopBtn) stopBtn.style.display = 'inline-flex';
            } else {
                if (startBtn) startBtn.style.display = 'inline-flex';
            }
        }

        function addLogEntry(level, message) {
            const logContainer = document.getElementById('generation-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${level}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            
            logContainer.appendChild(logEntry);
            
            // 保持最新的50条日志
            const entries = logContainer.children;
            if (entries.length > 50) {
                logContainer.removeChild(entries[0]);
            }
            
            // 自动滚动到底部
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function showStatusMessage(message, type) {
            const msgElement = document.getElementById('status-message');
            msgElement.className = `status-message ${type}`;
            msgElement.textContent = message;
            msgElement.style.display = 'block';
            
            // 5秒后自动隐藏成功和消息
            if (type === 'success') {
                setTimeout(() => {
                    msgElement.style.display = 'none';
                }, 5000);
            }
        }

        // 退出登录函数
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/logout';
            }
        }

        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', function() {
            if (progressInterval) {
                clearInterval(progressInterval);
            }
        });
    </script>
</body>
</html>
