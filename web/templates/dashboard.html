<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说生成系统 - 仪表板</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 仪表板现代化样式 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 32px 24px;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-primary);
            opacity: 0.03;
            pointer-events: none;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .metric-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 16px;
            background: var(--gradient-primary);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: var(--shadow-md);
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 800;
            background: var(--gradient-primary);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 16px 0;
            position: relative;
            z-index: 1;
        }

        .metric-label {
            color: var(--gray-600);
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .metric-trend {
            margin-top: 12px;
            font-size: var(--text-xs);
            color: var(--gray-500);
            position: relative;
            z-index: 1;
        }

        .metric-trend.positive {
            color: var(--success-600);
        }

        .metric-trend.negative {
            color: var(--error-600);
        }

        /* 章节表格现代化样式 */
        .chapters-table-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 40px 0;
        }

        .chapters-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        .chapters-table thead {
            background: var(--gradient-primary);
            color: white;
        }

        .chapters-table th {
            padding: 20px 16px;
            text-align: left;
            font-weight: 600;
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chapters-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
        }

        .chapters-table tbody tr {
            transition: all var(--transition-fast);
        }

        .chapters-table tbody tr:hover {
            background: var(--primary-50);
        }

        .chapters-table tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-success {
            background: var(--success-100);
            color: var(--success-700);
            border: 1px solid var(--success-200);
        }

        .badge-warning {
            background: var(--warning-100);
            color: var(--warning-700);
            border: 1px solid var(--warning-200);
        }

        .badge-danger {
            background: var(--error-100);
            color: var(--error-700);
            border: 1px solid var(--error-200);
        }

        /* 进度条现代化样式 */
        .progress-container {
            background: var(--gray-100);
            height: 32px;
            border-radius: var(--radius-full);
            overflow: hidden;
            margin: 16px 0;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            transition: width var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: var(--text-xs);
            font-weight: 600;
            border-radius: var(--radius-full);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* 图表容器现代化样式 */
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 32px;
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg);
            margin: 40px 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .chart-title {
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 24px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .simple-bar-chart {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bar-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bar-label {
            width: 100px;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--gray-600);
        }

        .bar-container {
            flex: 1;
            height: 36px;
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
        }

        .bar {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            color: white;
            padding: 0 16px;
            font-size: var(--text-sm);
            font-weight: 600;
            transition: width var(--transition-normal);
            position: relative;
        }

        .bar-score {
            position: absolute;
            right: 16px;
            font-weight: 700;
        }

        .bar.low {
            background: var(--gradient-warning);
        }

        .bar.medium {
            background: var(--gradient-primary);
        }

        .bar.high {
            background: var(--gradient-success);
        }

        /* 统计信息卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all var(--transition-normal);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-label {
            color: var(--gray-600);
            font-size: var(--text-sm);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-600);
        }

        .stat-value.large {
            font-size: 2.5rem;
        }

        .stat-value.success {
            color: var(--success-600);
        }

        .stat-value.warning {
            color: var(--warning-600);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <button class="btn btn-secondary btn-small" onclick="location.href='/'" style="margin-right: 12px;">
                    🏠 返回首页
                </button>
                📊 仪表板
            </div>
            <div class="navbar-actions">
                <button class="btn btn-primary btn-small" onclick="location.href='/novels'">
                    📚 查看作品
                </button>
                <button class="btn btn-secondary btn-small" onclick="refreshData()">
                    🔄 刷新
                </button>
                <button class="btn btn-danger btn-small" onclick="logout()">
                    退出登录
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 指标卡 -->
        <div class="dashboard-grid">
            <div class="metric-card">
                <div class="metric-icon">📚</div>
                <div class="metric-label">生成章节数</div>
                <div class="metric-value" id="metric-chapters">0</div>
                <div class="metric-trend positive">↑ 本次生成</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">📝</div>
                <div class="metric-label">总字数</div>
                <div class="metric-value" id="metric-words">0</div>
                <div class="metric-trend">文字统计</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">⭐</div>
                <div class="metric-label">平均评分</div>
                <div class="metric-value" id="metric-score">-</div>
                <div class="metric-trend">质量评估</div>
            </div>

            <div class="metric-card">
                <div class="metric-icon">📈</div>
                <div class="metric-label">生成进度</div>
                <div class="metric-value" id="metric-progress">0%</div>
                <div class="metric-trend">完成度</div>
            </div>
        </div>

        <!-- 进度条 -->
        <div class="chart-container">
            <div class="chart-title">📈 生成进度</div>
            <div class="progress-container">
                <div class="progress-fill" id="main-progress" style="width: 0%">0%</div>
            </div>
        </div>

        <!-- 章节详情表 -->
        <div class="chapters-table-container">
            <div style="padding: 24px; border-bottom: 1px solid var(--gray-100);">
                <h3 style="margin: 0; color: var(--gray-800); font-size: 1.25rem; font-weight: 700;">📚 章节详情</h3>
            </div>
            <table class="chapters-table">
                <thead>
                    <tr>
                        <th>章节</th>
                        <th>标题</th>
                        <th>字数</th>
                        <th>评分</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="chapters-tbody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--gray-500); padding: 40px; font-size: var(--text-sm);">
                            <div class="spinner" style="margin: 0 auto 12px;"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 评分分布 -->
        <div class="chart-container">
            <div class="chart-title">⭐ 评分分布</div>
            <div class="simple-bar-chart" id="score-distribution">
                <div class="bar-item">
                    <div class="bar-label">加载中...</div>
                    <div class="bar-container">
                        <div class="bar" style="width: 20%;">
                            <span class="bar-score">0.0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="chart-container">
            <div class="chart-title">📊 统计信息</div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">最高评分</div>
                    <div class="stat-value success large" id="max-score">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最低评分</div>
                    <div class="stat-value warning large" id="min-score">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均字数</div>
                    <div class="stat-value large" id="avg-words">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">生成时间</div>
                    <div class="stat-value" id="generation-time" style="font-size: var(--text-base);">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            setInterval(refreshData, 5000); // 每 5 秒刷新一次
        });

        async function refreshData() {
            try {
                // 加载项目列表
                const projectsResponse = await fetch('/api/projects');
                const projects = await projectsResponse.json();

                if (projects.length === 0) {
                    showEmptyState();
                    return;
                }

                // 获取最新项目
                const latestProject = projects[0];
                
                // 加载最新项目的详情
                const detailResponse = await fetch(`/api/project/${encodeURIComponent(latestProject.title)}`);
                const novelDetail = await detailResponse.json();

                // 更新指标
                updateMetrics(latestProject, novelDetail);

                // 更新表格
                updateChaptersTable(novelDetail);

                // 更新图表
                updateCharts(novelDetail);
            } catch (error) {
                console.error('刷新失败:', error);
                showError('加载失败: ' + error.message);
            }
        }

        function showEmptyState() {
            document.getElementById('metric-chapters').textContent = '0';
            document.getElementById('metric-words').textContent = '0';
            document.getElementById('metric-score').textContent = '-';
            document.getElementById('metric-progress').textContent = '0%';
            
            const progressBar = document.getElementById('main-progress');
            if (progressBar) {
                progressBar.style.width = '0%';
                progressBar.textContent = '0%';
            }

            document.getElementById('chapters-tbody').innerHTML =
                '<tr><td colspan="6" style="text-align: center; color: var(--gray-500); padding: 40px; font-size: var(--text-sm);">暂无项目数据</td></tr>';
            
            document.getElementById('score-distribution').innerHTML =
                '<div style="text-align: center; color: var(--gray-500); padding: 40px;">暂无数据</div>';
        }

        function showError(message) {
            console.error(message);
            // 可以在这里显示错误提示
        }

        function updateMetrics(project, novelDetail) {
            const generatedChapters = novelDetail.generated_chapters || {};
            const chapterArray = Object.values(generatedChapters);
            
            // 生成章节数
            document.getElementById('metric-chapters').textContent = chapterArray.length;

            // 总字数
            const totalWords = chapterArray.reduce((sum, ch) => sum + (ch.word_count || 0), 0);
            document.getElementById('metric-words').textContent = totalWords.toLocaleString();

            // 平均评分
            const scores = chapterArray.map(ch => {
                const qa = ch.quality_assessment;
                return qa && qa.overall_score ? qa.overall_score : 0;
            }).filter(score => score > 0);
            
            const avgScore = scores.length > 0
                ? (scores.reduce((sum, score) => sum + score, 0) / scores.length).toFixed(1)
                : '-';
            document.getElementById('metric-score').textContent = avgScore;

            // 进度
            const progress = project.total_chapters > 0 ?
                Math.round((chapterArray.length / project.total_chapters) * 100) : 0;
            document.getElementById('metric-progress').textContent = progress + '%';

            // 进度条
            const progressBar = document.getElementById('main-progress');
            if (progressBar) {
                progressBar.style.width = progress + '%';
                progressBar.textContent = progress + '%';
            }
        }

        function updateChaptersTable(novelDetail) {
            const tbody = document.getElementById('chapters-tbody');
            const generatedChapters = novelDetail.generated_chapters || {};
            const chapterArray = Object.entries(generatedChapters)
                .map(([num, data]) => ({
                    chapter_number: parseInt(num),
                    ...data
                }))
                .sort((a, b) => a.chapter_number - b.chapter_number);

            if (chapterArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--gray-500); padding: 40px; font-size: var(--text-sm);">暂无章节数据</td></tr>';
                return;
            }

            tbody.innerHTML = chapterArray.map(ch => {
                const qa = ch.quality_assessment;
                const score = qa && qa.overall_score ? qa.overall_score : 0;
                
                return `
                    <tr>
                        <td><strong>第${ch.chapter_number}章</strong></td>
                        <td>${escapeHtml(ch.chapter_title || ch.title || '未命名')}</td>
                        <td>${(ch.word_count || 0).toLocaleString()}</td>
                        <td>
                            ${score > 0 ? `<span style="font-weight: 600; color: #667eea;">${score.toFixed(1)}</span>` : '-'}
                        </td>
                        <td>
                            <span class="badge badge-success">已完成</span>
                        </td>
                        <td>
                            <button class="btn btn-secondary btn-small" onclick="viewChapter('${novelDetail.novel_title || novelDetail.title}', ${ch.chapter_number})">
                                查看
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateCharts(novelDetail) {
            const scoreDistribution = document.getElementById('score-distribution');
            const generatedChapters = novelDetail.generated_chapters || {};
            const chapterArray = Object.entries(generatedChapters)
                .map(([num, data]) => ({
                    chapter_number: parseInt(num),
                    ...data
                }))
                .sort((a, b) => a.chapter_number - b.chapter_number);

            if (chapterArray.length === 0) {
                scoreDistribution.innerHTML = '<div style="text-align: center; color: var(--gray-500); padding: 40px;">暂无数据</div>';
                return;
            }

            scoreDistribution.innerHTML = chapterArray.map(ch => {
                const qa = ch.quality_assessment;
                const score = qa && qa.overall_score ? qa.overall_score : 0;
                const width = (score / 10) * 100;
                const intensity = score >= 9.5 ? 'high' : score >= 8 ? 'medium' : 'low';

                return `
                    <div class="bar-item">
                        <div class="bar-label">第${ch.chapter_number}章</div>
                        <div class="bar-container">
                            <div class="bar ${intensity}" style="width: ${width}%">
                                <span class="bar-score">${score.toFixed(1)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // 统计信息
            const scores = chapterArray.map(ch => {
                const qa = ch.quality_assessment;
                return qa && qa.overall_score ? qa.overall_score : 0;
            }).filter(score => score > 0);
            
            const words = chapterArray.map(ch => ch.word_count || 0);

            document.getElementById('max-score').textContent =
                scores.length > 0 ? Math.max(...scores).toFixed(1) : '-';
            document.getElementById('min-score').textContent =
                scores.length > 0 ? Math.min(...scores).toFixed(1) : '-';
            document.getElementById('avg-words').textContent =
                words.length > 0 ? Math.round(words.reduce((a, b) => a + b) / words.length).toLocaleString() : '-';
                
            // 生成时间
            const genTimes = chapterArray.map(ch => ch.generation_time).filter(time => time);
            if (genTimes.length > 0) {
                const firstTime = new Date(genTimes[0]);
                const lastTime = new Date(genTimes[genTimes.length - 1]);
                const duration = lastTime - firstTime;
                const hours = Math.floor(duration / (1000 * 60 * 60));
                const minutes = Math.floor((duration % (1000 * 60 * 60)) / (1000 * 60));
                
                let timeText = '';
                if (hours > 0) {
                    timeText = `${hours}小时${minutes}分钟`;
                } else {
                    timeText = `${minutes}分钟`;
                }
                
                document.getElementById('generation-time').textContent = timeText;
            }
        }

        function viewChapter(title, chapterNumber) {
            window.open(`/novel?title=${encodeURIComponent(title)}&chapter=${chapterNumber}`, '_blank');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
