<!-- 生成表单 -->
<form id="phase-one-form" onsubmit="checkPointsBeforeSubmit(event)">
    <div class="form-group">
        <label for="novel-title">小说标题</label>
        <input type="text" id="novel-title" name="title" 
               placeholder="例：凡人修仙同人·观战者" required>
    </div>

    <div class="form-group">
        <label for="novel-synopsis">小说简介</label>
        <textarea id="novel-synopsis" name="synopsis" rows="3"
                  placeholder="简要描述小说内容..." required></textarea>
    </div>

    <div class="form-group">
        <label for="core-setting">核心设定</label>
        <textarea id="core-setting" name="core_setting" rows="6"
                  placeholder="描述故事的核心背景设定，包括世界观、主要设定、时代背景等..." required></textarea>
    </div>

    <div class="form-group">
        <label for="core-selling-points">核心卖点</label>
        <input type="text" id="core-selling-points" name="core_selling_points"
               placeholder="例：爽文节奏 + 独特设定 + 人物成长" value="爽文节奏 + 独特设定 + 人物成长">
    </div>

    <div class="config-grid">
        <div class="form-group">
            <label for="total-chapters">总章节数</label>
            <input type="number" id="total-chapters" name="total_chapters"
                   value="200" min="5" max="200" required>
        </div>

        <div class="form-group">
            <label for="generation-mode">生成模式</label>
            <select id="generation-mode" name="generation_mode" onchange="handleGenerationModeChange()">
                <option value="phase_one_only">仅第一阶段（生成设定后暂停）</option>
                <option value="full_two_phase">完整两阶段（继续生成章节）</option>
                <option value="resume_mode" id="resume-mode-option" style="display: none;">🔄 恢复模式（继续未完成的生成）</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="target-platform">🎯 目标平台</label>
        <select id="target-platform" name="target_platform">
            <option value="fanqie" selected>🍅 番茄小说 - 快节奏爽文平台</option>
            <option value="qidian">📚 起点中文网 - 付费阅读平台</option>
            <option value="zhihu">💡 知乎盐选 - 精品短篇平台</option>
            <option value="short_drama">🎬 短剧 - 极致快节奏、强冲突、悬念钩子</option>
        </select>
        <div class="form-hint">💡 不同平台有不同的读者偏好，选择目标平台将优化生成风格</div>
    </div>

    <!-- 创造点消耗提示 -->
    <div class="points-cost-hint" style="
        background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, rgba(245, 158, 11, 0.08) 100%);
        border: 2px solid rgba(251, 191, 36, 0.4);
        border-radius: 0.75rem;
        padding: 1rem 1.25rem;
        margin: 1.5rem 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        box-shadow: 0 4px 15px rgba(251, 191, 36, 0.15);
    ">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span style="font-size: 1.5rem;">⚡</span>
            <span style="color: var(--text-secondary); font-size: 0.875rem; font-weight: 500;">预估消耗</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span id="points-cost-display" style="
                font-size: 1.5rem;
                font-weight: 800;
                color: #fbbf24;
                text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            ">39</span>
            <span style="color: #fbbf24; font-size: 0.875rem; font-weight: 600;">创造点</span>
        </div>
    </div>
    
    <div style="
        font-size: 0.75rem;
        color: var(--text-tertiary);
        text-align: center;
        margin-bottom: 1rem;
        padding: 0.5rem 0.75rem;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
    ">
        <i class="fas fa-info-circle" style="color: #fbbf24;"></i> 
        共39次API调用：基础设定(14次) + 4阶段详细计划(24次) + 评估(1次)
    </div>

    <div class="action-buttons">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">
            🔄 重置
        </button>
        <button type="button" class="btn btn-primary" onclick="document.getElementById('phase-one-form').dispatchEvent(new Event('submit', {bubbles: true, cancelable: true}));">
            🚀 开始生成设定
        </button>
    </div>
</form>

<!-- 状态消息 -->
<div class="status-message" id="status-message"></div>
