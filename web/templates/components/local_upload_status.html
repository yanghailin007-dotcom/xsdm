{#
    本地上传任务状态组件
    显示用户通过本地脚本上传的进度
#}
<div class="upload-status-card" id="localUploadStatus">
    <div class="upload-status-header">
        <div class="upload-status-icon">
            <span id="statusIcon">⏳</span>
        </div>
        <div class="upload-status-info">
            <h4 class="upload-status-title" id="statusTitle">准备上传</h4>
            <p class="upload-status-desc" id="statusDesc">等待本地脚本启动</p>
        </div>
        <div class="upload-status-badge" id="statusBadge">
            <span class="badge badge-pending">未开始</span>
        </div>
    </div>
    
    <!-- 进度条 -->
    <div class="upload-progress-container">
        <div class="upload-progress-bar" id="uploadProgressBar">
            <div class="upload-progress-fill" id="uploadProgressFill" style="width: 0%"></div>
        </div>
        <div class="upload-progress-text">
            <span id="progressText">0 / 0 章</span>
            <span id="progressPercent">0%</span>
        </div>
    </div>
    
    <!-- 章节列表 -->
    <div class="upload-chapters-list" id="chaptersList">
        <!-- 动态加载 -->
    </div>
    
    <!-- 操作按钮 -->
    <div class="upload-actions" id="uploadActions">
        <button class="btn btn-sm btn-secondary" onclick="refreshUploadStatus()">
            <span>🔄</span> 刷新状态
        </button>
        <button class="btn btn-sm btn-primary" id="retryBtn" onclick="retryFailedChapters()" style="display: none;">
            <span>🔁</span> 重试失败章节
        </button>
    </div>
</div>

<style>
.upload-status-card {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.04));
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0;
}

.upload-status-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
}

.upload-status-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

.upload-status-info {
    flex: 1;
}

.upload-status-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--v2-text-primary);
    margin: 0 0 4px 0;
}

.upload-status-desc {
    font-size: 13px;
    color: var(--v2-text-secondary);
    margin: 0;
}

.upload-status-badge .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
}

.badge-pending {
    background: rgba(245, 158, 11, 0.2);
    color: #f59e0b;
}

.badge-running {
    background: rgba(99, 102, 241, 0.2);
    color: #6366f1;
}

.badge-completed {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
}

.badge-failed {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
}

.upload-progress-container {
    margin-bottom: 16px;
}

.upload-progress-bar {
    height: 8px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
}

.upload-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 4px;
    transition: width 0.3s ease;
}

.upload-progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--v2-text-secondary);
}

.upload-chapters-list {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
}

.chapter-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
}

.chapter-item:hover {
    background: rgba(255, 255, 255, 0.05);
}

.chapter-status {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

.chapter-status.pending {
    background: rgba(245, 158, 11, 0.2);
    color: #f59e0b;
}

.chapter-status.success {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
}

.chapter-status.failed {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
}

.chapter-info {
    flex: 1;
}

.chapter-number {
    font-weight: 500;
    color: var(--v2-text-primary);
}

.chapter-title {
    color: var(--v2-text-secondary);
    margin-left: 8px;
}

.chapter-error {
    font-size: 11px;
    color: #ef4444;
    margin-top: 2px;
}

.upload-actions {
    display: flex;
    gap: 12px;
}
</style>

<script>
// 全局变量
let currentTaskId = null;
let refreshInterval = null;

/**
 * 加载上传任务状态
 */
async function loadUploadStatus(taskId) {
    currentTaskId = taskId;
    
    try {
        const response = await fetch(`/api/local-upload/tasks/${taskId}`);
        const data = await response.json();
        
        if (data.success) {
            updateStatusUI(data.task, data.chapters);
        } else {
            console.error('加载任务状态失败:', data.error);
        }
    } catch (error) {
        console.error('请求失败:', error);
    }
}

/**
 * 更新状态UI
 */
function updateStatusUI(task, chapters) {
    // 更新图标和标题
    const iconMap = {
        'pending': '⏳',
        'running': '📤',
        'completed': '✅',
        'failed': '❌'
    };
    
    const titleMap = {
        'pending': '等待上传',
        'running': '正在上传',
        'completed': '上传完成',
        'failed': '上传失败'
    };
    
    const descMap = {
        'pending': '请运行本地脚本开始上传',
        'running': `正在上传 ${task.novel_title}`,
        'completed': `已完成 ${task.completed_chapters}/${task.total_chapters} 章`,
        'failed': `失败 ${task.failed_chapters} 章，可重试`
    };
    
    document.getElementById('statusIcon').textContent = iconMap[task.status] || '⏳';
    document.getElementById('statusTitle').textContent = titleMap[task.status] || '未知';
    document.getElementById('statusDesc').textContent = descMap[task.status] || '';
    
    // 更新徽章
    const badgeClass = `badge-${task.status}`;
    const badgeText = {
        'pending': '未开始',
        'running': '上传中',
        'completed': '已完成',
        'failed': '失败'
    }[task.status] || task.status;
    
    document.getElementById('statusBadge').innerHTML = 
        `<span class="badge ${badgeClass}">${badgeText}</span>`;
    
    // 更新进度条
    const percent = task.total_chapters > 0 
        ? Math.round((task.completed_chapters / task.total_chapters) * 100) 
        : 0;
    
    document.getElementById('uploadProgressFill').style.width = `${percent}%`;
    document.getElementById('progressText').textContent = 
        `${task.completed_chapters} / ${task.total_chapters} 章`;
    document.getElementById('progressPercent').textContent = `${percent}%`;
    
    // 更新章节列表
    updateChaptersList(chapters);
    
    // 显示/隐藏重试按钮
    const hasFailed = chapters.some(ch => ch.status === 'failed');
    document.getElementById('retryBtn').style.display = hasFailed ? 'inline-flex' : 'none';
}

/**
 * 更新章节列表
 */
function updateChaptersList(chapters) {
    const container = document.getElementById('chaptersList');
    
    if (!chapters || chapters.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--v2-text-secondary); font-size: 13px;">暂无章节信息</p>';
        return;
    }
    
    // 只显示前10章，避免过多
    const displayChapters = chapters.slice(0, 10);
    const remaining = chapters.length - 10;
    
    let html = displayChapters.map(ch => {
        const statusIcon = {
            'pending': '○',
            'uploading': '◌',
            'success': '✓',
            'failed': '✗'
        }[ch.status] || '○';
        
        const errorHtml = ch.error_message 
            ? `<div class="chapter-error">${escapeHtml(ch.error_message)}</div>` 
            : '';
        
        return `
            <div class="chapter-item">
                <div class="chapter-status ${ch.status}">${statusIcon}</div>
                <div class="chapter-info">
                    <span class="chapter-number">第${ch.chapter_number}章</span>
                    <span class="chapter-title">${escapeHtml(ch.chapter_title || '')}</span>
                    ${errorHtml}
                </div>
            </div>
        `;
    }).join('');
    
    if (remaining > 0) {
        html += `<p style="text-align: center; color: var(--v2-text-secondary); font-size: 12px; margin-top: 8px;">还有 ${remaining} 章...</p>`;
    }
    
    container.innerHTML = html;
}

/**
 * 刷新状态
 */
async function refreshUploadStatus() {
    if (!currentTaskId) {
        alert('请先选择上传任务');
        return;
    }
    
    await loadUploadStatus(currentTaskId);
}

/**
 * 重试失败章节
 */
async function retryFailedChapters() {
    if (!currentTaskId) return;
    
    try {
        const response = await fetch(`/api/local-upload/tasks/${currentTaskId}/retry`, {
            method: 'POST'
        });
        const data = await response.json();
        
        if (data.success && data.chapters.length > 0) {
            alert(`找到 ${data.chapters.length} 章可重试，请在本地脚本中选择重试`);
        } else {
            alert('没有可重试的章节');
        }
    } catch (error) {
        console.error('获取重试章节失败:', error);
    }
}

/**
 * HTML转义
 */
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

/**
 * 启动自动刷新
 */
function startAutoRefresh(taskId, interval = 5000) {
    currentTaskId = taskId;
    loadUploadStatus(taskId);
    
    if (refreshInterval) {
        clearInterval(refreshInterval);
    }
    
    refreshInterval = setInterval(() => {
        loadUploadStatus(taskId);
    }, interval);
}

/**
 * 停止自动刷新
 */
function stopAutoRefresh() {
    if (refreshInterval) {
        clearInterval(refreshInterval);
        refreshInterval = null;
    }
}

// 页面卸载时停止刷新
window.addEventListener('beforeunload', stopAutoRefresh);
</script>
