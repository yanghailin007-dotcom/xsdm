<!-- 创意库选择区域 -->
<div class="creative-library-section">
    <div class="creative-library-header">
        <div class="creative-library-title">
            <span>💡</span>
            <span>从创意库选择</span>
        </div>
        <button type="button" class="btn btn-secondary btn-small" onclick="loadCreativeIdeas()">
            🔄 加载创意库
        </button>
    </div>
    
    <div id="creative-library-content" style="display: none;">
        <!-- 列表视图 -->
        <select id="creative-idea-select" onchange="fillFromCreativeIdea()" style="width: 100%; padding: 12px; border: 2px solid #d1fae5; border-radius: 8px; margin-bottom: 12px; background: white;">
            <option value="">-- 请选择一个创意 --</option>
        </select>
        
        <div id="creative-idea-preview-simple" class="creative-idea-preview-simple" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h5 style="color: #065f46; margin: 0; font-weight: 600;">📋 创意预览</h5>
                <div style="display: flex; gap: 8px;">
                    <button type="button" class="btn btn-secondary btn-small" onclick="openCreativeEditor()" style="flex-shrink: 0;">
                        ✏️ 编辑创意
                    </button>
                </div>
            </div>
            <div id="preview-content" style="font-size: 14px; line-height: 1.6; color: #374151;"></div>
        </div>
    </div>
</div>
