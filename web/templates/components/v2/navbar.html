{#
    导航栏组件 V2 - 参考 Linear/Vercel 设计
    特点：左侧品牌，中间导航链接(pill高亮)，右侧操作
#}
<nav class="v2-navbar">
    <!-- 左侧：Logo + 品牌 -->
    <a href="/landing" class="v2-navbar__brand">
        <div class="v2-navbar__logo">
            <svg class="v2-navbar__logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L55 40 L95 50 L55 60 L50 95 L45 60 L5 50 L45 40 Z" fill="white"/>
                <circle cx="50" cy="50" r="12" fill="url(#navLogoGradient)"/>
                <circle cx="50" cy="18" r="3" fill="white"/>
                <circle cx="50" cy="82" r="3" fill="white"/>
                <circle cx="18" cy="50" r="3" fill="white"/>
                <circle cx="82" cy="50" r="3" fill="white"/>
                <defs>
                    <linearGradient id="navLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#6366f1"/>
                        <stop offset="100%" style="stop-color:#8b5cf6"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <span class="v2-navbar__brand-text">大文娱</span>
    </a>

    <!-- 中间：导航链接（Linear风格 pill 切换） -->
    <div class="v2-navbar__center">
        {% if session.logged_in %}
            <a href="/" class="v2-nav-link {% if request.endpoint == 'index' or request.endpoint == 'home' %}v2-nav-link--active{% endif %}">
                <span>工作台</span>
            </a>
            <a href="/project-management" class="v2-nav-link {% if request.endpoint == 'project_management' %}v2-nav-link--active{% endif %}">
                <span>项目</span>
            </a>
            <!-- 创作下拉菜单 -->
            <div class="v2-nav-dropdown">
                <a href="/phase-one-setup" class="v2-nav-link {% if request.endpoint in ['phase_one_setup', 'phase_two_generation'] %}v2-nav-link--active{% endif %}">
                    <span>创作</span>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="margin-left: 2px; opacity: 0.7;">
                        <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <div class="v2-nav-dropdown__menu">
                    <a href="/phase-one-setup" class="v2-dropdown-item {% if request.endpoint == 'phase_one_setup' %}v2-dropdown-item--active{% endif %}">
                        <span class="v2-dropdown-item__icon">✨</span>
                        <div class="v2-dropdown-item__content">
                            <span class="v2-dropdown-item__title">新建创作</span>
                            <span class="v2-dropdown-item__desc">从设定开始，一阶段生成</span>
                        </div>
                    </a>
                    <a href="/project-management?filter=phase-one-only" class="v2-dropdown-item">
                        <span class="v2-dropdown-item__icon">📝</span>
                        <div class="v2-dropdown-item__content">
                            <span class="v2-dropdown-item__title">继续生成</span>
                            <span class="v2-dropdown-item__desc">选择项目，进入二阶段</span>
                        </div>
                    </a>
                </div>
            </div>
            <a href="/novels" class="v2-nav-link {% if request.endpoint == 'novels_view' %}v2-nav-link--active{% endif %}">
                <span>作品</span>
            </a>
        {% else %}
            <a href="/landing" class="v2-nav-link {% if request.endpoint == 'landing' %}v2-nav-link--active{% endif %}">
                <span>首页</span>
            </a>
            <a href="#features" class="v2-nav-link" onclick="document.getElementById('features')?.scrollIntoView({behavior: 'smooth'}); return false;">
                <span>功能</span>
            </a>
        {% endif %}
    </div>
    
    <!-- 右侧：操作区域 -->
    <div class="v2-navbar__right">
        {% if session.logged_in %}
            <a href="/phase-one-setup" class="v2-btn v2-btn--primary v2-btn--sm">
                <span>✨</span>
                <span>新建创作</span>
            </a>
            {% include 'components/v2/user-menu.html' %}
        {% else %}
            <a href="/login" class="v2-nav-link">登录</a>
            <a href="/login?action=register" class="v2-btn v2-btn--primary v2-btn--sm">开始使用</a>
        {% endif %}
    </div>
</nav>

<style>
/* 导航栏容器 - Linear风格 */
.v2-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--v2-border-subtle);
    z-index: var(--v2-z-fixed);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    max-width: 1400px;
    margin: 0 auto;
}

/* 左侧品牌 */
.v2-navbar__brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
}

.v2-navbar__logo {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--v2-primary-500), var(--v2-accent-purple));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.v2-navbar__logo-svg {
    width: 18px;
    height: 18px;
    filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.3));
}

.v2-navbar__brand-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--v2-text-primary);
    letter-spacing: -0.3px;
}

/* 中间导航 - Linear风格 */
.v2-navbar__center {
    display: flex;
    align-items: center;
    gap: 4px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.v2-nav-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--v2-text-secondary);
    text-decoration: none;
    transition: all 0.2s ease;
    position: relative;
}

.v2-nav-link:hover {
    color: var(--v2-text-primary);
    background: var(--v2-bg-tertiary);
}

.v2-nav-link--active {
    color: var(--v2-text-primary);
    background: var(--v2-bg-tertiary);
}

.v2-nav-link--active::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    box-shadow: inset 0 0 0 1px var(--v2-border-hover);
    pointer-events: none;
}

/* 右侧操作 */
.v2-navbar__right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

/* 导航下拉菜单 */
.v2-nav-dropdown {
    position: relative;
}

.v2-nav-dropdown__menu {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--v2-border-default);
    border-radius: 12px;
    padding: 8px;
    min-width: 220px;
    opacity: 0;
    visibility: hidden;
    transition: all 0.2s ease;
    z-index: var(--v2-z-dropdown);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
}

.v2-nav-dropdown:hover .v2-nav-dropdown__menu {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(4px);
}

.v2-dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1px solid transparent;
}

.v2-dropdown-item:hover {
    background: var(--v2-bg-tertiary);
    border-color: var(--v2-border-hover);
}

.v2-dropdown-item--active {
    background: var(--v2-bg-tertiary);
    border-color: var(--v2-border-hover);
}

.v2-dropdown-item__icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
}

.v2-dropdown-item__content {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.v2-dropdown-item__title {
    font-size: 14px;
    font-weight: 600;
    color: var(--v2-text-primary);
}

.v2-dropdown-item__desc {
    font-size: 12px;
    color: var(--v2-text-secondary);
}

/* 响应式：移动端隐藏中间导航 */
@media (max-width: 768px) {
    .v2-navbar__center {
        display: none;
    }
    
    .v2-navbar {
        padding: 0 16px;
    }
}
</style>
