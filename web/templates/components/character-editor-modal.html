<!-- 角色编辑模态框 -->
<div id="character-editor-modal" class="modal" onclick="closeCharacterEditor(event)">
    <div class="modal-content character-editor" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2>👥 角色设计</h2>
            <button class="close-btn" onclick="closeCharacterEditor()">×</button>
        </div>
        
        <div class="modal-body">
            <!-- 角色列表 -->
            <div class="character-list-panel">
                <div class="panel-header">
                    <h3>角色列表</h3>
                    <button class="btn btn-primary" onclick="addNewCharacter()">+ 新建角色</button>
                </div>
                <div id="character-list" class="character-list">
                    <!-- 动态生成角色卡片 -->
                    <div class="empty-state" style="padding: 40px 20px;">
                        <div class="empty-icon">📝</div>
                        <h3>加载中...</h3>
                        <p>正在获取角色数据</p>
                    </div>
                </div>
            </div>
            
            <!-- 角色编辑表单 -->
            <div class="character-edit-panel">
                <div id="character-form-container" style="display: none;">
                    <div id="dynamic-form-sections">
                        <!-- 动态生成的表单区域 -->
                    </div>
                    
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeCharacterEditor()">取消</button>
                        <button class="btn btn-success" onclick="saveCharacter()">💾 保存角色</button>
                    </div>
                </div>
                
                <div id="no-character-selected" class="empty-state">
                    <div class="empty-icon">👥</div>
                    <h3>选择或创建一个角色</h3>
                    <p>从左侧列表选择角色进行编辑，或创建新角色</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 引入基于JSON结构的动态表单样式 -->
<link rel="stylesheet" href="/static/css/character-editor-json-based.css">

<style>
/* ==================== 模态框基础样式 ==================== */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 99999;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.modal.active {
    display: flex !important;
}

.modal-content {
    background: white;
    border-radius: 12px;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
    max-width: 1200px;
    width: 95%;
    max-height: 90vh;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.modal-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.modal-header h2 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
}

.close-btn {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.2s;
}

.close-btn:hover {
    background: rgba(255, 255, 255, 0.3);
}

.modal-body {
    padding: 0;
    overflow: hidden;
}

/* ==================== 角色编辑器特定样式 ==================== */

.character-editor {
    max-width: 1200px;
    width: 95%;
    height: 85vh;
}

.character-editor .modal-body {
    display: flex;
    gap: 20px;
    height: calc(85vh - 80px);
}

/* 左侧角色列表 */
.character-list-panel {
    flex: 0 0 320px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #e5e7eb;
    padding-right: 20px;
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid #667eea;
}

.panel-header h3 {
    margin: 0;
    font-size: 18px;
    color: #1f2937;
}

.character-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.character-card {
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
    min-height: 80px;
}

.character-card:hover {
    border-color: #667eea;
    background: #f0f4ff;
}

.character-card.active {
    border-color: #667eea;
    background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
}

.character-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
}

.character-info {
    flex: 1;
    min-width: 0;
}

.character-name {
    font-weight: 600;
    font-size: 14px;
    color: #1f2937;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.character-type {
    font-size: 11px;
    color: #6b7280;
    margin: 2px 0 0 0;
}


/* 右侧编辑面板 */
.character-edit-panel {
    flex: 1;
    overflow-y: auto;
}

.form-section {
    margin-bottom: 24px;
    padding: 16px;
    background: #f9fafb;
    border-radius: 8px;
}

.form-section h4 {
    margin: 0 0 16px 0;
    font-size: 16px;
    color: #1f2937;
    border-bottom: 2px solid #e5e7eb;
    padding-bottom: 8px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.form-group textarea {
    resize: vertical;
    min-height: 80px;
}

/* 图标选择器 */
.icon-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.icon-option {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #e5e7eb;
    border-radius: 6px;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.2s;
}

.icon-option:hover {
    border-color: #667eea;
    background: #f0f4ff;
}

.icon-option.selected {
    border-color: #667eea;
    background: #667eea;
    color: white;
}

/* 颜色选择器 */
.color-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.color-option {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.2s;
}

.color-option:hover {
    transform: scale(1.1);
}

.color-option.selected {
    border-color: #1f2937;
    box-shadow: 0 0 0 2px white, 0 0 0 4px #667eea;
}

/* 关系列表 */
.relationships-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 12px;
}

.relationship-item {
    display: flex;
    gap: 10px;
    align-items: center;
    background: white;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
}

.relationship-item select,
.relationship-item input {
    flex: 1;
    padding: 8px;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    font-size: 13px;
}

.relationship-item button {
    padding: 6px 12px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.relationship-item button:hover {
    background: #dc2626;
}

/* 按钮样式 */
.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-primary {
    background: #667eea;
    color: white;
}

.btn-primary:hover {
    background: #5568d3;
}

.btn-secondary {
    background: #6b7280;
    color: white;
}

.btn-secondary:hover {
    background: #4b5563;
}

.btn-success {
    background: #10b981;
    color: white;
}

.btn-success:hover {
    background: #059669;
}

.btn-sm {
    padding: 6px 12px;
    font-size: 12px;
}

.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #e5e7eb;
}

/* 空状态 */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    color: #6b7280;
}

.empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
}

.empty-state h3 {
    margin: 0 0 8px 0;
    font-size: 20px;
}

.empty-state p {
    margin: 0;
    font-size: 14px;
}

/* 角色标签样式 */
.character-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    margin-bottom: 6px;
}

.character-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
    line-height: 1.4;
}

.character-tag.faction-tag {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.character-tag.level-tag {
    background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
    color: white;
}

.character-tag.position-tag {
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
}

.character-preview {
    font-size: 11px;
    color: #6b7280;
    line-height: 1.5;
    margin-top: 6px;
}
</style>
