<!-- 角色编辑模态框 -->
<div id="character-editor-modal" class="modal" onclick="closeCharacterEditor(event)">

            <button class="close-btn" onclick="closeCharacterEditor()">×</button>

                </div>

                                <label>角色名称 *</label>

                            </div>
                            <div class="form-group">
                                <label>角色类型</label>
                                <select id="char-type">
                                    <option value="主角">主角</option>
                                    <option value="配角">配角</option>
                                    <option value="反派">反派</option>
                                    <option value="导师">导师</option>
                                    <option value="同伴">同伴</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>角色图标</label>

                                <span class="icon-option" data-icon="👩" onclick="selectCharIcon('👩')">👩</span>

                                <span class="icon-option" data-icon="👴" onclick="selectCharIcon('👴')">👴</span>
                                <span class="icon-option" data-icon="👵" onclick="selectCharIcon('👵')">👵</span>
                                <span class="icon-option" data-icon="🧙" onclick="selectCharIcon('🧙')">🧙</span>
                                <span class="icon-option" data-icon="🧝" onclick="selectCharIcon('🧝')">🧝</span>
                                <span class="icon-option" data-icon="🦸" onclick="selectCharIcon('🦸')">🦸</span>
                                <span class="icon-option" data-icon="🦹" onclick="selectCharIcon('🦹')">🦹</span>
                                <span class="icon-option" data-icon="👼" onclick="selectCharIcon('👼')">👼</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>代表颜色</label>
                            <div class="color-selector" id="char-color-selector">
                                <span class="color-option selected" data-color="#667eea" style="background: #667eea;" onclick="selectCharColor('#667eea')"></span>
                                <span class="color-option" data-color="#10b981" style="background: #10b981;" onclick="selectCharColor('#10b981')"></span>
                                <span class="color-option" data-color="#f59e0b" style="background: #f59e0b;" onclick="selectCharColor('#f59e0b')"></span>

                                <span class="color-option" data-color="#84cc16" style="background: #84cc16;" onclick="selectCharColor('#84cc16')"></span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h4>角色描述</h4>
                        <div class="form-group">
                            <label>外貌特征</label>
                            <textarea id="char-appearance" rows="3" placeholder="描述角色的外貌、穿着等"></textarea>
                        </div>
                        <div class="form-group">
                            <label>性格特点</label>
                            <textarea id="char-personality" rows="3" placeholder="描述角色的性格、行为方式等"></textarea>
                        </div>
                        <div class="form-group">
                            <label>背景故事</label>
                            <textarea id="char-background" rows="4" placeholder="描述角色的出身、经历等"></textarea>
                        </div>

                    <div class="form-section">

                        <div class="form-group">
                            <label>修炼等级</label>
                            <input type="text" id="char-cultivation" placeholder="例如：筑基期">
                        </div>
                        <div class="form-group">
                            <label>主要技能</label>
                            <input type="text" id="char-skills" placeholder="例如：剑术、阵法">
                        </div>
                    </div>
                    
                    <div class="form-section">
                        <h4>角色关系</h4>
                        <div id="character-relationships" class="relationships-list">
                            <!-- 动态生成关系列表 -->
                        </div>
                        <button class="btn btn-secondary btn-sm" onclick="addRelationship()">+ 添加关系</button>
                    </div>
                    
                    <div class="form-actions">
                        <button class="btn btn-secondary" onclick="closeCharacterEditor()">取消</button>
                        <button class="btn btn-success" onclick="saveCharacter()">💾 保存角色</button>
                    </div>
                </div>
