<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两阶段小说生成 - 项目管理</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* 项目管理页面专用样式 */
        .project-management-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(245, 158, 11, 0.3);
        }

        .page-header h1 {
            margin: 0 0 16px 0;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .page-header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 统计概览区域 */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            margin: 0 auto 16px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 1rem;
            color: #6b7280;
            font-weight: 600;
        }

        /* 筛选和操作栏 */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filter-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            color: #1f2937;
            transition: all 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        /* 项目卡片网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .project-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .project-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: #e5e7eb;
        }

        .project-status-bar.phase-one-completed {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        }

        .project-status-bar.phase-two-in-progress {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
        }

        .project-status-bar.completed {
            background: linear-gradient(90deg, #10b981 0%, #059669 50%, #667eea 50%, #764ba2 100%);
        }

        .project-status-bar.failed {
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }

        .project-header {
            margin-bottom: 20px;
        }

        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .project-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #6b7280;
        }

        .meta-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-description {
            font-size: 14px;
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-progress {
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-title {
            font-weight: 600;
            color: #1f2937;
        }

        .progress-percentage {
            font-weight: 700;
            color: #10b981;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-details {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: #6b7280;
        }

        .phase-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .phase-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .phase-indicator.completed {
            background: #10b981;
        }

        .phase-indicator.current {
            background: #f59e0b;
            animation: pulse 2s infinite;
        }

        .phase-indicator.pending {
            background: #e5e7eb;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .phase-info {
            font-size: 14px;
            color: #374151;
            flex: 1;
        }

        .phase-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .phase-time {
            font-size: 12px;
            color: #6b7280;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .action-btn.secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
        }

        .action-btn.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 64px;
            color: #d1d5db;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .empty-description {
            font-size: 1rem;
            color: #6b7280;
            margin-bottom: 24px;
        }

        /* 状态消息 */
        .status-message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
        }

        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
            display: block;
        }

        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
            display: block;
        }

        .status-message.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
            display: block;
        }

        /* 加载动画 */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2rem;
            }
            
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-controls {
                width: 100%;
                justify-content: center;
            }
            
            .action-buttons {
                width: 100%;
                justify-content: center;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .project-actions {
                flex-direction: column;
            }
            
            .action-btn {
                flex: none;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-title">
                <button class="btn btn-secondary btn-small" onclick="location.href='/'" style="margin-right: 12px;">
                    🏠 返回首页
                </button>
                🗂️ 项目管理
            </div>
            <div class="navbar-actions">
                <button class="btn btn-secondary btn-small" onclick="location.href='/phase-one-setup'">🎨 第一阶段</button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/phase-two-generation'">📝 第二阶段</button>
                <button class="btn btn-secondary btn-small" onclick="location.href='/novels'">📚 查看生成</button>
                <button class="btn btn-danger btn-small" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="project-management-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1>🗂️ 项目管理中心</h1>
            <p>统一管理两阶段生成的小说项目，查看进度和进行后续操作</p>
        </div>

        <!-- 统计概览 -->
        <div class="stats-overview" id="stats-overview">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="total-projects">-</div>
                <div class="stat-label">总项目数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="completed-projects">-</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔄</div>
                <div class="stat-value" id="active-projects">-</div>
                <div class="stat-label">进行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-value" id="total-chapters">-</div>
                <div class="stat-label">总章节数</div>
            </div>
        </div>

        <!-- 筛选和操作栏 -->
        <div class="filter-bar">
            <div class="filter-controls">
                <select class="filter-select" id="status-filter" onchange="filterProjects()">
                    <option value="">所有状态</option>
                    <option value="phase-one-only">仅第一阶段完成</option>
                    <option value="phase-two-in-progress">第二阶段进行中</option>
                    <option value="completed">已完成</option>
                    <option value="failed">失败</option>
                </select>
                <select class="filter-select" id="phase-filter" onchange="filterProjectsByPhase()">
                    <option value="all">所有阶段</option>
                    <option value="phase_one_completed">第一阶段完成</option>
                    <option value="phase_two_in_progress">第二阶段进行中</option>
                    <option value="designing">设计阶段</option>
                    <option value="completed">全部完成</option>
                </select>
                <select class="filter-select" id="sort-filter" onchange="filterProjects()">
                    <option value="last_updated">最近更新</option>
                    <option value="created_date">创建时间</option>
                    <option value="title">标题排序</option>
                    <option value="progress">进度排序</option>
                </select>
                <input type="text" class="filter-select" id="search-filter" placeholder="搜索项目..." style="flex: 1; max-width: 300px;" oninput="filterProjects()">
            </div>
            <div class="action-buttons">
                <button class="btn btn-secondary" onclick="refreshProjects()">
                    🔄 刷新
                </button>
                <button class="btn btn-primary" onclick="location.href='/phase-one-setup'">
                    ➕ 新建项目
                </button>
            </div>
        </div>

        <!-- 状态消息 -->
        <div class="status-message" id="status-message"></div>

        <!-- 项目列表 -->
        <div id="projects-container">
            <div class="loading-spinner"></div>
            <p style="text-align: center; color: #6b7280;">加载项目中...</p>
        </div>
    </div>

    <script>
        let projectsData = [];
        let filteredProjects = [];

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadProjects();
        });

        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/health');
                if (!response.ok) {
                    showStatusMessage('⚠️ 请先登录后再使用项目管理功能', 'error');
                }
            } catch (error) {
                showStatusMessage('⚠️ 请先登录后再使用项目管理功能', 'error');
            }
        }

        // ==================== 项目加载功能 ====================
        async function loadProjects() {
            try {
                showStatusMessage('🔄 正在加载项目列表...', 'info');
                
                const response = await fetch('/api/projects/with-phase-status');
                
                if (response.status === 401) {
                    showStatusMessage('请先登录才能加载项目', 'error');
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                console.log('📋 [DEBUG] API返回结果:', result);
                
                // 处理新的响应格式
                if (result.projects && Array.isArray(result.projects)) {
                    projectsData = result.projects;
                } else if (Array.isArray(result)) {
                    // 兼容旧格式
                    projectsData = result;
                } else {
                    console.warn('⚠️ 未知的API响应格式:', result);
                    projectsData = [];
                }
                
                filteredProjects = [...projectsData];
                console.log(`📋 [DEBUG] 处理后项目数据: ${projectsData.length} 个项目`);
                
                updateStatsOverview();
                displayProjects(projectsData);
                showStatusMessage(`✅ 成功加载 ${projectsData.length} 个项目`, 'success');
            } catch (error) {
                console.error('❌ 加载项目失败:', error);
                showStatusMessage(`❌ 加载项目失败: ${error.message}`, 'error');
            }
        }

        // ==================== 项目显示功能 ====================
        function displayProjects(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <h2 class="empty-title">暂无项目</h2>
                        <p class="empty-description">您还没有创建任何项目，开始您的第一个两阶段小说项目吧！</p>
                        <button class="btn btn-primary" onclick="location.href='/phase-one-setup'">
                            🎨 创建第一个项目
                        </button>
                    </div>
                `;
                return;
            }

            const projectsGrid = document.createElement('div');
            projectsGrid.className = 'projects-grid';

            projects.forEach(project => {
                const projectCard = createProjectCard(project);
                projectsGrid.appendChild(projectCard);
            });

            container.innerHTML = '';
            container.appendChild(projectsGrid);
        }

        function createProjectCard(project) {
            const card = document.createElement('div');
            card.className = 'project-card';
            
            // 状态条
            const statusBarClass = getStatusBarClass(project);
            const statusBar = document.createElement('div');
            statusBar.className = `project-status-bar ${statusBarClass}`;
            card.appendChild(statusBar);

            // 项目内容
            const content = `
                <div class="project-header">
                    <h3 class="project-title">${escapeHtml(project.title)}</h3>
                    <div class="project-meta">
                        <div class="meta-item">
                            <span class="meta-icon">📅</span>
                            <span>${formatDate(project.created_at)}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">🔄</span>
                            <span>${formatDate(project.last_updated)}</span>
                        </div>
                    </div>
                </div>
                
                <div class="project-description">
                    ${escapeHtml(project.description || project.story_synopsis || '暂无描述')}
                </div>
                
                ${createProgressSection(project)}
                
                ${createPhaseStatusSection(project)}
                
                ${createActionsSection(project)}
            `;

            card.innerHTML += content;
            return card;
        }

        function getStatusBarClass(project) {
            if (project.status === 'completed') {
                return 'completed';
            } else if (project.phase_two && project.phase_two.status === 'generating') {
                return 'phase-two-in-progress';
            } else if (project.phase_one && project.phase_one.status === 'completed') {
                return 'phase-one-completed';
            } else if (project.status === 'failed') {
                return 'failed';
            }
            return '';
        }

        function createProgressSection(project) {
            const totalChapters = project.total_chapters || 0;
            const completedChapters = project.completed_chapters || 0;
            const progressPercentage = totalChapters > 0 ? Math.round((completedChapters / totalChapters) * 100) : 0;

            return `
                <div class="project-progress">
                    <div class="progress-header">
                        <span class="progress-title">生成进度</span>
                        <span class="progress-percentage">${progressPercentage}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercentage}%"></div>
                    </div>
                    <div class="progress-details">
                        <span>${completedChapters} 章</span>
                        <span>共 ${totalChapters} 章</span>
                    </div>
                </div>
            `;
        }

        function createPhaseStatusSection(project) {
            let html = '<div class="phase-status">';
            
            // 第一阶段状态
            const phaseOneStatus = getPhaseStatus(project.phase_one);
            html += `
                <div class="phase-info">
                    <span class="phase-indicator ${phaseOneStatus.indicator}"></span>
                    <div>
                        <div class="phase-name">第一阶段：设定生成</div>
                        <div class="phase-time">${phaseOneStatus.text}</div>
                    </div>
                </div>
            `;
            
            // 第二阶段状态
            const phaseTwoStatus = getPhaseStatus(project.phase_two);
            html += `
                <div class="phase-info">
                    <span class="phase-indicator ${phaseTwoStatus.indicator}"></span>
                    <div>
                        <div class="phase-name">第二阶段：章节生成</div>
                        <div class="phase-time">${phaseTwoStatus.text}</div>
                    </div>
                </div>
            `;
            
            html += '</div>';
            return html;
        }

        function getPhaseStatus(phase) {
            if (!phase) {
                return { indicator: 'pending', text: '未开始' };
            }
            
            switch (phase.status) {
                case 'completed':
                    return { indicator: 'completed', text: `完成 (${formatDate(phase.completed_at)})` };
                case 'generating':
                    return { indicator: 'current', text: '进行中...' };
                case 'failed':
                    return { indicator: 'pending', text: `失败: ${phase.error || '未知错误'}` };
                case 'not_started':
                    return { indicator: 'pending', text: '未开始' };
                case 'paused':
                    return { indicator: 'current', text: '已暂停' };
                default:
                    return { indicator: 'pending', text: phase.status };
            }
        }

        function createActionsSection(project) {
            let actions = '';
            
            // 根据项目状态显示不同操作
            if (project.phase_one && project.phase_one.status === 'completed') {
                if (project.phase_two && project.phase_two.status === 'completed') {
                    actions = `
                        <button class="action-btn primary" onclick="viewProject('${escapeHtml(project.title)}')">
                            📖 查看内容
                        </button>
                        <button class="action-btn secondary" onclick="exportProject('${escapeHtml(project.title)}')">
                            📤 导出项目
                        </button>
                    `;
                } else {
                    actions = `
                        <button class="action-btn primary" onclick="continueToPhaseTwo('${escapeHtml(project.title)}')">
                            📝 继续生成
                        </button>
                        <button class="action-btn secondary" onclick="viewPhaseOneResult('${escapeHtml(project.title)}')">
                            👁️ 查看设定
                        </button>
                        <button class="action-btn secondary" onclick="viewProjectViewer('${escapeHtml(project.title)}')">
                            📊 项目可视化
                        </button>
                        <button class="action-btn secondary" onclick="viewWorldviewViewer('${escapeHtml(project.title)}')">
                            🌍 世界观
                        </button>
                    `;
                }
            } else {
                actions = `
                    <button class="action-btn secondary" onclick="continuePhaseOne('${escapeHtml(project.title)}')">
                        ⚙️ 继续设计
                    </button>
                `;
            }
            
            actions += `
                <button class="action-btn danger" onclick="deleteProject('${escapeHtml(project.title)}')">
                    🗑️ 删除
                </button>
            `;
            
            return `<div class="project-actions">${actions}</div>`;
        }

        // ==================== 统计功能 ====================
        function updateStatsOverview() {
            const totalProjects = projectsData.length;
            const completedProjects = projectsData.filter(p => p.status === 'completed').length;
            const activeProjects = projectsData.filter(p => 
                (p.phase_two && p.phase_two.status === 'generating') ||
                (p.phase_one && p.phase_one.status === 'generating')
            ).length;
            const totalChapters = projectsData.reduce((sum, p) => sum + (p.completed_chapters || 0), 0);

            document.getElementById('total-projects').textContent = totalProjects;
            document.getElementById('completed-projects').textContent = completedProjects;
            document.getElementById('active-projects').textContent = activeProjects;
            document.getElementById('total-chapters').textContent = totalChapters.toLocaleString();
        }

        // ==================== 筛选功能 ====================
        function filterProjects() {
            const statusFilter = document.getElementById('status-filter').value;
            const sortFilter = document.getElementById('sort-filter').value;
            const searchFilter = document.getElementById('search-filter').value.toLowerCase();
            const phaseFilter = document.getElementById('phase-filter').value;

            console.log(`🔍 [DEBUG] 开始筛选项目 - 状态: ${statusFilter}, 阶段: ${phaseFilter}, 搜索: ${searchFilter}`);

            // 应用状态和阶段筛选
            filteredProjects = projectsData.filter(project => {
                let statusMatch = true;
                let phaseMatch = true;
                
                // 状态筛选
                if (statusFilter) {
                    switch (statusFilter) {
                        case 'phase-one-only':
                            statusMatch = project.phase_one && project.phase_one.status === 'completed' &&
                                         (!project.phase_two || project.phase_two.status === 'not_started');
                            break;
                        case 'phase-two-in-progress':
                            statusMatch = project.phase_two && project.phase_two.status === 'generating';
                            break;
                        case 'completed':
                            statusMatch = project.status === 'completed';
                            break;
                        case 'failed':
                            statusMatch = project.status === 'failed';
                            break;
                        default:
                            statusMatch = true;
                    }
                }
                
                // 阶段筛选
                if (phaseFilter && phaseFilter !== 'all') {
                    switch (phaseFilter) {
                        case 'phase_one_completed':
                            phaseMatch = project.phase_one && project.phase_one.status === 'completed' &&
                                        (!project.phase_two || project.phase_two.status === 'not_started');
                            break;
                        case 'phase_two_in_progress':
                            phaseMatch = project.phase_two && project.phase_two.status === 'generating';
                            break;
                        case 'designing':
                            phaseMatch = project.status === 'designing' ||
                                        (project.phase_one && project.phase_one.status === 'pending');
                            break;
                        case 'completed':
                            phaseMatch = project.status === 'completed';
                            break;
                        default:
                            phaseMatch = true;
                    }
                }
                
                return statusMatch && phaseMatch;
            });

            // 应用搜索筛选
            if (searchFilter) {
                filteredProjects = filteredProjects.filter(project =>
                    project.title.toLowerCase().includes(searchFilter) ||
                    (project.description || '').toLowerCase().includes(searchFilter) ||
                    (project.story_synopsis || '').toLowerCase().includes(searchFilter)
                );
            }

            // 应用排序
            filteredProjects.sort((a, b) => {
                switch (sortFilter) {
                    case 'created_date':
                        return new Date(b.created_at) - new Date(a.created_at);
                    case 'title':
                        return a.title.localeCompare(b.title);
                    case 'progress':
                        const aProgress = a.total_chapters > 0 ? (a.completed_chapters / a.total_chapters) : 0;
                        const bProgress = b.total_chapters > 0 ? (b.completed_chapters / b.total_chapters) : 0;
                        return bProgress - aProgress;
                    case 'last_updated':
                    default:
                        return new Date(b.last_updated) - new Date(a.last_updated);
                }
            });

            console.log(`📋 [DEBUG] 筛选后项目数量: ${filteredProjects.length}`);
            displayProjects(filteredProjects);
        }

        // ==================== 项目操作功能 ====================
        async function continueToPhaseTwo(projectTitle) {
            try {
                showStatusMessage('🔄 正在跳转到第二阶段...', 'info');
                
                const response = await fetch(`/api/phase-one/continue-to-phase-two/${encodeURIComponent(projectTitle)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        total_chapters: 50,
                        chapters_per_batch: 3
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '跳转失败');
                }

                showStatusMessage('✅ 正在跳转到第二阶段...', 'success');
                setTimeout(() => {
                    // 传递项目标题作为URL参数
                    window.location.href = `/phase-two-generation?title=${encodeURIComponent(projectTitle)}`;
                }, 1000);
            } catch (error) {
                showStatusMessage(`❌ 跳转失败: ${error.message}`, 'error');
            }
        }

        function viewProject(projectTitle) {
            window.location.href = `/novel?title=${encodeURIComponent(projectTitle)}`;
        }

        function viewPhaseOneResult(projectTitle) {
            window.location.href = `/phase-one-setup?continue=${encodeURIComponent(projectTitle)}`;
        }

        async function exportProject(projectTitle) {
            try {
                const response = await fetch(`/api/project/${encodeURIComponent(projectTitle)}/export?format=json`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: 导出失败`);
                }

                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `${projectTitle}_项目数据.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                showStatusMessage('✅ 项目导出成功', 'success');
            } catch (error) {
                showStatusMessage(`❌ 导出失败: ${error.message}`, 'error');
            }
        }

        function continuePhaseOne(projectTitle) {
            window.location.href = `/phase-one-setup?continue=${encodeURIComponent(projectTitle)}`;
        }

        function viewProjectViewer(projectTitle) {
            // 如果没有传递项目标题，尝试从页面获取当前项目
            if (!projectTitle) {
                // 获取当前正在查看的项目（如果有）
                const urlParams = new URLSearchParams(window.location.search);
                projectTitle = urlParams.get('project');
            }
            
            if (!projectTitle) {
                showStatusMessage('❌ 未指定项目，无法打开可视化界面', 'error');
                return;
            }
            
            // 跳转到项目可视化界面
            window.location.href = `/project-viewer/${encodeURIComponent(projectTitle)}`;
        }
        
        function viewWorldviewViewer(projectTitle) {
            // 跳转到世界观查看器界面
            window.location.href = `/worldview-viewer/${encodeURIComponent(projectTitle)}`;
        }
        
        function viewWorldview(projectTitle) {
            // 跳转到世界观编辑界面
            window.location.href = `/phase-one-setup?continue=${encodeURIComponent(projectTitle)}`;
        }

        async function deleteProject(projectTitle) {
            if (!confirm(`确定要删除项目 "${projectTitle}" 吗？此操作不可撤销，所有相关数据将被永久删除。`)) {
                return;
            }

            try {
                const response = await fetch(`/api/project/${encodeURIComponent(projectTitle)}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '删除失败');
                }

                showStatusMessage(`✅ 项目 "${projectTitle}" 已删除`, 'success');
                
                // 重新加载项目列表
                await loadProjects();
            } catch (error) {
                showStatusMessage(`❌ 删除失败: ${error.message}`, 'error');
            }
        }

        function refreshProjects() {
            showStatusMessage('🔄 正在刷新项目列表...', 'info');
            loadProjects();
        }

        // ==================== 工具函数 ====================
        function formatDate(dateString) {
            if (!dateString) return '未知时间';
            
            try {
                const date = new Date(dateString);
                return date.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (error) {
                return '时间格式错误';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== 项目筛选功能 ====================
        function filterProjectsByPhase() {
            console.log('🔍 [DEBUG] 开始按阶段筛选项目');
            
            const phaseFilter = document.getElementById('phase-filter').value;
            console.log(`📋 [DEBUG] 筛选条件: ${phaseFilter}`);
            
            if (!phaseFilter || phaseFilter === 'all') {
                filteredProjects = [...projectsData];
            } else {
                filteredProjects = projectsData.filter(project => {
                    switch (phaseFilter) {
                        case 'phase_one_completed':
                            return project.phase_one && project.phase_one.status === 'completed' &&
                                   (!project.phase_two || project.phase_two.status === 'not_started');
                        case 'phase_two_in_progress':
                            return project.phase_two && project.phase_two.status === 'generating';
                        case 'designing':
                            return project.status === 'designing' ||
                                   (project.phase_one && project.phase_one.status === 'pending');
                        case 'completed':
                            return project.status === 'completed';
                        default:
                            return true;
                    }
                });
            }
            
            console.log(`📋 [DEBUG] 筛选后项目数量: ${filteredProjects.length}`);
            displayProjects(filteredProjects);
            
            // 更新状态消息
            if (phaseFilter !== 'all') {
                showStatusMessage(`🔍 筛选结果: ${filteredProjects.length} 个项目`, 'info');
            }
        }

        function showStatusMessage(message, type) {
            const msgElement = document.getElementById('status-message');
            msgElement.className = `status-message ${type}`;
            msgElement.textContent = message;
            msgElement.style.display = 'block';
            
            // 5秒后自动隐藏成功和消息
            if (type === 'success') {
                setTimeout(() => {
                    msgElement.style.display = 'none';
                }, 5000);
            }
        }

        // 退出登录函数
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '/logout';
            }
        }
    </script>
</body>
</html>
