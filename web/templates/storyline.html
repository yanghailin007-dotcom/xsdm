<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事线时间线 - 小说生成系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/storyline.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 导航栏 -->
    {% include 'components/navbar.html' %}
    
    <div class="storyline-container">
        <!-- 页面头部 -->
        <div class="storyline-header">
            <div class="header-content">
                <h1>📖 故事线时间线</h1>
                <p class="header-subtitle">查看和管理所有重大事件及其细分</p>
            </div>
            
            <!-- 项目选择器 -->
            <div class="project-selector">
                <select id="project-select" onchange="loadStoryline()">
                    <option value="">选择项目...</option>
                </select>
                <button class="btn-refresh" onclick="loadProjects()">
                    <span>🔄</span> 刷新
                </button>
                <button class="btn-save" onclick="saveStorylineChanges()" id="btn-save" style="display: none;">
                    <span>💾</span> 保存更改
                </button>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loading-state" class="loading-state">
            <div class="loading-spinner"></div>
            <p>正在加载故事线数据...</p>
        </div>

        <!-- 错误状态 -->
        <div id="error-state" class="error-state" style="display: none;">
            <div class="error-icon">⚠️</div>
            <h2>加载失败</h2>
            <p id="error-message">无法加载故事线数据</p>
            <button class="btn-primary" onclick="loadProjects()">重新加载</button>
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">📚</div>
            <h2>暂无故事线数据</h2>
            <p>请先选择一个项目</p>
        </div>

        <!-- 故事线主容器 - 左右分栏布局 -->
        <div id="storyline-main" class="storyline-main" style="display: none;">
            <!-- 阶段信息栏 -->
            <div class="stage-info-bar">
                <div class="stage-badge">
                    <span class="stage-label">阶段</span>
                    <span id="stage-name" class="stage-value">-</span>
                </div>
                <div class="chapter-range-badge">
                    <span id="chapter-range-text">-</span>
                </div>
            </div>

            <!-- 左右分栏 -->
            <div class="split-container">
                <!-- 左侧：重大事件列表 -->
                <div class="major-events-panel">
                    <div class="panel-header">
                        <h2>🎯 重大事件</h2>
                        <span class="panel-subtitle">点击查看详情</span>
                    </div>
                    <div class="major-events-list" id="major-events-list">
                        <!-- 动态生成重大事件卡片 -->
                    </div>
                </div>

                <!-- 右侧：中级事件详情 -->
                <div class="medium-events-panel">
                    <div class="panel-header">
                        <h2 id="medium-panel-title">📋 事件详情</h2>
                        <span class="panel-subtitle" id="medium-panel-subtitle">请选择一个重大事件</span>
                    </div>
                    <div class="medium-events-content" id="medium-events-content">
                        <div class="empty-selection">
                            <div class="empty-icon">👈</div>
                            <p>请从左侧选择一个重大事件查看详情</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="storyline-footer">
        <p>小说生成系统 - 故事线时间线展示</p>
    </footer>

    <script src="/static/js/user-info.js"></script>
    <script src="/static/js/storyline.js?v=4.0"></script>
</body>
</html>
