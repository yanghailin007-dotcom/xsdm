<!--
V2 编辑抽屉组件 - 完整实现示例
使用方式：
1. 复制CSS到全局样式表
2. 复制JS函数到 phase-two-generation.js
3. 调用 openEditDrawer(category) 打开抽屉
-->

<!-- ==================== CSS 样式 ==================== -->
<style>
/* 抽屉遮罩层 */
.edit-drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
}

.edit-drawer-overlay.visible {
    opacity: 1;
    visibility: visible;
}

/* 抽屉面板 */
.edit-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 480px;
    max-width: 90vw;
    height: 100vh;
    background: #111111;
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
}

.edit-drawer.visible {
    transform: translateX(0);
}

/* 抽屉头部 */
.edit-drawer-header {
    padding: 20px 24px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #161616;
    flex-shrink: 0;
}

.edit-drawer-title {
    display: flex;
    align-items: center;
    gap: 12px;
}

.edit-drawer-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
}

.edit-drawer-title-text h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #fafafa;
    line-height: 1.3;
}

.edit-drawer-title-text p {
    margin: 4px 0 0;
    font-size: 13px;
    color: #a1a1aa;
}

/* 关闭按钮 */
.edit-drawer-close {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: transparent;
    color: #a1a1aa;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.edit-drawer-close:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fafafa;
}

.edit-drawer-close svg {
    width: 20px;
    height: 20px;
}

/* 抽屉内容区 */
.edit-drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
}

.edit-drawer-body::-webkit-scrollbar {
    width: 6px;
}

.edit-drawer-body::-webkit-scrollbar-track {
    background: transparent;
}

.edit-drawer-body::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
}

.edit-drawer-body::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* 表单字段 */
.edit-drawer-field {
    margin-bottom: 24px;
}

.edit-drawer-field:last-child {
    margin-bottom: 0;
}

.edit-drawer-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #a1a1aa;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.edit-drawer-input {
    width: 100%;
    padding: 12px 16px;
    background: #1a1a1a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    color: #fafafa;
    font-size: 15px;
    transition: all 0.2s;
    box-sizing: border-box;
}

.edit-drawer-input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.edit-drawer-input::placeholder {
    color: #52525b;
}

.edit-drawer-textarea {
    min-height: calc(100vh - 350px);
    resize: vertical;
    font-family: inherit;
    line-height: 1.7;
    font-size: 15px;
}

/* 抽屉底部 */
.edit-drawer-footer {
    padding: 16px 24px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #161616;
    flex-shrink: 0;
}

.edit-drawer-char-count {
    font-size: 13px;
    color: #71717a;
}

.edit-drawer-actions {
    display: flex;
    gap: 12px;
}

/* 按钮样式 */
.edit-drawer-btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
}

.edit-drawer-btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #a1a1aa;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.edit-drawer-btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fafafa;
}

.edit-drawer-btn-primary {
    background: linear-gradient(135deg, #6366f1, #4f46e5);
    color: white;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.edit-drawer-btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
}

/* 提示信息 */
.edit-drawer-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #71717a;
    margin-top: 8px;
}

/* 响应式 - 移动端 */
@media (max-width: 768px) {
    .edit-drawer {
        width: 100vw;
        max-width: 100vw;
    }
}

@media (max-width: 480px) {
    .edit-drawer {
        border-radius: 16px 16px 0 0;
        height: 90vh;
        top: auto;
        bottom: 0;
        transform: translateY(100%);
    }
    
    .edit-drawer.visible {
        transform: translateY(0);
    }
    
    .edit-drawer-body {
        padding: 20px;
    }
    
    .edit-drawer-textarea {
        min-height: 300px;
    }
}
</style>

<!-- ==================== HTML 结构 ==================== -->
<!-- 这个结构由 JavaScript 动态生成 -->

<!-- ==================== JavaScript 函数 ==================== -->
<script>
/**
 * 打开编辑抽屉
 * @param {string} category - 产物类别
 */
function openEditDrawer(category) {
    if (!currentProject) {
        showStatusMessage('❌ 请先选择一个项目', 'error');
        return;
    }

    const productData = phaseOneProductsData[category];
    
    // 特殊处理势力系统
    if (category === 'factions') {
        viewFactionSystem();
        return;
    }
    
    const categoryNames = {
        'worldview': '世界观设定',
        'characters': '角色设计',
        'growth': '成长路线',
        'writing': '写作计划',
        'storyline': '故事线',
        'market': '市场分析'
    };
    
    const categoryIcons = {
        'worldview': '🌍',
        'characters': '👥',
        'growth': '📈',
        'writing': '📝',
        'storyline': '📖',
        'market': '📊'
    };
    
    // 创建抽屉HTML
    const drawerHtml = `
        <div class="edit-drawer-overlay" id="edit-drawer-overlay" onclick="closeEditDrawer()"></div>
        <div class="edit-drawer" id="edit-drawer">
            <div class="edit-drawer-header">
                <div class="edit-drawer-title">
                    <div class="edit-drawer-icon">${categoryIcons[category]}</div>
                    <div class="edit-drawer-title-text">
                        <h3>编辑${categoryNames[category]}</h3>
                        <p>修改和完善${categoryNames[category]}内容</p>
                    </div>
                </div>
                <button class="edit-drawer-close" onclick="closeEditDrawer()" title="关闭 (Esc)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div class="edit-drawer-body">
                <div class="edit-drawer-field">
                    <label class="edit-drawer-label">标题</label>
                    <input type="text" class="edit-drawer-input" id="drawer-product-title" 
                           value="${productData?.title || categoryNames[category]}">
                </div>
                
                <div class="edit-drawer-field">
                    <label class="edit-drawer-label">内容</label>
                    <textarea class="edit-drawer-input edit-drawer-textarea" id="drawer-product-content" 
                              placeholder="在此输入详细内容...">${productData?.content || ''}</textarea>
                    <div class="edit-drawer-hint">
                        <span>💡</span>
                        <span>详细的内容有助于生成更高质量的小说章节</span>
                    </div>
                </div>
            </div>
            
            <div class="edit-drawer-footer">
                <span class="edit-drawer-char-count" id="drawer-char-count">0 字符</span>
                <div class="edit-drawer-actions">
                    <button class="edit-drawer-btn edit-drawer-btn-secondary" onclick="closeEditDrawer()">取消</button>
                    <button class="edit-drawer-btn edit-drawer-primary" onclick="saveEditDrawer('${category}')">保存</button>
                </div>
            </div>
        </div>
    `;
    
    // 添加到DOM
    document.body.insertAdjacentHTML('beforeend', drawerHtml);
    
    // 动画显示
    requestAnimationFrame(() => {
        document.getElementById('edit-drawer-overlay').classList.add('visible');
        document.getElementById('edit-drawer').classList.add('visible');
    });
    
    // 绑定字符计数
    const textarea = document.getElementById('drawer-product-content');
    const charCount = document.getElementById('drawer-char-count');
    
    const updateCount = () => {
        const count = textarea.value.length;
        charCount.textContent = `${count.toLocaleString()} 字符`;
        charCount.style.color = count > 0 ? '#22c55e' : '#71717a';
    };
    
    textarea.addEventListener('input', updateCount);
    updateCount(); // 初始计数
    
    // 聚焦到内容区
    textarea.focus();
    
    // 绑定ESC键关闭
    document.addEventListener('keydown', handleDrawerKeydown);
    
    // 阻止背景滚动
    document.body.style.overflow = 'hidden';
}

/**
 * 关闭编辑抽屉
 */
function closeEditDrawer() {
    const overlay = document.getElementById('edit-drawer-overlay');
    const drawer = document.getElementById('edit-drawer');
    
    if (overlay && drawer) {
        overlay.classList.remove('visible');
        drawer.classList.remove('visible');
        
        // 动画完成后移除DOM
        setTimeout(() => {
            overlay.remove();
            drawer.remove();
        }, 300);
    }
    
    // 移除事件监听
    document.removeEventListener('keydown', handleDrawerKeydown);
    
    // 恢复背景滚动
    document.body.style.overflow = '';
}

/**
 * 键盘事件处理
 */
function handleDrawerKeydown(e) {
    if (e.key === 'Escape') {
        closeEditDrawer();
    } else if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        const saveBtn = document.querySelector('.edit-drawer-btn-primary');
        if (saveBtn) saveBtn.click();
    }
}

/**
 * 保存编辑内容
 */
async function saveEditDrawer(category) {
    const title = document.getElementById('drawer-product-title').value.trim();
    const content = document.getElementById('drawer-product-content').value.trim();
    
    if (!title || !content) {
        showStatusMessage('请填写完整的标题和内容', 'error');
        return;
    }

    showStatusMessage('🔄 正在保存...', 'info');
    
    try {
        const response = await fetch(`/api/phase-one/products/${encodeURIComponent(currentProject.novel_title || currentProject.title)}/${category}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, content })
        });
        
        if (!response.ok) throw new Error('保存失败');
        
        // 更新本地数据
        if (!phaseOneProductsData[category]) phaseOneProductsData[category] = {};
        phaseOneProductsData[category].title = title;
        phaseOneProductsData[category].content = content;
        phaseOneProductsData[category].status = 'completed';
        
        // 更新UI
        updateProductCardStatus(category, 'completed');
        updateProductStatusIndicator(category, true);
        
        showStatusMessage('✅ 保存成功', 'success');
        closeEditDrawer();
        
    } catch (error) {
        console.error('保存失败:', error);
        showStatusMessage(`❌ 保存失败: ${error.message}`, 'error');
    }
}
</script>
